<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR สั่งกาแฟ · Rush Hour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&family=Noto+Sans+Thai:wght@600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{ box-sizing:border-box; margin:0; }
  body{ font-family:"Inter","Noto Sans Thai",sans-serif; background:#EFE7D4; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:24px; }
  .card{ width:380px; max-width:92vw; background:#fff; border-radius:26px; overflow:hidden; box-shadow:0 14px 50px rgba(40,32,8,.22); }
  .head{ background:linear-gradient(135deg,#23190A,#3A2B0E); color:#fff; text-align:center; padding:26px 20px 20px; }
  .head .brand{ font-weight:800; font-size:34px; letter-spacing:1px; background:linear-gradient(120deg,#EBC955,#FFF1C2 50%,#D9A93B); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .head .sub{ font-size:14px; color:#E7DCBD; margin-top:4px; }
  .head .pill{ display:inline-block; margin-top:12px; font-size:13px; font-weight:800; color:#2A2208; background:linear-gradient(135deg,#E8C24E,#C2941A); padding:6px 16px; border-radius:999px; }
  .qbox{ padding:26px 26px 10px; display:flex; justify-content:center; }
  #qr img, #qr canvas{ display:block; }
  .cap{ text-align:center; font-weight:800; font-size:20px; color:#2A2208; padding:4px 20px 2px; }
  .cap small{ display:block; font-weight:600; font-size:13px; color:#8A7B52; margin-top:4px; }
  .url{ text-align:center; font-size:11px; color:#A99E7E; padding:6px 20px 22px; word-break:break-all; }
  .print{ border:none; background:#23190A; color:#EBC955; font-family:inherit; font-weight:800; font-size:15px; padding:14px 26px; border-radius:14px; cursor:pointer; box-shadow:0 8px 24px rgba(40,32,8,.18); }
  .hint{ font-size:12.5px; color:#8A7B52; text-align:center; max-width:380px; }
  @media print{
    body{ background:#fff; padding:0; }
    .print,.hint{ display:none; }
    .card{ box-shadow:none; border:1px solid #ddd; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="brand">RUSH HOUR</div>
      <div class="sub">เซ็นทรัล พิษณุโลก</div>
      <span class="pill">สั่งกาแฟ-ขนม ส่งถึงจุด</span>
    </div>
    <div class="qbox"><div id="qr"></div></div>
    <div class="cap">สแกนเพื่อสั่งเลย<small>เปิดกล้องมือถือส่องที่ QR นี้</small></div>
    <div class="url" id="urlText"></div>
  </div>
  <button class="print" onclick="window.print()">🖨️ พิมพ์ / บันทึกเป็น PDF</button>
  <p class="hint">ตั้งโต๊ะ/เคาน์เตอร์ในห้าง · ลูกค้าสแกนแล้วสั่งได้ทันที</p>

<script>
  var URL_ORDER = "https://rushcoffeeroaster.github.io/rushcoffee-stock/order.html";
  document.getElementById("urlText").textContent = URL_ORDER.replace("https://","");
  new QRCode(document.getElementById("qr"), {
    text: URL_ORDER, width: 300, height: 300,
    colorDark: "#1A1407", colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
