<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>บัญชีร้านกาแฟ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

:root {
  --bg:      #FAF6F0;
  --surface: #fff;
  --border:  #EDE7DD;
  --t1:  #2C1810;
  --t2:  #7A6B62;
  --t3:  #B5A99E;
  --good: #4E7A30;
  --warn: #C08010;
  --bad:  #B5482A;
  --branch: #A9744F;
  --r: 12px;
}
body.rush     { --branch: #C1502E; }
body.rushhour { --branch: #C49000; }
body.all      { --branch: #5C4A3D; }

body {
  font-family: -apple-system, "Noto Sans Thai", "Segoe UI", sans-serif;
  background: var(--bg); color: var(--t1);
  min-height: 100vh; padding-bottom: 96px;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 20;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 18px 16px 0;
}
.hdr-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.app-name { font-size: 22px; font-weight: 800; color: var(--branch); letter-spacing: -0.5px; transition: color .2s; }
.app-sub  { font-size: 12px; color: var(--t3); margin-top: 2px; }

.branch-pills { display: flex; background: var(--border); border-radius: 9px; padding: 3px; gap: 2px; }
.branch-pill {
  padding: 5px 11px; border-radius: 7px; font-size: 11px; font-weight: 700;
  border: none; background: transparent; color: var(--t2); cursor: pointer;
  transition: all .15s; white-space: nowrap; font-family: inherit;
}
.branch-pill.active { background: var(--surface); color: var(--branch); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

.tab-row { display: flex; }
.tab-btn {
  flex: 1; text-align: center; padding: 10px; font-size: 13px; font-weight: 600;
  border: none; background: transparent; color: var(--t3); cursor: pointer;
  border-bottom: 2px solid transparent; font-family: inherit; transition: all .15s;
}
.tab-btn.active { color: var(--branch); border-bottom-color: var(--branch); }

/* ── Period chips ── */
.period-row { display: flex; gap: 6px; padding: 14px 16px 2px; overflow-x: auto; scrollbar-width: none; }
.period-row::-webkit-scrollbar { display: none; }
.pchip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--border); background: var(--surface); color: var(--t2);
  cursor: pointer; transition: all .15s;
}
.pchip.active { background: var(--branch); color: #fff; border-color: var(--branch); }

/* ── Content ── */
.content { padding: 14px 16px; }

/* ── KPI Grid ── */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.kpi-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
}
.kpi-card.wide { grid-column: 1/-1; }
.kpi-lbl  { font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.kpi-val  { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
.kpi-val.income  { color: var(--good); }
.kpi-val.expense { color: var(--bad); }
.kpi-val.profit-pos { color: var(--good); }
.kpi-val.profit-neg { color: var(--bad); }

/* ── Section title ── */
.section-title { font-size: 13px; font-weight: 700; color: var(--t2); margin-bottom: 10px; margin-top: 16px; }

/* ── Chart wrap ── */
.chart-wrap { position: relative; height: 200px; margin-bottom: 6px; }

/* ── Branch breakdown ── */
.branch-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 6px; }

/* ── Stock summary ── */
.stock-summary {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.stock-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 14px; border-bottom: 1px solid var(--border);
}
.stock-row:last-child { border-bottom: none; }
.stock-item-name { font-size: 14px; font-weight: 600; }
.stock-item-sub  { font-size: 12px; color: var(--t3); margin-top: 1px; }
.stock-item-amt  { font-size: 14px; font-weight: 700; color: var(--bad); font-family: monospace; }

/* ── Transaction list ── */
.txn-list {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.txn-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
}
.txn-row:last-child { border-bottom: none; }
.txn-label { font-size: 14px; font-weight: 600; }
.txn-meta  { font-size: 12px; color: var(--t3); margin-top: 1px; }
.txn-right { display: flex; align-items: center; gap: 8px; }
.txn-amt   { font-size: 15px; font-weight: 700; font-family: monospace; }
.del-btn   { background: none; border: none; color: var(--t3); font-size: 16px; cursor: pointer; padding: 4px; transition: color .15s; }
.del-btn:hover { color: var(--bad); }

/* ── Day picker ── */
.day-picker { max-width: 200px; margin-bottom: 14px; }

/* ── FAB group ── */
.fab-group { position: fixed; bottom: 24px; right: 16px; z-index: 30; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
.fab {
  width: 56px; height: 56px; border-radius: 16px; border: none;
  font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(0,0,0,.22); transition: transform .15s;
}
.fab:active { transform: scale(.93); }
.fab-income  { background: var(--good); color: #fff; }
.fab-expense { background: var(--bad);  color: #fff; }

/* ── Empty ── */
.empty { text-align: center; padding: 50px 20px; }
.empty-ico   { font-size: 44px; margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--t2); margin-bottom: 6px; }
.empty-sub   { font-size: 13px; color: var(--t3); }

/* ── Loading ── */
.loading { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; gap: 12px; color: var(--t3); font-size: 14px; }
.spinner { width: 24px; height: 24px; border: 2.5px solid var(--border); border-top-color: var(--branch); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error ── */
.err-box { margin: 10px 16px 0; background: #FDEAEA; color: var(--bad); border-radius: 8px; padding: 10px 14px; font-size: 13px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
  background: var(--t1); color: #fff; padding: 10px 20px; border-radius: 999px;
  font-size: 13px; z-index: 200; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,.25); animation: toastIn .2s ease;
}
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(6px); } }

/* ── Sheet ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 50;
  display: flex; align-items: flex-end; animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } }
.sheet {
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 10px 20px 36px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp .25s cubic-bezier(.22,1,.36,1);
}
@keyframes slideUp { from { transform: translateY(24px); opacity: 0; } }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 6px auto 18px; }
.sheet-title  { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
.divider      { height: 1px; background: var(--border); margin: 14px 0; }

/* ── Form ── */
.field { margin-bottom: 12px; }
.field-lbl {
  font-size: 11px; font-weight: 700; color: var(--t3);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; display: block;
}
.field-input, .field-select {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 15px; background: var(--surface);
  color: var(--t1); font-family: inherit; outline: none;
  transition: border-color .15s; -webkit-appearance: none;
}
.field-input:focus, .field-select:focus { border-color: var(--branch); }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── Buttons ── */
.btn-primary {
  width: 100%; background: var(--branch); color: #fff; border: none;
  border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-bottom: 8px; transition: opacity .15s;
}
.btn-primary:active   { opacity: .85; }
.btn-primary.income   { background: var(--good); }
.btn-primary.expense  { background: var(--bad); }
.btn-secondary {
  width: 100%; background: transparent; color: var(--t2);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
}

/* Stock fields toggle */
.stock-fields { display: none; }
.stock-fields.visible { display: block; }
</style>
</head>
<body id="bodyEl">

<!-- Header -->
<div class="header">
  <div class="hdr-top">
    <div>
      <div class="app-name" id="appName">บัญชีร้านกาแฟ</div>
      <div class="app-sub">รายรับ-รายจ่ายภาพรวม</div>
    </div>
    <div class="branch-pills">
      <button class="branch-pill" id="pillRush"     onclick="setBranch('rush')">Rush</button>
      <button class="branch-pill" id="pillRushhour" onclick="setBranch('rushhour')">Rush Hour</button>
      <button class="branch-pill active" id="pillAll" onclick="setBranch('all')">รวม</button>
    </div>
  </div>
  <div class="tab-row">
    <button class="tab-btn active" id="tabDash" onclick="setView('dash')">Dashboard</button>
    <button class="tab-btn"        id="tabList" onclick="setView('list')">รายการ</button>
  </div>
</div>

<div id="errorBox"></div>
<div id="content">
  <div class="loading"><div class="spinner"></div>กำลังโหลดข้อมูล</div>
</div>

<!-- FAB: income + expense -->
<div class="fab-group" id="fabGroup">
  <button class="fab fab-expense" onclick="openAddSheet('expense')" title="บันทึกรายจ่าย">−</button>
  <button class="fab fab-income"  onclick="openAddSheet('income')"  title="บันทึกรายรับ">+</button>
</div>

<div id="sheetRoot"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyjUOdNkE1p-07AdWC_ouO4SiuI3v-blgStfJWSdr-i1K4ydDVztRsTM1319siKXIrH/exec";

const EXP_CATS = [
  {id:"stock",      label:"วัตถุดิบ/สต็อก"},
  {id:"rent",       label:"ค่าเช่า/พนักงาน"},
  {id:"commission", label:"ค่าคอมมิชชั่น"},
  {id:"other",      label:"อื่นๆ"},
];
const CHANNELS   = [{id:"store",label:"หน้าร้าน"},{id:"delivery",label:"Delivery"}];
const STOCK_UNITS = ["g","kg","ml","l","ชิ้น","ถุง","ขวด","กล่อง"];

// ─── State ───────────────────────────────────────────────
let state = {
  income: [], expense: [], view: "dash",
  period: "week", branch: "all", selectedDate: todayStr(),
};
let chartTrend = null;
let chartExp   = null;

// ─── Helpers ─────────────────────────────────────────────
function uid()  { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s) { const d=document.createElement("div"); d.textContent=s??""; return d.innerHTML; }
function fmt(n) { return Number(n||0).toLocaleString("th-TH",{maximumFractionDigits:0}); }

function todayStr() {
  const d=new Date(), y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function normDate(val) {
  if (!val) return "";
  const m=String(val).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[0];
  const d=new Date(val);
  if (!isNaN(d)) { const y=d.getFullYear(), mo=String(d.getMonth()+1).padStart(2,"0"), dy=String(d.getDate()).padStart(2,"0"); return `${y}-${mo}-${dy}`; }
  return String(val);
}

// ─── API ─────────────────────────────────────────────────
async function apiCall(action, payload) {
  const body = new URLSearchParams({action});
  if (payload) body.set("payload",JSON.stringify(payload));
  const res  = await fetch(API_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain;charset=utf-8"},body:body.toString()});
  const text = await res.text();
  if (!res.ok) throw new Error("HTTP "+res.status);
  return JSON.parse(text);
}

async function loadAll() {
  try {
    const data = await apiCall("getAll");
    if (data.error) throw new Error(data.error);
    state.income  = (data.income||[]).map(r=>({...r,amount:Number(r.amount)||0,date:normDate(r.date)}));
    state.expense = (data.expense||[]).map(r=>({...r,amount:Number(r.amount)||0,date:normDate(r.date)}));
    document.getElementById("errorBox").innerHTML="";
  } catch(e) {
    document.getElementById("errorBox").innerHTML=`<div class="err-box">เชื่อมต่อไม่ได้: ${esc(e.message)}</div>`;
  }
  if (state.view!=="add") render();
}

// ─── Branch ──────────────────────────────────────────────
function setBranch(b) {
  state.branch = b;
  ["rush","rushhour","all"].forEach(x=>document.getElementById("pill"+x.charAt(0).toUpperCase()+x.slice(1))?.classList.toggle("active",x===b));
  document.getElementById("bodyEl").className = b;
  document.getElementById("appName").textContent =
    b==="rush"?"บัญชีร้านกาแฟ Rush": b==="rushhour"?"บัญชีร้านกาแฟ Rush Hour":"บัญชีร้านกาแฟ (รวม)";
  render();
}

function branchData() {
  if (state.branch==="all") return {income:state.income, expense:state.expense};
  return {income:state.income.filter(r=>r.branch===state.branch), expense:state.expense.filter(r=>r.branch===state.branch)};
}

// ─── View ─────────────────────────────────────────────────
function setView(v) {
  state.view=v;
  ["dash","list"].forEach(x=>document.getElementById("tab"+x.charAt(0).toUpperCase()+x.slice(1))?.classList.toggle("active",x===v));
  document.getElementById("fabGroup").style.display = v==="dash"?"":"none";
  render();
}

// ─── Period ───────────────────────────────────────────────
function setPeriod(p) { state.period=p; render(); }
function setDate(d)   { state.selectedDate=d; render(); }

function getRangeStart(p) {
  const now=new Date();
  if (p==="week")  { const d=new Date(now); d.setDate(d.getDate()-7); return d; }
  if (p==="month") { const d=new Date(now); d.setDate(d.getDate()-30); return d; }
  return new Date(0);
}
function filterPeriod(arr,p) { const s=getRangeStart(p); return arr.filter(r=>{ const d=new Date(r.date); return !isNaN(d)&&d>=s; }); }
function filterDay(arr,ds)   { return arr.filter(r=>r.date===ds); }
function toLocalStr(d)       { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }

// ─── Render ───────────────────────────────────────────────
function render() {
  const ct=document.getElementById("content");
  if (state.view==="dash") ct.innerHTML=renderDash();
  else                     ct.innerHTML=renderList();
  if (state.view==="dash") setTimeout(drawCharts,0);
}

function renderDash() {
  const {income:inc0, expense:exp0} = branchData();
  const isDay = state.period==="day";
  const incF  = isDay ? filterDay(inc0,state.selectedDate) : filterPeriod(inc0,state.period);
  const expF  = isDay ? filterDay(exp0,state.selectedDate) : filterPeriod(exp0,state.period);
  const totInc = incF.reduce((s,r)=>s+r.amount,0);
  const totExp = expF.reduce((s,r)=>s+r.amount,0);
  const profit = totInc-totExp;

  // by channel
  const byChannel = {};
  CHANNELS.forEach(c=>byChannel[c.id]=0);
  incF.forEach(r=>{ byChannel[r.channel]=(byChannel[r.channel]||0)+r.amount; });

  // by branch (only when all)
  const byBranch={rush:0,rushhour:0};
  incF.forEach(r=>{ if(byBranch[r.branch]!==undefined) byBranch[r.branch]+=r.amount; });

  // stock summary
  const stockRows = expF.filter(r=>r.category==="stock"&&r.itemName);
  const stockMap  = {};
  stockRows.forEach(r=>{ const k=r.itemName; if(!stockMap[k]) stockMap[k]={name:r.itemName,unit:r.itemUnit||"",qty:0,amount:0}; stockMap[k].qty+=Number(r.itemQty)||0; stockMap[k].amount+=r.amount; });
  const stockSummary = Object.values(stockMap).sort((a,b)=>b.amount-a.amount);

  return `
    <div class="period-row">
      ${["day","week","month","all"].map(p=>`
        <div class="pchip ${state.period===p?"active":""}" onclick="setPeriod('${p}')">
          ${p==="day"?"รายวัน":p==="week"?"7 วัน":p==="month"?"30 วัน":"ทั้งหมด"}
        </div>`).join("")}
    </div>

    ${isDay?`<div class="content" style="padding-top:8px;padding-bottom:0;">
      <div class="field day-picker">
        <label class="field-lbl">เลือกวันที่</label>
        <input type="date" class="field-input" value="${state.selectedDate}" onchange="setDate(this.value)" />
      </div>
    </div>`:""}

    <div class="content">
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-lbl">รายรับรวม</div>
          <div class="kpi-val income">${fmt(totInc)}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-lbl">รายจ่ายรวม</div>
          <div class="kpi-val expense">${fmt(totExp)}</div>
        </div>
        <div class="kpi-card wide">
          <div class="kpi-lbl">กำไร / ขาดทุน</div>
          <div class="kpi-val ${profit>=0?"profit-pos":"profit-neg"}">${profit>=0?"+":""}${fmt(profit)} ฿</div>
        </div>
      </div>

      ${state.branch==="all"?`
        <div class="section-title">รายรับแยกสาขา</div>
        <div class="branch-row">
          <div class="kpi-card"><div class="kpi-lbl">Rush</div><div class="kpi-val income">${fmt(byBranch.rush)}</div></div>
          <div class="kpi-card"><div class="kpi-lbl">Rush Hour</div><div class="kpi-val income">${fmt(byBranch.rushhour)}</div></div>
        </div>`:""}

      <div class="section-title">รายรับแยกช่องทาง</div>
      <div class="kpi-grid">
        ${CHANNELS.map(c=>`<div class="kpi-card"><div class="kpi-lbl">${c.label}</div><div class="kpi-val income">${fmt(byChannel[c.id]||0)}</div></div>`).join("")}
      </div>

      ${!isDay?`
        <div class="section-title">แนวโน้มรายวัน</div>
        <div class="chart-wrap"><canvas id="chartTrend"></canvas></div>`:""}

      <div class="section-title">รายจ่ายแยกหมวด</div>
      <div class="chart-wrap" style="height:180px;"><canvas id="chartExp"></canvas></div>

      ${stockSummary.length?`
        <div class="section-title">วัตถุดิบที่ซื้อ</div>
        <div class="stock-summary">
          ${stockSummary.map((r,i)=>`
            <div class="stock-row">
              <div>
                <div class="stock-item-name">${esc(r.name)}</div>
                <div class="stock-item-sub">${r.qty>0?`รวม ${r.qty} ${esc(r.unit)}`:"ไม่ได้ระบุจำนวน"}</div>
              </div>
              <div class="stock-item-amt">${fmt(r.amount)} ฿</div>
            </div>`).join("")}
        </div>`:""}
    </div>`;
}

function renderList() {
  const {income:inc0, expense:exp0} = branchData();
  const all = [
    ...inc0.map(r=>({...r,_type:"income",  _label:CHANNELS.find(c=>c.id===r.channel)?.label||r.channel})),
    ...exp0.map(r=>({...r,_type:"expense", _label:EXP_CATS.find(c=>c.id===r.category)?.label||r.category})),
  ].sort((a,b)=>new Date(b.date)-new Date(a.date));

  const ct = `<div class="content">`;
  if (!all.length) return ct+`<div class="empty"><div class="empty-ico">📋</div><div class="empty-title">ยังไม่มีรายการ</div><div class="empty-sub">กดปุ่ม + หรือ − เพื่อบันทึก</div></div></div>`;

  return ct+`<div class="txn-list">${all.map(r=>`
    <div class="txn-row">
      <div>
        <div class="txn-label">${esc(r._label)} ${r._type==="income"?"(รายรับ)":"(รายจ่าย)"}</div>
        <div class="txn-meta">${esc(r.note||"")}${r.note&&r.date?" · ":""}${esc(r.date||"")}</div>
      </div>
      <div class="txn-right">
        <div class="txn-amt" style="color:${r._type==="income"?"var(--good)":"var(--bad)"}">
          ${r._type==="income"?"+":"-"}${fmt(r.amount)} ฿
        </div>
        <button class="del-btn" onclick="deleteRecord('${r._type}','${r.id}')">✕</button>
      </div>
    </div>`).join("")}</div></div>`;
}

// ─── Charts ───────────────────────────────────────────────
function drawCharts() {
  const {income:inc0, expense:exp0} = branchData();
  const incF = state.period==="day"?filterDay(inc0,state.selectedDate):filterPeriod(inc0,state.period);
  const expF = state.period==="day"?filterDay(exp0,state.selectedDate):filterPeriod(exp0,state.period);

  const branchColor = state.branch==="rush"?"#C1502E":state.branch==="rushhour"?"#C49000":"#A9744F";

  // Trend chart
  const tc = document.getElementById("chartTrend");
  if (tc && state.period!=="day") {
    const days = state.period==="week"?7:30;
    const labels=[], store=[], delivery=[], expArr=[];
    for (let i=days-1;i>=0;i--) {
      const d=new Date(); d.setDate(d.getDate()-i);
      const key=toLocalStr(d);
      labels.push(d.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit"}));
      store.push(incF.filter(r=>r.date===key&&r.channel==="store").reduce((s,r)=>s+r.amount,0));
      delivery.push(incF.filter(r=>r.date===key&&r.channel==="delivery").reduce((s,r)=>s+r.amount,0));
      expArr.push(expF.filter(r=>r.date===key).reduce((s,r)=>s+r.amount,0));
    }
    if (chartTrend) chartTrend.destroy();
    chartTrend = new Chart(tc,{
      type:"bar",
      data:{labels,datasets:[
        {label:"หน้าร้าน", data:store,    backgroundColor:branchColor, stack:"i"},
        {label:"Delivery", data:delivery, backgroundColor:branchColor+"88", stack:"i"},
        {label:"รายจ่าย",  data:expArr,   type:"line", borderColor:"#B5482A", backgroundColor:"#B5482A", tension:.3},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}},
        plugins:{legend:{position:"bottom",labels:{font:{size:11}}}}},
    });
  }

  // Expense donut
  const ec = document.getElementById("chartExp");
  if (ec) {
    const byCat={};
    EXP_CATS.forEach(c=>byCat[c.id]=0);
    expF.forEach(r=>{ byCat[r.category]=(byCat[r.category]||0)+r.amount; });
    if (chartExp) chartExp.destroy();
    chartExp = new Chart(ec,{
      type:"doughnut",
      data:{
        labels:EXP_CATS.map(c=>c.label),
        datasets:[{data:EXP_CATS.map(c=>byCat[c.id]),backgroundColor:["#B5482A","#A9744F","#4E7A30","#C08010"]}],
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:11}}}}},
    });
  }
}

// ─── Delete ───────────────────────────────────────────────
async function deleteRecord(type, id) {
  try {
    await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:new URLSearchParams({action:type==="income"?"deleteIncome":"deleteExpense",id}).toString()});
    showToast("ลบรายการแล้ว");
    await loadAll();
  } catch(e) { showToast("ลบไม่สำเร็จ"); }
}

// ─── Add Sheet ────────────────────────────────────────────
function closeSheet() { document.getElementById("sheetRoot").innerHTML=""; }

function openAddSheet(type) {
  const isIncome  = type==="income";
  const defBranch = state.branch==="all"?"rush":state.branch;

  const incomeForm = `
    <div class="field">
      <label class="field-lbl">สาขา</label>
      <select id="fBranch" class="field-select">
        <option value="rush"     ${defBranch==="rush"?"selected":""}>Rush</option>
        <option value="rushhour" ${defBranch==="rushhour"?"selected":""}>Rush Hour</option>
      </select>
    </div>
    <div class="field">
      <label class="field-lbl">วันที่</label>
      <input id="fDate" class="field-input" type="date" value="${todayStr()}" />
    </div>
    <div class="field">
      <label class="field-lbl">ช่องทาง</label>
      <select id="fChannel" class="field-select">
        ${CHANNELS.map(c=>`<option value="${c.id}">${c.label}</option>`).join("")}
      </select>
    </div>
    <div class="field">
      <label class="field-lbl">จำนวนเงิน (บาท)</label>
      <input id="fAmt" class="field-input" type="number" inputmode="decimal" min="0" placeholder="0" autofocus />
    </div>
    <div class="field">
      <label class="field-lbl">บันทึกเพิ่มเติม</label>
      <input id="fNote" class="field-input" placeholder="เช่น ยอดขายกะเช้า" />
    </div>
    <button class="btn-primary income" onclick="submitIncome()">บันทึกรายรับ</button>`;

  const expenseForm = `
    <div class="field">
      <label class="field-lbl">สาขา</label>
      <select id="fBranch" class="field-select">
        <option value="rush"     ${defBranch==="rush"?"selected":""}>Rush</option>
        <option value="rushhour" ${defBranch==="rushhour"?"selected":""}>Rush Hour</option>
      </select>
    </div>
    <div class="field">
      <label class="field-lbl">วันที่</label>
      <input id="fDate" class="field-input" type="date" value="${todayStr()}" />
    </div>
    <div class="field">
      <label class="field-lbl">หมวดรายจ่าย</label>
      <select id="fCat" class="field-select" onchange="toggleStockFields(this.value)">
        ${EXP_CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join("")}
      </select>
    </div>
    <div class="stock-fields" id="stockFields">
      <div class="field">
        <label class="field-lbl">ชื่อวัตถุดิบ</label>
        <input id="fItemName" class="field-input" placeholder="เช่น เมล็ดกาแฟ" />
      </div>
      <div class="row-2">
        <div class="field">
          <label class="field-lbl">จำนวน</label>
          <input id="fItemQty" class="field-input" type="number" inputmode="decimal" min="0" placeholder="0" />
        </div>
        <div class="field">
          <label class="field-lbl">หน่วย</label>
          <select id="fItemUnit" class="field-select">${STOCK_UNITS.map(u=>`<option>${u}</option>`).join("")}</select>
        </div>
      </div>
    </div>
    <div class="field">
      <label class="field-lbl">จำนวนเงิน (บาท)</label>
      <input id="fAmt" class="field-input" type="number" inputmode="decimal" min="0" placeholder="0" autofocus />
    </div>
    <div class="field">
      <label class="field-lbl">บันทึกเพิ่มเติม</label>
      <input id="fNote" class="field-input" placeholder="เช่น ซื้อเมล็ดกาแฟ 5 kg" />
    </div>
    <button class="btn-primary expense" onclick="submitExpense()">บันทึกรายจ่าย</button>`;

  document.getElementById("sheetRoot").innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeSheet()">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">${isIncome?"💚 บันทึกรายรับ":"🔴 บันทึกรายจ่าย"}</div>
        ${isIncome ? incomeForm : expenseForm}
        <button class="btn-secondary" onclick="closeSheet()" style="margin-top:8px;">ยกเลิก</button>
      </div>
    </div>`;
}

function toggleStockFields(val) {
  const sf = document.getElementById("stockFields");
  if (sf) sf.classList.toggle("visible", val==="stock");
}

async function submitIncome() {
  const branch  = document.getElementById("fBranch").value;
  const date    = document.getElementById("fDate").value;
  const channel = document.getElementById("fChannel").value;
  const amount  = Number(document.getElementById("fAmt").value);
  const note    = document.getElementById("fNote").value;
  if (!amount||amount<=0) { showToast("กรุณาใส่จำนวนเงิน"); return; }
  closeSheet();
  try {
    await apiCall("addIncome",{id:uid(),date,channel,amount,note,branch});
    showToast(`บันทึกรายรับ ${fmt(amount)} บาทแล้ว`);
    await loadAll();
  } catch(e) { showToast("บันทึกไม่สำเร็จ"); }
}

async function submitExpense() {
  const branch   = document.getElementById("fBranch").value;
  const date     = document.getElementById("fDate").value;
  const category = document.getElementById("fCat").value;
  const amount   = Number(document.getElementById("fAmt").value);
  const note     = document.getElementById("fNote").value;
  const itemName = category==="stock"?document.getElementById("fItemName")?.value:"";
  const itemQty  = category==="stock"?document.getElementById("fItemQty")?.value:"";
  const itemUnit = category==="stock"?document.getElementById("fItemUnit")?.value:"";
  if (!amount||amount<=0) { showToast("กรุณาใส่จำนวนเงิน"); return; }
  closeSheet();
  try {
    await apiCall("addExpense",{id:uid(),date,category,amount,note,branch,itemName,itemQty,itemUnit});
    showToast(`บันทึกรายจ่าย ${fmt(amount)} บาทแล้ว`);
    await loadAll();
  } catch(e) { showToast("บันทึกไม่สำเร็จ"); }
}

// ─── Toast ────────────────────────────────────────────────
function showToast(msg) {
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2400);
}

// ─── Init ─────────────────────────────────────────────────
setBranch("all");
loadAll();
setInterval(loadAll, 15000);
</script>
