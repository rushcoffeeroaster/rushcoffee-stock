<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>บัญชีร้านกาแฟ · Rush Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F4F3EF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rush Coffee">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ===================== Rush Coffee · Modern Silver & Gold (Light Luxe) ===================== */
  :root{
    --bg:#F4F3EF;
    --bg-grad: radial-gradient(135% 110% at 50% -10%, #FCFBF9 0%, #F4F3EF 55%, #ECEAE3 100%);
    --surface:#FFFFFF; --surface-2:#FBFAF7;
    --line:#EAE7DF; --line-strong:#DDD9CF;
    --ink:#1E232A; --ink-2:#5D646E; --ink-3:#9A9FA8;
    --green:#2F8F5B; --green-bg:#E9F4EE;
    --red:#C7553B; --red-bg:#FBEDE9;
    --amber:#CF9A2B; --amber-bg:#FAF2DD;
    --shadow-sm:0 1px 2px rgba(28,28,36,.04), 0 2px 8px rgba(28,28,36,.05);
    --shadow-md:0 6px 22px rgba(28,28,36,.09);
    --radius:16px; --radius-sm:11px;
    --accent:#6E7884; --accent-deep:#3E4651; --accent-soft:#EEF1F4;
    --accent-grad:linear-gradient(135deg,#8C95A1 0%,#69727E 100%);
    --metal-grad:linear-gradient(120deg,#737C88 0%,#C7CDD5 48%,#6A7280 100%);
    --on-accent:#FFFFFF;
  }
  body.theme-rush{ --accent:#6E7884; --accent-deep:#3A424D; --accent-soft:#EDF0F3;
    --accent-grad:linear-gradient(135deg,#8C95A1 0%,#69727E 100%);
    --metal-grad:linear-gradient(120deg,#737C88 0%,#CBD1D8 48%,#6A7280 100%); --on-accent:#FFFFFF; }
  body.theme-rushhour{ --accent:#B5870F; --accent-deep:#8A6608; --accent-soft:#FAF3DC;
    --accent-grad:linear-gradient(135deg,#E3BE4A 0%,#C2941A 100%);
    --metal-grad:linear-gradient(120deg,#A6800E 0%,#EBC955 48%,#9A7110 100%); --on-accent:#3A2C04; }
  body.theme-all{ --accent:#3C4450; --accent-deep:#262C35; --accent-soft:#ECEEF1;
    --accent-grad:linear-gradient(135deg,#4A5360 0%,#2E343D 100%);
    --metal-grad:linear-gradient(120deg,#4A5360 0%,#8A93A0 48%,#3A424D 100%); --on-accent:#FFFFFF; }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{ font-family:"Inter","Noto Sans Thai",-apple-system,"Segoe UI",sans-serif;
    background:var(--bg); background-image:var(--bg-grad); background-attachment:fixed;
    color:var(--ink); padding-bottom:84px; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:560px; margin:0 auto; padding:14px 16px 8px; }

  .appbar{ position:sticky; top:0; z-index:40; background:rgba(244,243,239,.82); backdrop-filter:saturate(160%) blur(14px); border-bottom:1px solid var(--line); }
  .appbar-inner{ max-width:560px; margin:0 auto; padding:11px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .logo{ width:38px; height:38px; border-radius:12px; display:grid; place-items:center; color:#fff; background:var(--accent-grad); box-shadow:var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.35); flex-shrink:0; }
  .logo svg{ width:21px; height:21px; }
  .brand-text{ min-width:0; }
  .wordmark{ font-weight:800; font-size:15px; letter-spacing:.4px; line-height:1; background:var(--metal-grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .brand-tag{ font-size:11px; color:var(--ink-3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .live-dot{ display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--ink-3); border:1px solid var(--line); background:var(--surface); padding:5px 9px; border-radius:999px; white-space:nowrap; }
  .live-dot i{ width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px var(--green-bg); }

  h1{ font-size:20px; font-weight:800; margin:6px 0 2px; letter-spacing:.2px; }
  h2{ font-size:15px; font-weight:800; margin:20px 0 10px; display:flex; align-items:center; gap:7px; }
  h2::before{ content:""; width:4px; height:15px; border-radius:3px; background:var(--accent-grad); }
  .sub{ color:var(--ink-2); font-size:12.5px; margin:0 0 14px; }

  .branch-row{ display:flex; gap:7px; margin:0 0 14px; }
  .branch-btn{ flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:11px 6px; border-radius:13px; font-size:13px; font-weight:700; cursor:pointer; border:1px solid var(--line); background:var(--surface); color:var(--ink-2); transition:.18s; box-shadow:var(--shadow-sm); }
  .branch-btn .sw{ width:11px; height:11px; border-radius:50%; box-shadow:inset 0 1px 1px rgba(255,255,255,.6); }
  .sw.silver{ background:linear-gradient(135deg,#C7CDD5,#7C8794); }
  .sw.gold{ background:linear-gradient(135deg,#EBC955,#B5870F); }
  .sw.all{ background:linear-gradient(135deg,#8A93A0,#2E343D); }
  .branch-btn.active{ color:var(--on-accent); border-color:transparent; background:var(--accent-grad); box-shadow:var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.3); }
  .branch-btn.active .sw{ box-shadow:0 0 0 2px rgba(255,255,255,.5); }

  .tabs{ display:flex; gap:6px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:4px; margin-bottom:14px; box-shadow:var(--shadow-sm); }
  .tab{ flex:1; text-align:center; padding:9px; border-radius:9px; font-size:13.5px; font-weight:700; cursor:pointer; color:var(--ink-2); transition:.15s; }
  .tab.active{ background:var(--accent-grad); color:var(--on-accent); box-shadow:var(--shadow-sm); }

  .row{ display:flex; gap:8px; margin-bottom:11px; }
  input,select{ width:100%; border:1px solid var(--line-strong); border-radius:10px; padding:10px 11px; font-size:14px; background:var(--surface); color:var(--ink); font-family:inherit; transition:.15s; }
  input:focus,select:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .btn-primary{ background:var(--accent-grad); color:var(--on-accent); border:none; border-radius:10px; padding:10px 16px; font-size:14px; font-weight:800; cursor:pointer; white-space:nowrap; box-shadow:var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.3); transition:.12s; }
  .btn-primary:active{ transform:scale(.97); }
  .btn-block{ width:100%; padding:13px; }
  .btn-income{ background:linear-gradient(135deg,#3BA06A,#2C8052) !important; color:#fff !important; }
  .btn-expense{ background:linear-gradient(135deg,#D06044,#B5482F) !important; color:#fff !important; }

  .chip{ border:1px solid var(--line); border-radius:999px; padding:7px 13px; font-size:13px; background:var(--surface); cursor:pointer; white-space:nowrap; color:var(--ink-2); font-weight:600; transition:.15s; }
  .chip.active{ background:var(--accent-grad); color:var(--on-accent); border-color:transparent; box-shadow:var(--shadow-sm); }
  .chiprow{ display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:none; }
  .chiprow::-webkit-scrollbar{ display:none; }

  .card{ border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); padding:15px; margin-bottom:11px; box-shadow:var(--shadow-sm); }
  .label{ font-size:12px; color:var(--ink-2); margin-bottom:5px; display:block; font-weight:600; }
  .field{ margin-bottom:13px; }

  /* ---------- Hero / KPIs ---------- */
  .hero{ position:relative; overflow:hidden; border-radius:var(--radius); padding:18px; margin-bottom:11px; color:#fff; background:var(--accent-grad); box-shadow:var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.25); }
  body.theme-rushhour .hero{ color:#3A2C04; }
  .hero .h-label{ font-size:12.5px; opacity:.85; margin:0 0 4px; font-weight:600; }
  .hero .h-value{ font-size:34px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; margin:0; }
  .hero .h-sub{ display:flex; gap:14px; margin-top:13px; font-size:12.5px; }
  .hero .h-sub b{ font-variant-numeric:tabular-nums; font-size:14px; display:block; margin-top:1px; }
  .hero .pill{ position:absolute; top:16px; right:16px; background:rgba(255,255,255,.2); padding:5px 11px; border-radius:999px; font-size:12px; font-weight:700; backdrop-filter:blur(4px); }

  .kpi-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
  .kpi-card{ border-radius:var(--radius-sm); padding:13px 14px; background:var(--surface); border:1px solid var(--line); box-shadow:var(--shadow-sm); }
  .kpi-card.wide{ grid-column:1 / -1; }
  .kpi-label{ font-size:11.5px; color:var(--ink-3); margin:0 0 5px; font-weight:600; }
  .kpi-value{ font-variant-numeric:tabular-nums; font-size:21px; font-weight:800; margin:0; line-height:1.1; }
  .kpi-value.income{ color:var(--green); } .kpi-value.expense{ color:var(--red); }
  .kpi-value.profit-pos{ color:var(--green); } .kpi-value.profit-neg{ color:var(--red); }
  .kpi-sub{ font-size:11px; color:var(--ink-3); margin:4px 0 0; }

  /* ---------- Branch comparison ---------- */
  .cmp-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .cmp-card{ border-radius:var(--radius-sm); padding:13px; background:var(--surface); border:1px solid var(--line); box-shadow:var(--shadow-sm); position:relative; overflow:hidden; }
  .cmp-card.silver{ border-top:3px solid #9AA3AE; }
  .cmp-card.gold{ border-top:3px solid #D9B43E; }
  .cmp-head{ display:flex; align-items:center; gap:7px; font-weight:800; font-size:13.5px; margin-bottom:9px; }
  .cmp-head .sw{ width:11px; height:11px; border-radius:50%; }
  .cmp-line{ display:flex; justify-content:space-between; font-size:12.5px; padding:3px 0; color:var(--ink-2); }
  .cmp-line b{ font-variant-numeric:tabular-nums; color:var(--ink); }

  /* ---------- Split bars ---------- */
  .split-row{ margin-bottom:11px; }
  .split-top{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; }
  .split-top b{ font-variant-numeric:tabular-nums; }
  .split-bg{ height:9px; border-radius:6px; background:var(--accent-soft); overflow:hidden; }
  .split-fg{ height:100%; border-radius:6px; transition:width .4s; }

  .chart-wrap{ position:relative; height:230px; margin:2px 0 6px; }
  .chart-hint{ font-size:11.5px; color:var(--ink-3); margin:-4px 0 8px; }

  /* ---------- Day nav (เลือกวันย้อนหลัง/ถัดไปทีละวัน) ---------- */
  .daynav{ display:flex; align-items:center; gap:8px; }
  .daynav input[type="date"]{ flex:1; }
  .daynav-btn{ flex:0 0 auto; width:40px; height:40px; border-radius:10px; border:1px solid var(--line-strong);
    background:var(--surface); font-size:18px; font-weight:800; color:var(--ink-2); cursor:pointer; display:grid; place-items:center; }
  .daynav-btn:active{ background:var(--accent-soft); }
  .daynav-btn:disabled{ opacity:.35; cursor:default; }
  .daynav-today{ flex:0 0 auto; border:none; background:var(--accent-grad); color:var(--on-accent); font-size:12.5px;
    font-weight:800; padding:0 12px; height:40px; border-radius:10px; cursor:pointer; white-space:nowrap; }

  /* ---------- Custom date range (กำหนดช่วงวันที่เอง) ---------- */
  .daterange{ display:flex; align-items:center; gap:8px; }
  .daterange input[type="date"]{ flex:1; min-width:0; }
  .daterange-sep{ color:var(--ink-3); font-weight:700; flex:0 0 auto; }
  .quickrange{ display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; }
  .quickrange-btn{ flex:0 0 auto; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-2);
    font-size:12px; font-weight:700; padding:7px 11px; border-radius:999px; cursor:pointer; white-space:nowrap; }
  .quickrange-btn:active{ background:var(--accent-soft); }
  .del-btn{ background:none; border:none; color:#C4B9AC; font-size:17px; cursor:pointer; padding:4px 8px; border-radius:8px; }
  .del-btn:active{ background:var(--red-bg); color:var(--red); }
  .empty{ text-align:center; padding:40px 16px; color:var(--ink-3); font-size:14px; }
  .loading-text{ color:var(--ink-3); font-size:14px; text-align:center; padding:36px 0; }
  .err-box{ background:var(--red-bg); color:var(--red); border:1px solid #EED2C8; border-radius:10px; padding:10px 13px; font-size:13px; margin-bottom:13px; font-weight:600; }
  .toast{ position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:13px; font-weight:600; z-index:120; box-shadow:var(--shadow-md); white-space:nowrap; }

  .list-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:4px 14px; }
  .log-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line); align-items:center; gap:10px; }
  .log-row:last-child{ border-bottom:none; }
  .day-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:18px 2px 8px; font-size:12.5px; font-weight:800; color:var(--ink-2); }
  .day-head:first-child{ margin-top:2px; }
  .day-net{ font-size:12px; font-weight:800; font-variant-numeric:tabular-nums; }
  .insight{ display:flex; gap:9px; align-items:flex-start; background:var(--accent-soft); border-radius:var(--radius-sm); padding:11px 13px; font-size:12.5px; color:var(--accent-deep); margin-bottom:8px; font-weight:500; }
  .insight svg{ width:17px; height:17px; flex-shrink:0; margin-top:1px; }

  .bottom-nav{ position:fixed; left:0; right:0; bottom:0; z-index:60; background:rgba(255,255,255,.86); backdrop-filter:saturate(160%) blur(14px); border-top:1px solid var(--line); padding:7px 10px calc(7px + env(safe-area-inset-bottom)); }
  .nav-inner{ display:flex; max-width:560px; margin:0 auto; gap:2px; }
  .nav-item{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; border-radius:13px; color:var(--ink-3); font-size:9.5px; font-weight:700; text-decoration:none; white-space:nowrap; transition:.15s; }
  .nav-item svg{ width:22px; height:22px; }
  .nav-item.active{ color:var(--accent-deep); background:var(--accent-soft); }

  /* ---------- ใบสรุปยอดรายวัน (Bill) ---------- */
  .bill-actions{ display:flex; gap:8px; margin-bottom:14px; }
  .bill-back{ flex:0 0 auto; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-2); border-radius:10px; padding:0 16px; font-size:14px; font-weight:700; cursor:pointer; }
  .bill-paper{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:22px 20px; }
  .bill-head{ text-align:center; padding-bottom:14px; margin-bottom:14px; border-bottom:1.5px dashed var(--line-strong); }
  .bill-shop{ font-weight:800; font-size:17px; letter-spacing:.4px; }
  .bill-branch{ font-size:13px; color:var(--ink-2); margin-top:4px; font-weight:600; }
  .bill-date{ font-size:12.5px; color:var(--ink-3); margin-top:2px; }
  .bill-sub{ font-size:11.5px; color:var(--ink-3); margin-top:6px; text-transform:uppercase; letter-spacing:.6px; }
  .bill-section{ margin-bottom:16px; }
  .bill-section-title{ font-size:12.5px; font-weight:800; color:var(--ink-2); margin-bottom:8px; }
  .bill-row{ display:flex; justify-content:space-between; gap:10px; padding:7px 0; border-bottom:1px dashed var(--line); font-size:13.5px; }
  .bill-row:last-of-type{ border-bottom:none; }
  .bill-row-label{ min-width:0; }
  .bill-row-note{ font-size:11.5px; color:var(--ink-3); margin-top:1px; }
  .bill-row-amt{ font-variant-numeric:tabular-nums; font-weight:700; white-space:nowrap; }
  .bill-empty{ font-size:12.5px; color:var(--ink-3); padding:6px 0; }
  .bill-subtotal{ display:flex; justify-content:space-between; padding-top:9px; margin-top:3px; border-top:1px solid var(--line-strong); font-size:13.5px; font-weight:800; }
  .bill-net{ display:flex; justify-content:space-between; align-items:center; padding:14px 0 4px; margin-top:4px; border-top:1.5px dashed var(--line-strong); font-size:16px; font-weight:800; color:var(--green); }
  .bill-net.neg{ color:var(--red); }
  .bill-foot{ text-align:center; font-size:11px; color:var(--ink-3); margin-top:16px; }

  @media print{
    body *{ visibility:hidden; }
    .bill-print-area, .bill-print-area *{ visibility:visible; }
    .bill-print-area{ position:absolute; left:0; top:0; width:100%; box-shadow:none; border:none; padding:0; }
    .no-print{ display:none !important; }
    body{ background:#fff; padding-bottom:0; }
  }
</style>
</head>
<body class="theme-all" id="bodyEl">

<div class="appbar">
  <div class="appbar-inner">
    <div class="brand">
      <div class="logo" aria-hidden="true">

</div>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13h16"/><path d="M5 13c0-3.9 3.1-7 7-7s7 3.1 7 7"/><path d="M4 13a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2"/></svg>
      ขนม
    </a>
  </div>
</nav>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyjUOdNkE1p-07AdWC_ouO4SiuI3v-blgStfJWSdr-i1K4ydDVztRsTM1319siKXIrH/exec";

const EXPENSE_CATEGORIES = [
  { id: "stock", label: "วัตถุดิบ/สต๊อก" },
  { id: "rent", label: "ค่าเช่า/พนักงาน/สาธารณูปโภค" },
  { id: "commission", label: "ค่าคอมมิชชั่น delivery" },
  { id: "other", label: "อื่นๆ" },
];
// ★ แยกช่องทาง Delivery เป็นรายแพลตฟอร์ม (Grab/Shopee/LINE MAN) — "delivery" เดิมเก็บไว้รองรับรายการเก่าก่อนแยก
const CHANNELS = [
  { id:"store", label:"หน้าร้าน" },
  { id:"grab", label:"Grab" },
  { id:"shopee", label:"Shopee Food" },
  { id:"lineman", label:"LINE MAN" },
  { id:"delivery", label:"Delivery (เก่า/ไม่ระบุแพลตฟอร์ม)" },
];
const DELIVERY_CHANNEL_IDS = ["grab", "shopee", "lineman", "delivery"];
const CHANNEL_COLORS = { store:"#3C4450", grab:"#00B14F", shopee:"#EE4D2D", lineman:"#00B300", delivery:"#CF9A2B" };
// ★ ช่องทางที่ผูกกับสาขาตายตัว (LINE MAN = Rush Hour เท่านั้น) — เลือกช่องทางนี้แล้วระบบล็อกสาขาให้อัตโนมัติ กันบันทึกผิดสาขา
const CHANNEL_BRANCH_LOCK = { lineman: "rushhour" };
const STOCK_UNITS = ["g", "kg", "ml", "l", "ชิ้น", "ถุง", "ขวด", "กล่อง"];
const CAT_COLORS = { stock:"#C7553B", rent:"#A9744F", commission:"#CF9A2B", other:"#9AA0A8" };
const BRANCH_LABEL = { rush:"Rush", rushhour:"Rush Hour", all:"รวมทั้งสองสาขา" };

let state = {
  income:[], expense:[], view:"dash", period:"week", selectedDate: todayStr(), branch:"all",
  // ★ ช่วงวันที่กำหนดเอง (สำหรับแท็บ "กำหนดช่วงวันที่") — ค่าเริ่มต้น 7 วันล่าสุด
  rangeStart: (()=>{ const d=new Date(); d.setDate(d.getDate()-6); return toLocalDateStr(d); })(),
  rangeEnd: todayStr(),
};
let chartInstance = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function fmtMoney(n){ return Number(n || 0).toLocaleString("th-TH", { maximumFractionDigits:0 }); }
function todayStr(){ return toLocalDateStr(new Date()); }
function toLocalDateStr(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${dd}`; }
function normalizeDate(val){
  if (!val) return "";
  const s = String(val);
  const match = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (match) return match[0];
  const d = new Date(s);
  if (!isNaN(d)) return toLocalDateStr(d);
  return s;
}

async function apiCall(action, payload){
  let res;
  try{
    const body = new URLSearchParams({ action });
    if (payload) body.set("payload", JSON.stringify(payload));
    res = await fetch(API_URL, { method:"POST", redirect:"follow", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: body.toString() });
  }catch(networkErr){ throw new Error("เชื่อมต่อเครือข่ายไม่ได้: " + networkErr.message); }
  const text = await res.text();
  if (!res.ok) throw new Error("เซิร์ฟเวอร์ตอบกลับ HTTP " + res.status + " — " + text.slice(0, 200));
  try{ return JSON.parse(text); } catch(e){ throw new Error("รูปแบบข้อมูลที่ได้ไม่ถูกต้อง: " + text.slice(0, 200)); }
}

async function loadAll(){
  try{
    const data = await apiCall("getAll");
    if (data.error) throw new Error(data.error);
    state.income = (data.income || []).map((r) => ({ ...r, amount:Number(r.amount)||0, date:normalizeDate(r.date) }));
    state.expense = (data.expense || []).map((r) => ({ ...r, amount:Number(r.amount)||0, date:normalizeDate(r.date) }));
    document.getElementById("errorBox").innerHTML = "";
  }catch(e){
    document.getElementById("errorBox").innerHTML = '<div class="err-box">เชื่อมต่อข้อมูลไม่สำเร็จ: ' + escapeHtml(e.message) + '</div>';
  }
  if (state.view !== "add") render();
}

function escapeHtml(s){ const div=document.createElement("div"); div.textContent = s==null?"":s; return div.innerHTML; }
function setView(v){
  state.view = v;
  document.getElementById("tabDash").classList.toggle("active", v==="dash");
  document.getElementById("tabAdd").classList.toggle("active", v==="add");
  document.getElementById("tabList").classList.toggle("active", v==="list");
  render();
}
function showToast(msg){ const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }

function getRangeStart(period){
  const now = new Date();
  if (period === "week"){ const d=new Date(now); d.setDate(d.getDate()-6); d.setHours(0,0,0,0); return d; }
  if (period === "month"){ const d=new Date(now); d.setDate(d.getDate()-29); d.setHours(0,0,0,0); return d; }
  return new Date(0);
}
function filterByPeriod(arr, period){ const start=getRangeStart(period); return arr.filter((r)=>{ const d=new Date(r.date); return !isNaN(d) && d>=start; }); }
function filterByDay(arr, dateStr){ return arr.filter((r)=>r.date===dateStr); }
// ★ กรองตามช่วงวันที่กำหนดเอง (รวมวันแรกและวันสุดท้าย) — เช่น 1-5, 5-12
function filterByRange(arr, startStr, endStr){
  if (!startStr || !endStr) return [];
  const s = startStr <= endStr ? startStr : endStr, e = startStr <= endStr ? endStr : startStr;
  return arr.filter((r)=> r.date && r.date>=s && r.date<=e);
}
function dateRangeDays(startStr, endStr){
  const a = new Date(startStr+"T00:00:00"), b = new Date(endStr+"T00:00:00");
  if (isNaN(a) || isNaN(b)) return 1;
  return Math.max(1, Math.round(Math.abs(b-a)/86400000)+1);
}
// ★ ดึงรายรับ/รายจ่ายตามโหมดที่กำลังดูอยู่ (รายวัน/สัปดาห์/เดือน/ทั้งหมด/ช่วงที่กำหนดเอง) — ใช้จุดเดียวทั้งหน้า dashboard และกราฟ
function getFilteredIncomeExpense(bd){
  if (state.period==="day") return { incomeF: filterByDay(bd.income, state.selectedDate), expenseF: filterByDay(bd.expense, state.selectedDate) };
  if (state.period==="range") return { incomeF: filterByRange(bd.income, state.rangeStart, state.rangeEnd), expenseF: filterByRange(bd.expense, state.rangeStart, state.rangeEnd) };
  return { incomeF: filterByPeriod(bd.income, state.period), expenseF: filterByPeriod(bd.expense, state.period) };
}

function getBranchData(){
  if (state.branch === "all") return { income: state.income, expense: state.expense };
  return { income: state.income.filter((r)=>r.branch===state.branch), expense: state.expense.filter((r)=>r.branch===state.branch) };
}
function setBranch(b){ state.branch=b; render(); }

function applyTheme(){
  document.getElementById("bodyEl").className =
    state.branch==="rush" ? "theme-rush" : state.branch==="rushhour" ? "theme-rushhour" : "theme-all";
  document.getElementById("branchRush").classList.toggle("active", state.branch==="rush");
  document.getElementById("branchRushhour").classList.toggle("active", state.branch==="rushhour");
  document.getElementById("branchAll").classList.toggle("active", state.branch==="all");
  document.getElementById("appTitle").textContent =
    state.branch==="all" ? "บัญชีรายรับ-รายจ่าย" : "บัญชี · สาขา " + BRANCH_LABEL[state.branch];
}

function render(){
  applyTheme();
  const hasData = state.income.length || state.expense.length;
  document.getElementById("summaryText").textContent = hasData ? "ภาพรวมรายรับ-รายจ่ายของร้าน" : "ยังไม่มีข้อมูล — เริ่มบันทึกรายการแรก";
  const content = document.getElementById("content");
  if (state.view==="dash") content.innerHTML = renderDash();
  else if (state.view==="add") content.innerHTML = renderAdd();
  else if (state.view==="bill") content.innerHTML = renderBill();
  else content.innerHTML = renderList();
  if (state.view==="dash") setTimeout(drawChart, 0);
  if (state.view==="add") setTimeout(toggleStockFields, 0);
}

// ---------- ใบสรุปยอดรายวัน (Bill) ----------
// ★ กดจากมุมมอง "รายวัน" — สรุปทุกรายการรายรับ/รายจ่ายของวันนั้นเป็นใบพร้อมพิมพ์/เซฟ PDF ให้ลูกน้องปิดยอดได้เลย
function openBill(){
  state.view = "bill";
  render();
  window.scrollTo({ top:0, behavior:"smooth" });
}
function closeBill(){
  state.view = "dash";
  render();
}
function billIncomeRowHtml(r){
  const label = CHANNELS.find((c)=>c.id===r.channel)?.label || r.channel;
  const branchTag = state.branch==="all" ? ` · ${BRANCH_LABEL[r.branch]||""}` : "";
  return `<div class="bill-row">
    <div class="bill-row-label">
      <div>${escapeHtml(label)}<span style="color:var(--ink-3); font-weight:500;">${branchTag}</span></div>
      ${r.note ? `<div class="bill-row-note">${escapeHtml(r.note)}</div>` : ""}
    </div>
    <div class="bill-row-amt" style="color:var(--green);">+${fmtMoney(r.amount)}</div>
  </div>`;
}
function billExpenseRowHtml(r){
  const label = EXPENSE_CATEGORIES.find((c)=>c.id===r.category)?.label || r.category;
  const branchTag = state.branch==="all" ? ` · ${BRANCH_LABEL[r.branch]||""}` : "";
  const stockDetail = r.category==="stock" && r.itemName
    ? `${escapeHtml(r.itemName)}${r.itemQty ? ` (${r.itemQty}${escapeHtml(r.itemUnit||"")})` : ""}${r.note ? " — " : ""}`
    : "";
  const noteText = stockDetail + (r.note||"");
  return `<div class="bill-row">
    <div class="bill-row-label">
      <div>${escapeHtml(label)}<span style="color:var(--ink-3); font-weight:500;">${branchTag}</span></div>
      ${noteText ? `<div class="bill-row-note">${escapeHtml(noteText)}</div>` : ""}
    </div>
    <div class="bill-row-amt" style="color:var(--red);">−${fmtMoney(r.amount)}</div>
  </div>`;
}
function renderBill(){
  const bd = getBranchData();
  const incomeF = filterByDay(bd.income, state.selectedDate);
  const expenseF = filterByDay(bd.expense, state.selectedDate);
  const totalIncome = incomeF.reduce((s,r)=>s+r.amount,0);
  const totalExpense = expenseF.reduce((s,r)=>s+r.amount,0);
  const net = totalIncome - totalExpense;
  const branchLabel = BRANCH_LABEL[state.branch] || "รวมทั้งสองสาขา";

  return `
    <div class="bill-actions no-print">
      <button type="button" class="bill-back" onclick="closeBill()">‹ กลับ</button>
      <button type="button" class="btn-primary btn-block" onclick="window.print()">🖨️ พิมพ์ / บันทึกเป็น PDF</button>
    </div>
    <div class="bill-print-area bill-paper">
      <div class="bill-head">
        <div class="bill-shop">RUSH COFFEE</div>
        <div class="bill-branch">สาขา ${escapeHtml(branchLabel)}</div>
        <div class="bill-date">${escapeHtml(dayHeadLabel(state.selectedDate))}</div>
        <div class="bill-sub">ใบสรุปยอดประจำวัน</div>
      </div>
      <div class="bill-section">
        <div class="bill-section-title">รายรับ (${incomeF.length} รายการ)</div>
        ${incomeF.length ? incomeF.map(billIncomeRowHtml).join("") : `<div class="bill-empty">ไม่มีรายการรายรับ</div>`}
        <div class="bill-subtotal"><span>รวมรายรับ</span><span style="color:var(--green);">+${fmtMoney(totalIncome)} ฿</span></div>
      </div>
      <div class="bill-section">
        <div class="bill-section-title">รายจ่าย (${expenseF.length} รายการ)</div>
        ${expenseF.length ? expenseF.map(billExpenseRowHtml).join("") : `<div class="bill-empty">ไม่มีรายการรายจ่าย</div>`}
        <div class="bill-subtotal"><span>รวมรายจ่าย</span><span style="color:var(--red);">−${fmtMoney(totalExpense)} ฿</span></div>
      </div>
      <div class="bill-net ${net>=0?"":"neg"}">
        <span>กำไรสุทธิ</span><span>${net>=0?"+":"−"}${fmtMoney(Math.abs(net))} ฿</span>
      </div>
      <div class="bill-foot">พิมพ์เมื่อ ${escapeHtml(new Date().toLocaleString("th-TH"))}</div>
    </div>`;
}

function toggleStockFields(){
  const sel=document.getElementById("expCategory"), box=document.getElementById("stockFields");
  if (sel && box) box.style.display = sel.value==="stock" ? "block" : "none";
}

// ---------- Dashboard ----------
function periodDays(){
  if (state.period==="week") return 7;
  if (state.period==="month") return 30;
  if (state.period==="range") return dateRangeDays(state.rangeStart, state.rangeEnd);
  return null;
}
function fmtShortThaiDate(s){ const d=new Date(s+"T00:00:00"); if (isNaN(d)) return s; return d.toLocaleDateString("th-TH",{ day:"2-digit", month:"short" }); }
function periodLabel(){
  if (state.period==="day") return "วันที่เลือก";
  if (state.period==="week") return "7 วันล่าสุด";
  if (state.period==="month") return "30 วันล่าสุด";
  if (state.period==="range") return fmtShortThaiDate(state.rangeStart) + " – " + fmtShortThaiDate(state.rangeEnd);
  return "ทั้งหมด";
}

function renderDash(){
  let html = `
    <div class="chiprow">
      <div class="chip ${state.period==="day"?"active":""}" onclick="setPeriod('day')">รายวัน</div>
      <div class="chip ${state.period==="week"?"active":""}" onclick="setPeriod('week')">7 วันล่าสุด</div>
      <div class="chip ${state.period==="month"?"active":""}" onclick="setPeriod('month')">30 วันล่าสุด</div>
      <div class="chip ${state.period==="range"?"active":""}" onclick="setPeriod('range')">กำหนดช่วงวันที่</div>
      <div class="chip ${state.period==="all"?"active":""}" onclick="setPeriod('all')">ทั้งหมด</div>
    </div>`;

  if (state.period==="day"){
    const isToday = state.selectedDate >= todayStr();
    html += `<div class="field" style="max-width:340px; margin-bottom:14px;">
      <label class="label">เลือกวันที่ดู — เลื่อนทีละวัน หรือกำหนดวันที่เองได้เลย</label>
      <div class="daynav">
        <button type="button" class="daynav-btn" onclick="shiftDay(-1)" aria-label="วันก่อนหน้า">‹</button>
        <input type="date" value="${state.selectedDate}" max="${todayStr()}" onchange="setSelectedDate(this.value)" />
        <button type="button" class="daynav-btn" onclick="shiftDay(1)" aria-label="วันถัดไป" ${isToday?"disabled":""}>›</button>
      </div>
      ${!isToday ? `<button type="button" class="daynav-today" style="margin-top:8px;" onclick="setSelectedDate(todayStr())">« กลับไปวันนี้</button>` : ""}
      <button type="button" class="btn-primary btn-block" style="margin-top:10px;" onclick="openBill()">🧾 ออกบิลสรุปยอดวันนี้</button>
    </div>`;
  }

  if (state.period==="range"){
    html += `<div class="field" style="margin-bottom:14px;">
      <label class="label">กำหนดช่วงวันที่เอง — เช่น วันที่ 1-5 หรือ 5-12</label>
      <div class="daterange">
        <input type="date" value="${state.rangeStart}" max="${todayStr()}" onchange="setRangeStart(this.value)" />
        <span class="daterange-sep">–</span>
        <input type="date" value="${state.rangeEnd}" max="${todayStr()}" onchange="setRangeEnd(this.value)" />
      </div>
      <div class="quickrange">
        <button type="button" class="quickrange-btn" onclick="setQuickRange(6)">7 วันล่าสุด</button>
        <button type="button" class="quickrange-btn" onclick="setQuickRange(13)">14 วันล่าสุด</button>
        <button type="button" class="quickrange-btn" onclick="setMonthToDate()">ตั้งแต่ต้นเดือนนี้</button>
      </div>
    </div>`;
  }

  const bd = getBranchData();
  const { incomeF, expenseF } = getFilteredIncomeExpense(bd);

  const totalIncome = incomeF.reduce((s,r)=>s+r.amount,0);
  const totalExpense = expenseF.reduce((s,r)=>s+r.amount,0);
  const profit = totalIncome - totalExpense;
  const margin = totalIncome>0 ? (profit/totalIncome*100) : 0;
  const txCount = incomeF.length + expenseF.length;

  // เฉลี่ยต่อวัน
  let dayCount = periodDays();
  if (dayCount===null){
    const days = new Set([...incomeF, ...expenseF].map((r)=>r.date).filter(Boolean));
    dayCount = Math.max(1, days.size);
  } else if (state.period==="day") dayCount = 1;
  const avgIncome = totalIncome / dayCount;

  // ช่องทาง
  const byChannel = {}; CHANNELS.forEach((c)=>byChannel[c.id]=0);
  incomeF.forEach((r)=>{ byChannel[r.channel]=(byChannel[r.channel]||0)+r.amount; });
  // สาขา
  const byBranch = { rush:0, rushhour:0 }, byBranchExp = { rush:0, rushhour:0 };
  incomeF.forEach((r)=>{ if (byBranch[r.branch]!==undefined) byBranch[r.branch]+=r.amount; });
  expenseF.forEach((r)=>{ if (byBranchExp[r.branch]!==undefined) byBranchExp[r.branch]+=r.amount; });
  // หมวดรายจ่าย
  const byCat = {}; EXPENSE_CATEGORIES.forEach((c)=>byCat[c.id]=0);
  expenseF.forEach((r)=>{ byCat[r.category]=(byCat[r.category]||0)+r.amount; });
  const topCat = EXPENSE_CATEGORIES.map((c)=>({ ...c, amt:byCat[c.id]||0 })).sort((a,b)=>b.amt-a.amt)[0];

  // วันขายดีที่สุด
  let bestDay=null, bestVal=-1;
  const byDayInc={};
  incomeF.forEach((r)=>{ byDayInc[r.date]=(byDayInc[r.date]||0)+r.amount; });
  Object.entries(byDayInc).forEach(([d,v])=>{ if (v>bestVal){ bestVal=v; bestDay=d; } });

  // Hero
  const profitClass = profit>=0 ? "" : "neg";
  html += `
    <div class="hero">
      <span class="pill">${periodLabel()}</span>
      <p class="h-label">กำไรสุทธิ ${profit>=0?"":"(ขาดทุน)"}</p>
      <p class="h-value">${profit>=0?"":"−"}${fmtMoney(Math.abs(profit))} ฿</p>
      <div class="h-sub">
        <span>รายรับ<b>+${fmtMoney(totalIncome)}</b></span>
        <span>รายจ่าย<b>−${fmtMoney(totalExpense)}</b></span>
        <span>อัตรากำไร<b>${margin.toFixed(0)}%</b></span>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card"><p class="kpi-label">รายรับรวม</p><p class="kpi-value income">${fmtMoney(totalIncome)}</p><p class="kpi-sub">${incomeF.length} รายการ</p></div>
      <div class="kpi-card"><p class="kpi-label">รายจ่ายรวม</p><p class="kpi-value expense">${fmtMoney(totalExpense)}</p><p class="kpi-sub">${expenseF.length} รายการ</p></div>
      <div class="kpi-card"><p class="kpi-label">เฉลี่ยรายรับต่อวัน</p><p class="kpi-value">${fmtMoney(avgIncome)}</p><p class="kpi-sub">จาก ${dayCount} วัน</p></div>
      <div class="kpi-card"><p class="kpi-label">อัตรากำไร</p><p class="kpi-value ${margin>=0?"profit-pos":"profit-neg"}">${margin.toFixed(1)}%</p><p class="kpi-sub">${txCount} ธุรกรรม</p></div>
    </div>`;

  // Insights
  const insights = [];
  if (totalIncome>0 && bestDay){
    const dlabel = new Date(bestDay).toLocaleDateString("th-TH", { day:"2-digit", month:"short" });
    insights.push(`วันขายดีที่สุดในช่วงนี้คือ <b>${dlabel}</b> ทำรายรับ <b>${fmtMoney(bestVal)} ฿</b>`);
  }
  if (topCat && topCat.amt>0){
    insights.push(`รายจ่ายสูงสุดมาจากหมวด <b>${topCat.label}</b> รวม <b>${fmtMoney(topCat.amt)} ฿</b> (${totalExpense>0?(topCat.amt/totalExpense*100).toFixed(0):0}% ของรายจ่าย)`);
  }
  const deliveryTotalAmt = DELIVERY_CHANNEL_IDS.reduce((s,id)=>s+(byChannel[id]||0),0);
  if (deliveryTotalAmt>0 && totalIncome>0){
    insights.push(`ยอด Delivery รวมทุกแพลตฟอร์มคิดเป็น <b>${(deliveryTotalAmt/totalIncome*100).toFixed(0)}%</b> ของรายรับ — ค่าคอมฯ ที่จ่ายไป <b>${fmtMoney(byCat.commission||0)} ฿</b>`);
  }
  const bestPlatform = DELIVERY_CHANNEL_IDS.filter(id=>id!=="delivery").map(id=>({ id, amt:byChannel[id]||0 })).sort((a,b)=>b.amt-a.amt)[0];
  if (bestPlatform && bestPlatform.amt>0){
    insights.push(`แพลตฟอร์ม Delivery ที่ขายดีสุดคือ <b>${CHANNELS.find(c=>c.id===bestPlatform.id).label}</b> ทำยอด <b>${fmtMoney(bestPlatform.amt)} ฿</b>`);
  }
  if (insights.length){
    html += `<h2>สรุปเชิงลึก</h2>`;
    insights.forEach((t)=>{ html += `<div class="insight"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2Z"/><path d="M9 21h6M10 17v4M14 17v4"/></svg><div>${t}</div></div>`; });
  }

  // Branch comparison (all)
  if (state.branch==="all"){
    const rProfit = byBranch.rush - byBranchExp.rush;
    const hProfit = byBranch.rushhour - byBranchExp.rushhour;
    html += `<h2>เปรียบเทียบรายสาขา</h2>
      <div class="cmp-grid">
        <div class="cmp-card silver">
          <div class="cmp-head"><span class="sw" style="background:linear-gradient(135deg,#C7CDD5,#7C8794)"></span>Rush</div>
          <div class="cmp-line">รายรับ <b style="color:var(--green)">${fmtMoney(byBranch.rush)}</b></div>
          <div class="cmp-line">รายจ่าย <b style="color:var(--red)">${fmtMoney(byBranchExp.rush)}</b></div>
          <div class="cmp-line">กำไร <b style="color:${rProfit>=0?"var(--green)":"var(--red)"}">${rProfit>=0?"+":"−"}${fmtMoney(Math.abs(rProfit))}</b></div>
        </div>
        <div class="cmp-card gold">
          <div class="cmp-head"><span class="sw" style="background:linear-gradient(135deg,#EBC955,#B5870F)"></span>Rush Hour</div>
          <div class="cmp-line">รายรับ <b style="color:var(--green)">${fmtMoney(byBranch.rushhour)}</b></div>
          <div class="cmp-line">รายจ่าย <b style="color:var(--red)">${fmtMoney(byBranchExp.rushhour)}</b></div>
          <div class="cmp-line">กำไร <b style="color:${hProfit>=0?"var(--green)":"var(--red)"}">${hProfit>=0?"+":"−"}${fmtMoney(Math.abs(hProfit))}</b></div>
        </div>
      </div>`;
  }

  // Channel split — ★ แยก Delivery เป็นรายแพลตฟอร์ม (Grab/Shopee/LINE MAN) แทนที่จะรวมเป็นก้อนเดียว
  const chTotal = CHANNELS.reduce((s,c)=>s+(byChannel[c.id]||0),0);
  html += `<h2>รายรับแยกตามช่องทาง</h2><div class="card">`;
  CHANNELS.forEach((c)=>{
    const v = byChannel[c.id]||0;
    if (v<=0 && c.id==="delivery") return; // ซ่อนแถว "เก่า/ไม่ระบุ" ถ้าไม่มีข้อมูลค้าง
    const pct = chTotal>0 ? (v/chTotal*100) : 0;
    const col = CHANNEL_COLORS[c.id] || "var(--accent)";
    html += `<div class="split-row">
      <div class="split-top"><span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${col};margin-right:6px;"></span>${c.label} <span style="color:var(--ink-3)">${pct.toFixed(0)}%</span></span><b>${fmtMoney(v)} ฿</b></div>
      <div class="split-bg"><div class="split-fg" style="width:${pct}%; background:${col}"></div></div>
    </div>`;
  });
  html += `</div>`;

  // Trend
  html += `<h2>แนวโน้มรายวัน</h2>`;
  html += state.period==="day"
    ? `<p style="color:var(--ink-3); font-size:13px; margin-top:-4px;">สลับไปแท็บ "7 วันล่าสุด" หรือ "30 วันล่าสุด" เพื่อดูแนวโน้มเทียบหลายวัน</p>`
    : `<p class="chart-hint">แตะแท่งกราฟวันไหน เพื่อดูยอดขายวันนั้นแบบละเอียด</p><div class="card"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>`;

  // Expense by category
  html += `<h2>รายจ่ายแยกตามหมวด</h2>`;
  if (totalExpense>0){
    html += `<div class="card"><div class="chart-wrap" style="height:200px;"><canvas id="expenseChart"></canvas></div>`;
    EXPENSE_CATEGORIES.forEach((c)=>{
      const v = byCat[c.id]||0; if (v<=0) return;
      const pct = totalExpense>0 ? (v/totalExpense*100):0;
      html += `<div class="split-row">
        <div class="split-top"><span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${CAT_COLORS[c.id]};margin-right:6px;"></span>${c.label} <span style="color:var(--ink-3)">${pct.toFixed(0)}%</span></span><b>${fmtMoney(v)} ฿</b></div>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="empty">ยังไม่มีรายจ่ายในช่วงนี้</div>`;
  }

  // Stock purchased
  html += `<h2>สรุปวัตถุดิบที่ซื้อ</h2>${renderStockSummary(expenseF)}`;
  return html;
}

function renderStockSummary(expenseF){
  const stockRows = expenseF.filter((r)=>r.category==="stock" && r.itemName);
  if (stockRows.length===0) return `<p style="color:var(--ink-3); font-size:13px;">ยังไม่มีข้อมูลวัตถุดิบในช่วงนี้ — กรอกชื่อวัตถุดิบตอนบันทึกรายจ่ายหมวด "วัตถุดิบ/สต๊อก" เพื่อให้ขึ้นสรุปที่นี่</p>`;
  const summary = {};
  stockRows.forEach((r)=>{
    const key = r.itemName + "|" + (r.itemUnit||"");
    if (!summary[key]) summary[key] = { name:r.itemName, unit:r.itemUnit||"", qty:0, amount:0 };
    summary[key].qty += Number(r.itemQty)||0;
    summary[key].amount += r.amount;
  });
  const rows = Object.values(summary).sort((a,b)=>b.amount-a.amount);
  const total = rows.reduce((s,r)=>s+r.amount,0);
  return `<div class="list-card">
    ${rows.map((r)=>`
      <div class="log-row">
        <div><p style="margin:0; font-size:14px; font-weight:600;">${escapeHtml(r.name)}</p>
        <p style="margin:1px 0 0; font-size:12px; color:var(--ink-3);">${r.qty>0?`รวม ${r.qty} ${escapeHtml(r.unit)}`:"ไม่ได้ระบุจำนวน"}</p></div>
        <span style="font-variant-numeric:tabular-nums; font-weight:800; color:var(--red);">${fmtMoney(r.amount)}</span>
      </div>`).join("")}
    <div class="log-row" style="border-top:1px solid var(--line);"><b style="font-size:13px;">รวมค่าวัตถุดิบ</b><b style="font-variant-numeric:tabular-nums; color:var(--red);">${fmtMoney(total)} ฿</b></div>
  </div>`;
}

function buildDailySeries(incomeF, expenseF, period){
  const keys = [];
  if (period==="range"){
    // ★ ช่วงที่กำหนดเอง — ไล่ทีละวันตั้งแต่ rangeStart ถึง rangeEnd (รวมวันแรก/สุดท้าย) แทนย้อนหลังตายตัว 7/30 วัน
    const s0 = state.rangeStart <= state.rangeEnd ? state.rangeStart : state.rangeEnd;
    const e0 = state.rangeStart <= state.rangeEnd ? state.rangeEnd : state.rangeStart;
    const s = new Date(s0+"T00:00:00"), e = new Date(e0+"T00:00:00");
    if (!isNaN(s) && !isNaN(e)){
      for (let d=new Date(s); d<=e; d.setDate(d.getDate()+1)) keys.push(toLocalDateStr(d));
    }
  } else {
    const days = period==="week"?7:30;
    for (let i=days-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); keys.push(toLocalDateStr(d)); }
  }
  const labels = keys.map((key)=>{ const d=new Date(key+"T00:00:00"); return d.toLocaleDateString("th-TH",{ day:"2-digit", month:"2-digit" }); });
  const storeArr = keys.map((key)=>incomeF.filter((r)=>r.date===key && r.channel==="store").reduce((s,r)=>s+r.amount,0));
  const deliveryArr = keys.map((key)=>incomeF.filter((r)=>r.date===key && DELIVERY_CHANNEL_IDS.includes(r.channel)).reduce((s,r)=>s+r.amount,0)); // รวมทุกแพลตฟอร์ม delivery
  const expenseArr = keys.map((key)=>expenseF.filter((r)=>r.date===key).reduce((s,r)=>s+r.amount,0));
  return { labels, keys, storeArr, deliveryArr, expenseArr };
}

// ★ กดแท่งกราฟ/จุดในกราฟแนวโน้ม → กระโดดไปดูวันนั้นแบบละเอียด (โหมด "รายวัน")
function jumpToDay(dateKey){
  if (!dateKey) return;
  state.period = "day";
  state.selectedDate = dateKey;
  render();
  window.scrollTo({ top:0, behavior:"smooth" });
}
// ★ เลื่อนดูวันก่อนหน้า/ถัดไปทีละวัน จากวันที่กำลังดูอยู่ (ไปอนาคตเกินวันนี้ไม่ได้)
function shiftDay(delta){
  const d = new Date(state.selectedDate + "T00:00:00");
  const base = isNaN(d) ? new Date() : d;
  base.setDate(base.getDate() + delta);
  const next = toLocalDateStr(base);
  if (next > todayStr()) return;
  state.selectedDate = next;
  render();
}

// ★ กำหนดช่วงวันที่เอง (แท็บ "กำหนดช่วงวันที่") — พิมพ์/เลือกวันเริ่ม-สิ้นสุดได้อิสระ เช่น 1-5, 5-12
function setRangeStart(v){
  state.rangeStart = v;
  if (state.rangeStart > state.rangeEnd) state.rangeEnd = state.rangeStart; // กันช่วงกลับด้าน (เริ่มหลังจบ)
  render();
}
function setRangeEnd(v){
  state.rangeEnd = v;
  if (state.rangeEnd < state.rangeStart) state.rangeStart = state.rangeEnd; // กันช่วงกลับด้าน (จบก่อนเริ่ม)
  render();
}
function setQuickRange(daysBack){
  const e = new Date(); const s = new Date(); s.setDate(s.getDate()-daysBack);
  state.rangeStart = toLocalDateStr(s); state.rangeEnd = toLocalDateStr(e);
  render();
}
function setMonthToDate(){
  const now = new Date();
  state.rangeStart = toLocalDateStr(new Date(now.getFullYear(), now.getMonth(), 1));
  state.rangeEnd = todayStr();
  render();
}

function drawChart(){
  const bd = getBranchData();
  const { incomeF, expenseF } = getFilteredIncomeExpense(bd);
  const primary = state.branch==="rush" ? "#6E7884" : state.branch==="rushhour" ? "#C2941A" : "#3C4450";
  const secondary = state.branch==="rush" ? "#B6BEC8" : state.branch==="rushhour" ? "#E6C24E" : "#8A93A0";

  const trendCanvas = document.getElementById("trendChart");
  if (trendCanvas && state.period!=="day"){
    const { labels, keys, storeArr, deliveryArr, expenseArr } = buildDailySeries(incomeF, expenseF, state.period);
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(trendCanvas, {
      type:"bar",
      data:{ labels, datasets:[
        { label:"หน้าร้าน", data:storeArr, backgroundColor:primary, stack:"income", borderRadius:4 },
        { label:"Delivery", data:deliveryArr, backgroundColor:secondary, stack:"income", borderRadius:4 },
        { label:"รายจ่าย", data:expenseArr, type:"line", borderColor:"#C7553B", backgroundColor:"#C7553B", tension:.35, pointRadius:2, borderWidth:2 },
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        onClick:(evt, elements)=>{ if (elements.length) jumpToDay(keys[elements[0].index]); },
        onHover:(evt, elements)=>{ evt.native.target.style.cursor = elements.length ? "pointer" : "default"; },
        scales:{ x:{ stacked:true, grid:{ display:false } }, y:{ stacked:true, beginAtZero:true, grid:{ color:"#EEEBE3" } } },
        plugins:{ legend:{ position:"bottom", labels:{ font:{ size:11 }, usePointStyle:true, pointStyle:"circle" } } } },
    });
  } else if (chartInstance){ chartInstance.destroy(); chartInstance=null; }

  const expCanvas = document.getElementById("expenseChart");
  if (expCanvas){
    const byCat={}; EXPENSE_CATEGORIES.forEach((c)=>byCat[c.id]=0);
    expenseF.forEach((r)=>{ byCat[r.category]=(byCat[r.category]||0)+r.amount; });
    if (window._expChart) window._expChart.destroy();
    window._expChart = new Chart(expCanvas, {
      type:"doughnut",
      data:{ labels:EXPENSE_CATEGORIES.map((c)=>c.label), datasets:[{ data:EXPENSE_CATEGORIES.map((c)=>byCat[c.id]), backgroundColor:EXPENSE_CATEGORIES.map((c)=>CAT_COLORS[c.id]), borderWidth:2, borderColor:"#fff" }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:"62%", plugins:{ legend:{ position:"bottom", labels:{ font:{ size:11 }, usePointStyle:true, pointStyle:"circle" } } } },
    });
  }
}

// ★ ช่องทางบางอย่างผูกกับสาขาตายตัว (เช่น LINE MAN = Rush Hour เท่านั้น) — สลับสาขาให้อัตโนมัติเมื่อเลือกช่องทางนั้น
function onIncomeChannelChange(){
  const channelEl = document.getElementById("incChannel"), branchEl = document.getElementById("incBranch");
  if (!channelEl || !branchEl) return;
  const lockBranch = CHANNEL_BRANCH_LOCK[channelEl.value];
  if (lockBranch){
    branchEl.value = lockBranch;
    branchEl.disabled = true;
  } else {
    branchEl.disabled = false;
  }
}

async function submitIncome(){
  const branchEl=document.getElementById("incBranch"), channel=document.getElementById("incChannel").value,
    date=document.getElementById("incDate").value, amount=Number(document.getElementById("incAmount").value),
    note=document.getElementById("incNote").value;
  let branch=branchEl.value;
  // ★ เซฟตี้เน็ต: ถ้าช่องทางนี้ถูกล็อกสาขาไว้ (เช่น lineman → rushhour) แต่ไม่ตรง ให้บังคับแก้ก่อนบันทึกเสมอ
  const lockBranch = CHANNEL_BRANCH_LOCK[channel];
  if (lockBranch && branch !== lockBranch){
    branch = lockBranch;
    branchEl.value = lockBranch;
    showToast(`${CHANNELS.find((c)=>c.id===channel)?.label || channel} เป็นของสาขา Rush Hour — ปรับสาขาให้อัตโนมัติ`);
  }
  if (!amount || amount<=0){ showToast("กรุณาใส่จำนวนเงิน"); return; }
  try{
    await apiCall("addIncome", { id:uid(), date, channel, amount, note, branch });
    showToast(`บันทึกรายรับ ${fmtMoney(amount)} บาทแล้ว`);
    document.getElementById("incAmount").value=""; document.getElementById("incNote").value="";
    await loadAll();
  }catch(e){ showToast("บันทึกไม่สำเร็จ: " + e.message); }
}

async function submitExpense(){
  const branch=document.getElementById("expBranch").value, date=document.getElementById("expDate").value,
    category=document.getElementById("expCategory").value, amount=Number(document.getElementById("expAmount").value),
    note=document.getElementById("expNote").value;
  const itemName = category==="stock" ? document.getElementById("expItemName").value : "";
  const itemQty = category==="stock" ? document.getElementById("expItemQty").value : "";
  const itemUnit = category==="stock" ? document.getElementById("expItemUnit").value : "";
  if (!amount || amount<=0){ showToast("กรุณาใส่จำนวนเงิน"); return; }
  try{
    await apiCall("addExpense", { id:uid(), date, category, amount, note, branch, itemName, itemQty, itemUnit });
    showToast(`บันทึกรายจ่าย ${fmtMoney(amount)} บาทแล้ว`);
    document.getElementById("expAmount").value=""; document.getElementById("expNote").value="";
    if (category==="stock"){ document.getElementById("expItemName").value=""; document.getElementById("expItemQty").value=""; }
    await loadAll();
  }catch(e){ showToast("บันทึกไม่สำเร็จ: " + e.message); }
}

function renderList(){

  const all = [
    ...bd.income.map((r)=>({ ...r, type:"income", label:CHANNELS.find((c)=>c.id===r.channel)?.label || r.channel })),
    ...bd.expense.map((r)=>({ ...r, type:"expense", label:EXPENSE_CATEGORIES.find((c)=>c.id===r.category)?.label || r.category })),
  ].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (all.length===0) return `<div class="empty">ยังไม่มีรายการ — ไปที่แท็บ "บันทึกรายการ" เพื่อเริ่มบันทึก</div>`;

  // จัดกลุ่มเป็นกล่องแยกตามวัน + สรุปสุทธิของแต่ละวัน
  let html = "";
  let dayRows = [], lastDay = null;
  function flush(){
    if (!dayRows.length) return;
    const inc = dayRows.reduce((s,r)=>s+(r.type==="income"?r.amount:0), 0);
    const exp = dayRows.reduce((s,r)=>s+(r.type==="expense"?r.amount:0), 0);
    const net = inc - exp;
    const netColor = net>=0 ? "var(--green)" : "var(--red)";
    html += `<div class="day-head"><span>${escapeHtml(dayHeadLabel(lastDay))}</span>`
      + `<span class="day-net" style="color:${netColor}">สุทธิ ${net>=0?"+":"−"}${fmtMoney(Math.abs(net))} ฿</span></div>`;
    html += `<div class="list-card">` + dayRows.map(txRowHtml).join("") + `</div>`;
    dayRows = [];
  }
  all.forEach((r)=>{
    if (r.date !== lastDay){ flush(); lastDay = r.date; }
    dayRows.push(r);
  });
  flush();
  return html;
}

async function deleteRecord(type, id){
  try{
    await fetch(API_URL, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body:new URLSearchParams({ action: type==="income"?"deleteIncome":"deleteExpense", id }).toString() });
    showToast("ลบรายการแล้ว");
    await loadAll();
  }catch(e){ showToast("ลบไม่สำเร็จ: " + e.message); }
}

loadAll();
setInterval(() => { if (state.view!=="add") loadAll(); }, 15000);
