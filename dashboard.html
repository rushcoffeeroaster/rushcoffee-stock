<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>บัญชีร้านกาแฟ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
:root {
  --bg:#FAF6F0; --surface:#fff; --border:#EDE7DD;
  --t1:#2C1810; --t2:#7A6B62; --t3:#B5A99E;
  --good:#4E7A30; --warn:#C08010; --bad:#B5482A; --branch:#C1502E; --r:12px;
}
body.rushhour { --branch:#C49000; }
body { font-family:-apple-system,"Noto Sans Thai","Segoe UI",sans-serif; background:var(--bg); color:var(--t1); min-height:100vh; padding-bottom:96px; }

/* ── Header ── */
.header { position:sticky; top:0; z-index:20; background:var(--bg); border-bottom:1px solid var(--border); padding:18px 16px 0; }
.hdr-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.app-name { font-size:22px; font-weight:800; color:var(--branch); letter-spacing:-0.5px; }
.app-sub  { font-size:12px; color:var(--t3); margin-top:2px; }
.branch-toggle { display:flex; gap:6px; }
.branch-pill { padding:5px 14px; border-radius:999px; font-size:12px; font-weight:700; border:1.5px solid var(--border); background:var(--surface); color:var(--t3); cursor:pointer; white-space:nowrap; transition:all .15s; }
.branch-pill.active { background:var(--branch); color:#fff; border-color:var(--branch); }

/* ── Period chips ── */
.chips-wrap { display:flex; gap:6px; overflow-x:auto; padding-bottom:14px; scrollbar-width:none; }
.chips-wrap::-webkit-scrollbar { display:none; }
.chip { padding:6px 14px; border-radius:999px; font-size:12px; font-weight:600; border:1.5px solid var(--border); background:var(--surface); color:var(--t2); cursor:pointer; white-space:nowrap; transition:all .15s; flex-shrink:0; }
.chip.active { background:var(--branch); color:#fff; border-color:var(--branch); }

/* ── Content ── */
.content { padding:14px 16px; }

/* ── KPI cards ── */
.kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.kpi-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r); padding:14px; }
.kpi-card.wide { grid-column:1/-1; }
.kpi-label { font-size:11px; color:var(--t3); font-weight:600; text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px; }
.kpi-value { font-size:22px; font-weight:800; font-family:monospace; letter-spacing:-0.5px; }
.kpi-value.income  { color:var(--good); }
.kpi-value.expense { color:var(--bad); }
.kpi-value.profit-pos { color:var(--good); }
.kpi-value.profit-neg { color:var(--bad); }

/* ── Section title ── */
.section-title { font-size:13px; font-weight:700; color:var(--t2); text-transform:uppercase; letter-spacing:.5px; margin:18px 0 8px; }

/* ── Chart card ── */
.chart-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r); padding:14px; margin-bottom:10px; }
.chart-wrap { position:relative; height:200px; }

/* ── Log rows ── */
.log-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:10px; }
.log-row { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border-bottom:1px solid var(--border); }
.log-row:last-child { border-bottom:none; }
.log-main { font-size:14px; font-weight:600; margin-bottom:2px; }
.log-sub  { font-size:12px; color:var(--t3); }
.log-amount { font-family:monospace; font-weight:700; font-size:15px; }
.del-btn { width:28px; height:28px; border-radius:7px; border:1.5px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--t3); font-size:14px; transition:all .15s; flex-shrink:0; margin-left:8px; }
.del-btn:hover { color:var(--bad); border-color:#F5C6BB; background:#FDEAEA; }

/* ── Empty ── */
.empty { text-align:center; padding:40px 20px; }
.empty-icon { margin:0 auto 12px; color:var(--t3); }
.empty-title { font-size:15px; font-weight:600; color:var(--t2); margin-bottom:4px; }
.empty-sub   { font-size:13px; color:var(--t3); }

/* ── Loading ── */
.loading { display:flex; flex-direction:column; align-items:center; padding:60px 20px; gap:12px; color:var(--t3); font-size:14px; }
.spinner { width:24px; height:24px; border:2.5px solid var(--border); border-top-color:var(--branch); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── Error ── */
.err-box { background:#FDEAEA; color:var(--bad); border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:10px; }

/* ── Date picker row ── */
.date-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.date-input { border:1.5px solid var(--border); border-radius:8px; padding:7px 10px; font-size:13px; background:var(--surface); color:var(--t1); font-family:inherit; outline:none; }
.date-input:focus { border-color:var(--branch); }

/* ── FAB ── */
.fab { position:fixed; bottom:24px; right:16px; z-index:30; width:56px; height:56px; border-radius:16px; background:var(--branch); color:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 18px rgba(0,0,0,.22); transition:transform .15s; }
.fab:active { transform:scale(.93); }

/* ── Toast ── */
.toast { position:fixed; bottom:92px; left:50%; transform:translateX(-50%); background:var(--t1); color:#fff; padding:10px 20px; border-radius:999px; font-size:13px; z-index:200; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.25); animation:toastIn .2s ease; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(6px)} }

/* ── Sheet ── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.42); z-index:50; display:flex; align-items:flex-end; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} }
.sheet { background:var(--surface); border-radius:20px 20px 0 0; padding:10px 20px 36px; width:100%; max-height:92vh; overflow-y:auto; animation:slideUp .25s cubic-bezier(.22,1,.36,1); }
@keyframes slideUp { from{transform:translateY(24px);opacity:0} }
.sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:6px auto 18px; }
.sheet-title  { font-size:18px; font-weight:700; margin-bottom:16px; }

/* ── Type toggle ── */
.type-toggle { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1.5px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:18px; }
.type-btn { padding:10px; text-align:center; font-size:14px; font-weight:700; cursor:pointer; border:none; background:var(--surface); color:var(--t3); transition:all .15s; }
.type-btn.active-income  { background:var(--good); color:#fff; }
.type-btn.active-expense { background:var(--bad); color:#fff; }

/* ── Form ── */
.field { margin-bottom:12px; }
.field-lbl { font-size:11px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; display:block; }
.field-input,.field-select { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:10px 12px; font-size:15px; background:var(--surface); color:var(--t1); font-family:inherit; outline:none; transition:border-color .15s; -webkit-appearance:none; }
.field-input:focus,.field-select:focus { border-color:var(--branch); }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.btn-primary { width:100%; padding:14px; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; color:#fff; background:var(--branch); margin-top:6px; transition:opacity .15s; }
.btn-primary:active { opacity:.85; }
.divider { height:1px; background:var(--border); margin:14px 0; }
</style>
</head>
<body id="bodyEl">

<div class="header">
  <div class="hdr-top">
    <div>
      <div class="app-name" id="appName">บัญชีร้านกาแฟ</div>
      <div class="app-sub"  id="appSub">กำลังโหลด...</div>
    </div>
    <div class="branch-toggle">
      <div class="branch-pill active" id="pillRush"     onclick="setBranch('rush')">Rush</div>
      <div class="branch-pill"        id="pillRushhour" onclick="setBranch('rushhour')">Rush Hour</div>
      <div class="branch-pill"        id="pillAll"      onclick="setBranch('all')">รวม</div>
    </div>
  </div>
  <div class="chips-wrap" id="periodChips"></div>
</div>

<div class="content" id="content">
  <div class="loading"><div class="spinner"></div>กำลังโหลดข้อมูล...</div>
</div>

<div id="errorBox"></div>

<button class="fab" onclick="openSheet()">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div id="sheetRoot"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyjUOdNkE1p-07AdWC_ouO4SiuI3v-blgStfJWSdr-i1K4ydDVztRsTM1319siKXIrH/exec";

const EXPENSE_CATS = [
  {id:"stock",      label:"วัตถุดิบ/สต๊อก"},
  {id:"rent",       label:"ค่าเช่า/พนักงาน/สาธารณูปโภค"},
  {id:"commission", label:"ค่าคอมมิชชั่น Delivery"},
  {id:"other",      label:"อื่นๆ"},
];
const CHANNELS    = [{id:"store",label:"หน้าร้าน"},{id:"delivery",label:"Delivery"}];
const STOCK_UNITS = ["g","kg","ml","l","ชิ้น","ถุง","ขวด","กล่อง"];
const PERIODS     = [{id:"day",label:"รายวัน"},{id:"week",label:"7 วัน"},{id:"month",label:"30 วัน"},{id:"all",label:"ทั้งหมด"}];

let state = { income:[], expense:[], period:"week", selectedDate:todayStr(), branch:"rush", loaded:false };
let _chartTrend=null, _chartExp=null;
let _form = { type:"income" };

// ─── Utils ───
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtMoney(n){ return Number(n||0).toLocaleString("th-TH",{maximumFractionDigits:0}); }
function todayStr(){ return toLocalDateStr(new Date()); }
function toLocalDateStr(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function normalizeDate(val){
  if(!val) return "";
  const s=String(val), m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[0];
  const d=new Date(s); if(!isNaN(d)) return toLocalDateStr(d);
  return s;
}
function esc(s){ const d=document.createElement("div"); d.textContent=s??""; return d.innerHTML; }
function showToast(msg){ const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function destroyCharts(){
  if(_chartTrend){ _chartTrend.destroy(); _chartTrend=null; }
  if(_chartExp){   _chartExp.destroy();   _chartExp=null;   }
}

// ─── API ───
async function apiCall(action, payload) {
  const body=new URLSearchParams({action});
  if(payload) body.set("payload",JSON.stringify(payload));
  const res=await fetch(API_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain;charset=utf-8"},body:body.toString()});
  const text=await res.text();
  if(!res.ok) throw new Error("HTTP "+res.status);
  try{ return JSON.parse(text); } catch(e){ throw new Error("รูปแบบข้อมูลไม่ถูกต้อง"); }
}

async function loadAll() {
  try {
    const data=await apiCall("getAll");
    if(data.error) throw new Error(data.error);
    state.income  = (data.income ||[]).map(r=>({...r,amount:Number(r.amount)||0,date:normalizeDate(r.date)}));
    state.expense = (data.expense||[]).map(r=>({...r,amount:Number(r.amount)||0,date:normalizeDate(r.date)}));
    state.loaded  = true;
    document.getElementById("errorBox").innerHTML="";
  } catch(e) {
    document.getElementById("errorBox").innerHTML=`<div class="err-box" style="margin:0 16px 10px">เชื่อมต่อไม่สำเร็จ: ${esc(e.message)}</div>`;
  }
  render();
}

// ─── Branch / Period ───
function setBranch(b){
  state.branch=b;
  ["rush","rushhour","all"].forEach(x=>document.getElementById("pill"+x.charAt(0).toUpperCase()+x.slice(1))?.classList.toggle("active",x===b));
  document.getElementById("bodyEl").className=b==="rushhour"?"rushhour":"";
  const name=b==="rush"?"Rush":b==="rushhour"?"Rush Hour":"Rush + Rush Hour";
  document.getElementById("appName").textContent="บัญชี "+name;
  render();
}
function setPeriod(p){ state.period=p; renderPeriodChips(); render(); }
function setDate(v){ state.selectedDate=v; render(); }

function renderPeriodChips(){
  document.getElementById("periodChips").innerHTML=PERIODS.map(p=>
    `<div class="chip ${state.period===p.id?"active":""}" onclick="setPeriod('${p.id}')">${p.label}</div>`
  ).join("")+
  (state.period==="day"?`<input type="date" class="date-input" value="${state.selectedDate}" onchange="setDate(this.value)" style="flex-shrink:0;">`:"");
}

// ─── Data helpers ───
function getBranchData(){
  if(state.branch==="all") return {income:state.income, expense:state.expense};
  return {income:state.income.filter(r=>r.branch===state.branch), expense:state.expense.filter(r=>r.branch===state.branch)};
}
function getRangeStart(p){
  if(p==="week"){  const d=new Date(); d.setDate(d.getDate()-7); return d; }
  if(p==="month"){ const d=new Date(); d.setDate(d.getDate()-30); return d; }
  return new Date(0);
}
function filterByPeriod(arr,p){ const s=getRangeStart(p); return arr.filter(r=>{ const d=new Date(r.date); return !isNaN(d)&&d>=s; }); }
function filterByDay(arr,ds){ return arr.filter(r=>r.date===ds); }
function getFiltered(arr){ return state.period==="day"?filterByDay(arr,state.selectedDate):filterByPeriod(arr,state.period); }

// ─── Render ───
function render(){
  destroyCharts();

  const bd   = getBranchData();
  const incF = getFiltered(bd.income);
  const expF = getFiltered(bd.expense);
  const totalInc = incF.reduce((s,r)=>s+r.amount,0);
  const totalExp = expF.reduce((s,r)=>s+r.amount,0);
  const profit   = totalInc-totalExp;

  // subtitle
  document.getElementById("appSub").textContent=
    state.loaded ? `รายรับ ฿${fmtMoney(totalInc)} · รายจ่าย ฿${fmtMoney(totalExp)}` : "กำลังโหลด...";

  let html="";

  // ── KPI ──
  html+=`<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">รายรับ</div><div class="kpi-value income">฿${fmtMoney(totalInc)}</div></div>
    <div class="kpi-card"><div class="kpi-label">รายจ่าย</div><div class="kpi-value expense">฿${fmtMoney(totalExp)}</div></div>
    <div class="kpi-card wide"><div class="kpi-label">กำไร/ขาดทุน</div><div class="kpi-value ${profit>=0?"profit-pos":"profit-neg"}">${profit>=0?"+":""}฿${fmtMoney(profit)}</div></div>
  </div>`;

  // ── branch breakdown (รวม) ──
  if(state.branch==="all"){
    const byBr={rush:0,rushhour:0};
    incF.forEach(r=>{ if(byBr[r.branch]!==undefined) byBr[r.branch]+=r.amount; });
    html+=`<div class="section-title">แยกตามสาขา</div>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Rush</div><div class="kpi-value income" style="font-size:18px">฿${fmtMoney(byBr.rush)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Rush Hour</div><div class="kpi-value income" style="font-size:18px">฿${fmtMoney(byBr.rushhour)}</div></div>
    </div>`;
  }

  // ── channel breakdown ──
  const byCh={store:0,delivery:0};
  incF.forEach(r=>{ if(byCh[r.channel]!==undefined) byCh[r.channel]+=r.amount; });
  html+=`<div class="section-title">ช่องทางรายรับ</div>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">หน้าร้าน</div><div class="kpi-value income" style="font-size:18px">฿${fmtMoney(byCh.store)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Delivery</div><div class="kpi-value income" style="font-size:18px">฿${fmtMoney(byCh.delivery)}</div></div>
  </div>`;

  // ── trend chart ──
  if(state.period!=="day"){
    html+=`<div class="section-title">แนวโน้มรายวัน</div>
    <div class="chart-card"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>`;
  }

  // ── expense chart ──
  html+=`<div class="section-title">รายจ่ายแยกหมวด</div>
  <div class="chart-card"><div class="chart-wrap" style="height:180px"><canvas id="expChart"></canvas></div></div>`;

  // ── stock summary ──
  html+=`<div class="section-title">สรุปวัตถุดิบ</div>${renderStock(expF)}`;

  // ── transaction list ──
  const all=[
    ...bd.income .map(r=>({...r,_type:"income",  _label:CHANNELS.find(c=>c.id===r.channel)?.label||r.channel})),
    ...bd.expense.map(r=>({...r,_type:"expense", _label:EXPENSE_CATS.find(c=>c.id===r.category)?.label||r.category})),
  ].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,30);

  html+=`<div class="section-title">รายการล่าสุด</div>`;
  if(!all.length){
    html+=`<div class="empty"><div class="empty-title">ยังไม่มีรายการ</div><div class="empty-sub">กดปุ่ม + เพื่อบันทึกรายการแรก</div></div>`;
  } else {
    html+=`<div class="log-card">${all.map(r=>`
      <div class="log-row">
        <div style="flex:1;min-width:0;">
          <div class="log-main">${esc(r._label)} <span style="font-size:11px;font-weight:600;color:${r._type==="income"?"var(--good)":"var(--bad)"};">${r._type==="income"?"รายรับ":"รายจ่าย"}</span></div>
          <div class="log-sub">${r.note?esc(r.note)+" · ":""}${esc(r.date||"")}${state.branch==="all"&&r.branch?" · "+esc(r.branch==="rush"?"Rush":"Rush Hour"):""}</div>
        </div>
        <div style="display:flex;align-items:center;flex-shrink:0;">
          <span class="log-amount" style="color:${r._type==="income"?"var(--good)":"var(--bad)"};">${r._type==="income"?"+":"-"}฿${fmtMoney(r.amount)}</span>
          <button class="del-btn" onclick="deleteRecord('${r._type}','${esc(r.id||"")}')">✕</button>
        </div>
      </div>`).join("")}</div>`;
  }

  document.getElementById("content").innerHTML=html;
  setTimeout(()=>drawCharts(incF,expF),0);
}

function renderStock(expF){
  const rows=expF.filter(r=>r.category==="stock");
  if(!rows.length) return `<p style="color:var(--t3);font-size:13px;margin-bottom:10px;">ยังไม่มีข้อมูลวัตถุดิบในช่วงนี้</p>`;
  const sum={};
  rows.forEach(r=>{
    const name=r.itemName||r.note||"ไม่ระบุชื่อ";
    const k=name+"|"+(r.itemUnit||"");
    if(!sum[k]) sum[k]={name,unit:r.itemUnit||"",qty:0,amount:0,noName:!r.itemName&&!r.note};
    sum[k].qty   +=Number(r.itemQty)||0;
    sum[k].amount+=r.amount;
  });
  return `<div class="log-card" style="margin-bottom:10px;">${Object.values(sum).sort((a,b)=>b.amount-a.amount).map(r=>`
    <div class="log-row">
      <div>
        <div class="log-main" style="${r.noName?"color:var(--t3);font-style:italic":""}">${esc(r.name)}</div>
        <div class="log-sub">${r.qty>0?`รวม ${r.qty} ${esc(r.unit)}`:"ไม่ได้ระบุจำนวน"}</div>
      </div>
      <span class="log-amount" style="color:var(--bad);">฿${fmtMoney(r.amount)}</span>
    </div>`).join("")}</div>`;
}

function drawCharts(incF,expF){
  const primary  = state.branch==="rush"?"#C1502E":state.branch==="rushhour"?"#C49000":"#A9744F";
  const secondary= state.branch==="rush"?"#E0926F":state.branch==="rushhour"?"#D4B030":"#C9A876";

  // Trend chart
  const trendEl=document.getElementById("trendChart");
  if(trendEl){
    const days=state.period==="month"?30:7;
    const labels=[],store=[],delivery=[],exp=[];
    for(let i=days-1;i>=0;i--){
      const d=new Date(); d.setDate(d.getDate()-i);
      const k=toLocalDateStr(d);
      labels.push(d.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit"}));
      store   .push(incF.filter(r=>r.date===k&&r.channel==="store"   ).reduce((s,r)=>s+r.amount,0));
      delivery.push(incF.filter(r=>r.date===k&&r.channel==="delivery").reduce((s,r)=>s+r.amount,0));
      exp     .push(expF.filter(r=>r.date===k).reduce((s,r)=>s+r.amount,0));
    }
    _chartTrend=new Chart(trendEl,{
      type:"bar",
      data:{labels,datasets:[
        {label:"หน้าร้าน", data:store,    backgroundColor:primary,  stack:"inc"},
        {label:"Delivery",  data:delivery, backgroundColor:secondary,stack:"inc"},
        {label:"รายจ่าย",  data:exp, type:"line", borderColor:"#B5482A", backgroundColor:"transparent", tension:.3},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}},
        plugins:{legend:{position:"bottom",labels:{font:{size:11},boxWidth:10}}}},
    });
  }

  // Expense doughnut
  const expEl=document.getElementById("expChart");
  if(expEl){
    const byCat={};
    EXPENSE_CATS.forEach(c=>byCat[c.id]=0);
    expF.forEach(r=>{ byCat[r.category]=(byCat[r.category]||0)+r.amount; });
    _chartExp=new Chart(expEl,{
      type:"doughnut",
      data:{labels:EXPENSE_CATS.map(c=>c.label), datasets:[{data:EXPENSE_CATS.map(c=>byCat[c.id]),backgroundColor:["#B5482A","#A9744F","#7D8C5C","#C9A876"]}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:11},boxWidth:10}}}},
    });
  }
}

// ─── Delete ───
async function deleteRecord(type,id){
  if(!id){ showToast("ไม่มี ID"); return; }
  try{
    await fetch(API_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:new URLSearchParams({action:type==="income"?"deleteIncome":"deleteExpense",id}).toString()});
    showToast("ลบรายการแล้ว");
    await loadAll();
  }catch(e){ showToast("ลบไม่สำเร็จ"); }
}

// ─── Sheet ───
function openSheet(){
  _form={type:"income"};
  renderSheet();
}
function closeSheet(){ document.getElementById("sheetRoot").innerHTML=""; }

function setFormType(t){
  _form.type=t;
  document.querySelectorAll(".type-btn").forEach(b=>{
    b.className="type-btn"+(b.dataset.t==="income"&&t==="income"?" active-income":b.dataset.t==="expense"&&t==="expense"?" active-expense":"");
  });
  document.getElementById("formFields").innerHTML=renderFormFields();
  setTimeout(()=>toggleStock(),0);
}

function toggleStock(){
  const sel=document.getElementById("fCategory");
  const box=document.getElementById("stockFields");
  if(sel&&box) box.style.display=sel.value==="stock"?"block":"none";
}

function renderFormFields(){
  const def=state.branch==="all"?"rush":state.branch;
  const branchOpts=`<option value="rush" ${def==="rush"?"selected":""}>Rush</option><option value="rushhour" ${def==="rushhour"?"selected":""}>Rush Hour</option>`;
  if(_form.type==="income"){
    return `
      <div class="field"><label class="field-lbl">สาขา</label><select id="fBranch" class="field-select">${branchOpts}</select></div>
      <div class="field"><label class="field-lbl">วันที่</label><input id="fDate" class="field-input" type="date" value="${todayStr()}"/></div>
      <div class="field"><label class="field-lbl">ช่องทาง</label><select id="fChannel" class="field-select">${CHANNELS.map(c=>`<option value="${c.id}">${c.label}</option>`).join("")}</select></div>
      <div class="field"><label class="field-lbl">จำนวนเงิน (บาท)</label><input id="fAmount" class="field-input" type="number" inputmode="decimal" min="0" placeholder="0"/></div>
      <div class="field"><label class="field-lbl">บันทึกเพิ่มเติม</label><input id="fNote" class="field-input" placeholder="เช่น ยอดขายกะเช้า"/></div>`;
  } else {
    return `
      <div class="field"><label class="field-lbl">สาขา</label><select id="fBranch" class="field-select">${branchOpts}</select></div>
      <div class="field"><label class="field-lbl">วันที่</label><input id="fDate" class="field-input" type="date" value="${todayStr()}"/></div>
      <div class="field"><label class="field-lbl">หมวด</label><select id="fCategory" class="field-select" onchange="toggleStock()">${EXPENSE_CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join("")}</select></div>
      <div id="stockFields">
        <div class="field"><label class="field-lbl">ชื่อวัตถุดิบ</label><input id="fItemName" class="field-input" placeholder="เช่น เมล็ดกาแฟ"/></div>
        <div class="row-2">
          <div class="field"><label class="field-lbl">จำนวน</label><input id="fItemQty" class="field-input" type="number" inputmode="decimal" min="0" placeholder="0"/></div>
          <div class="field"><label class="field-lbl">หน่วย</label><select id="fItemUnit" class="field-select">${STOCK_UNITS.map(u=>`<option>${u}</option>`).join("")}</select></div>
        </div>
      </div>
      <div class="field"><label class="field-lbl">จำนวนเงิน (บาท)</label><input id="fAmount" class="field-input" type="number" inputmode="decimal" min="0" placeholder="0"/></div>
      <div class="field"><label class="field-lbl">บันทึกเพิ่มเติม</label><input id="fNote" class="field-input" placeholder="เช่น ซื้อจาก supplier"/></div>`;
  }
}

function renderSheet(){
  document.getElementById("sheetRoot").innerHTML=`
    <div class="overlay" onclick="if(event.target===this)closeSheet()">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">บันทึกรายการ</div>
        <div class="type-toggle">
          <button class="type-btn active-income" data-t="income" onclick="setFormType('income')">รายรับ</button>
          <button class="type-btn" data-t="expense" onclick="setFormType('expense')">รายจ่าย</button>
        </div>
        <div id="formFields">${renderFormFields()}</div>
        <button class="btn-primary" onclick="submitForm()">บันทึก</button>
      </div>
    </div>`;
  setTimeout(()=>toggleStock(),0);
}

async function submitForm(){
  const branch  = document.getElementById("fBranch")?.value;
  const date    = document.getElementById("fDate")?.value;
  const amount  = Number(document.getElementById("fAmount")?.value);
  const note    = document.getElementById("fNote")?.value||"";
  if(!amount||amount<=0){ showToast("กรุณาใส่จำนวนเงิน"); return; }

  if(_form.type==="income"){
    const channel=document.getElementById("fChannel")?.value;
    closeSheet();
    try{
      await apiCall("addIncome",{id:uid(),date,channel,amount,note,branch});
      showToast(`บันทึกรายรับ ฿${fmtMoney(amount)} แล้ว`);
      await loadAll();
    }catch(e){ showToast("บันทึกไม่สำเร็จ: "+e.message); }
  } else {
    const category=document.getElementById("fCategory")?.value;
    const itemName=category==="stock"?(document.getElementById("fItemName")?.value||""):"";
    const itemQty =category==="stock"?(document.getElementById("fItemQty")?.value||""):"";
    const itemUnit=category==="stock"?(document.getElementById("fItemUnit")?.value||""):"";
    closeSheet();
    try{
      await apiCall("addExpense",{id:uid(),date,category,amount,note,branch,itemName,itemQty,itemUnit});
      showToast(`บันทึกรายจ่าย ฿${fmtMoney(amount)} แล้ว`);
      await loadAll();
    }catch(e){ showToast("บันทึกไม่สำเร็จ: "+e.message); }
  }
}

// ─── Init ───
setBranch("rush");
renderPeriodChips();
loadAll();
setInterval(loadAll, 30000);
</script>
