<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F3EE">
<title>บัญชีร้านกาแฟ · Rush Coffee</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #F7F3EE; --surface: #FFFFFF; --surface-2: #FBF8F3;
    --ink: #2A1D16; --muted: #9A8B7E; --line: #ECE4DA;
    --brand: #B5734A; --brand-deep: #3C2A21;
    --green: #6F8F4E; --amber: #D08A2C; --red: #C24A2C;
    --radius: 16px; --radius-sm: 11px;
    --shadow-sm: 0 1px 2px rgba(60,42,33,.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, "Noto Sans Thai", "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased; line-height: 1.5; transition: background .25s;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 18px 16px; }
  .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  h1 { font-size: 23px; font-weight: 800; margin: 0; letter-spacing: -.01em; transition: color .25s; }
  .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--brand); display: inline-block; margin-right: 7px; vertical-align: 1px; transition: background .25s; }
  .navlink { color: var(--brand); font-size: 13px; font-weight: 700; text-decoration: none; }
  .sub { color: var(--muted); font-size: 13px; margin: 3px 0 16px; }
  h2 { font-size: 15px; font-weight: 800; margin: 22px 0 11px; letter-spacing: -.01em; }
  h2 .h2-sub { font-weight: 500; color: var(--muted); font-size: 12px; margin-left: 6px; }

  .branch-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .branch-btn { flex: 1; text-align: center; padding: 10px 6px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; border: 1.5px solid var(--line); background: var(--surface); cursor: pointer; color: var(--ink); transition: .15s; }
  .branch-btn.active.b-rush { background: #C1502E; color: #fff; border-color: #C1502E; }
  .branch-btn.active.b-rushhour { background: #F2C744; color: #3A3420; border-color: #F2C744; }
  .branch-btn.active.b-all { background: #5C4A3D; color: #fff; border-color: #5C4A3D; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface-2); border: 1px solid var(--line); padding: 4px; border-radius: 13px; }
  .tab { flex: 1; text-align: center; padding: 9px 4px; border-radius: 9px; font-size: 13.5px; font-weight: 700; background: transparent; cursor: pointer; color: var(--muted); transition: .18s; border: none; }
  .tab.active { background: var(--surface); color: var(--brand-deep); box-shadow: var(--shadow-sm); }

  .chip { border: 1px solid var(--line); border-radius: 999px; padding: 7px 13px; font-size: 13px; font-weight: 600; background: var(--surface); cursor: pointer; white-space: nowrap; color: var(--ink); transition: .15s; }
  .chip.active { background: var(--brand-deep); color: #fff; border-color: var(--brand-deep); }
  .chiprow { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
  .chiprow::-webkit-scrollbar { display: none; }

  input, select { width: 100%; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 11px 12px; font-size: 15px; background: var(--surface); color: var(--ink); font-family: inherit; transition: .15s; }
  input:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(181,115,74,.12); }
  .btn-primary { background: var(--brand); color: #fff; border: none; border-radius: var(--radius-sm); padding: 11px 16px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: .15s; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-block { width: 100%; padding: 13px; }
  .btn-income { background: var(--green); }
  .btn-expense { background: var(--red); }
  .row { display: flex; gap: 8px; }

  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }
  .kpi-card { border-radius: var(--radius); padding: 14px; background: var(--surface); border: 1px solid var(--line); box-shadow: var(--shadow-sm); }
  .kpi-card.wide { grid-column: 1 / -1; }
  .kpi-label { font-size: 12px; color: var(--muted); margin: 0 0 5px; font-weight: 600; }
  .kpi-value { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .kpi-value.lg { font-size: 30px; }
  .kpi-value.income { color: var(--green); }
  .kpi-value.expense { color: var(--red); }
  .kpi-value.profit-pos { color: var(--green); }
  .kpi-value.profit-neg { color: var(--red); }
  .delta { font-size: 12px; font-weight: 700; margin-top: 5px; display: inline-flex; align-items: center; gap: 3px; }
  .delta.up { color: var(--green); } .delta.down { color: var(--red); } .delta.flat { color: var(--muted); }
  .kpi-card .unit { font-size: 13px; font-weight: 600; color: var(--muted); }

  .insight { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 13px 15px; margin-bottom: 9px; box-shadow: var(--shadow-sm); display: flex; gap: 11px; align-items: flex-start; }
  .insight .ic { font-size: 17px; }
  .insight p { margin: 0; font-size: 13.5px; }
  .insight .lead { font-weight: 700; }
  .insight .det { color: var(--muted); font-size: 12.5px; margin-top: 1px; }

  .chart-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-sm); margin-bottom: 4px; }
  .chart-wrap { position: relative; height: 220px; }

  .card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
  .label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; font-weight: 600; }
  .field { margin-bottom: 13px; }

  .toast { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: var(--brand-deep); color: #fff; padding: 11px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,.22); }
  .log-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); align-items: center; gap: 10px; }
  .log-row:last-child { border-bottom: none; }
  .loading-text { color: var(--muted); font-size: 14px; text-align: center; padding: 40px 0; }
  .skel { background: linear-gradient(90deg, var(--line) 25%, #F4EEE6 50%, var(--line) 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: var(--radius); height: 74px; margin-bottom: 10px; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .err-box { background: #FDEAEA; color: var(--red); border: 1px solid #F3CFCF; border-radius: var(--radius-sm); padding: 10px 13px; font-size: 13px; margin-bottom: 12px; }
  .del-btn { background: none; border: none; color: #c4a896; font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .empty { text-align: center; padding: 46px 16px; color: var(--muted); font-size: 14px; }
  .empty .big { font-size: 30px; display: block; margin-bottom: 8px; opacity: .6; }
  .list-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }

  /* theme: rush */
  body.theme-rush { --brand: #C1502E; }
  body.theme-rush h1 { color: #C1502E; }
  /* theme: rushhour */
  body.theme-rushhour { background: #FFFEF7; --surface: #FFFFFF; --surface-2: #FFFCF0; --line: #F0DD8A; --brand: #C9A21A; --ink: #3A3420; --muted: #a89233; }
  body.theme-rushhour .branch-btn { border-color: #F0DD8A; }
</style>
</head>
<body id="bodyEl">
<div class="wrap" id="app">
  <div class="head">
    <h1 id="appTitle"><span class="brand-dot"></span>บัญชีร้านกาแฟ</h1>
    <a class="navlink" href="index.html">สต๊อก →</a>
  </div>
  <p class="sub" id="summaryText">กำลังโหลดข้อมูล...</p>

  <div class="branch-row" id="branchRow">
    <div class="branch-btn b-rush" id="branchRush" onclick="setBranch('rush')">สาขา Rush</div>
    <div class="branch-btn b-rushhour" id="branchRushhour" onclick="setBranch('rushhour')">สาขา Rush Hour</div>
    <div class="branch-btn b-all active" id="branchAll" onclick="setBranch('all')">รวมสองสาขา</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabDash" onclick="setView('dash')">ภาพรวม</button>
    <button class="tab" id="tabAdd" onclick="setView('add')">บันทึกรายการ</button>
    <button class="tab" id="tabList" onclick="setView('list')">รายการทั้งหมด</button>
  </div>

  <div id="errorBox"></div>
  <div id="content"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>
</div>

<script>
// ===== Google Apps Script endpoint (เดิม ไม่เปลี่ยน) =====
const API_URL = "https://script.google.com/macros/s/AKfycbyjUOdNkE1p-07AdWC_ouO4SiuI3v-blgStfJWSdr-i1K4ydDVztRsTM1319siKXIrH/exec";

const EXPENSE_CATEGORIES = [
  { id: "stock", label: "วัตถุดิบ/สต๊อก", color: "#B5482A" },
  { id: "rent", label: "ค่าเช่า/พนักงาน/สาธารณูปโภค", color: "#A9744F" },
  { id: "commission", label: "ค่าคอมมิชชั่น delivery", color: "#7D8C5C" },
  { id: "other", label: "อื่นๆ", color: "#C9A876" },
];
const CHANNELS = [{ id: "store", label: "หน้าร้าน" }, { id: "delivery", label: "Delivery" }];
const STOCK_UNITS = ["g", "kg", "ml", "l", "ชิ้น", "ถุง", "ขวด", "กล่อง"];
const PERIOD_LABEL = { day: "วันนี้", week: "7 วัน", month: "30 วัน", all: "ทั้งหมด" };

let state = { income: [], expense: [], view: "dash", period: "week", selectedDate: todayStr(), branch: "all", loaded: false };
let charts = {};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function fmtMoney(n) { return Number(n || 0).toLocaleString("th-TH", { maximumFractionDigits: 0 }); }
function todayStr() { return toLocalDateStr(new Date()); }
function toLocalDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function escapeHtml(s) { const div = document.createElement("div"); div.textContent = s == null ? "" : s; return div.innerHTML; }

function normalizeDate(val) {
  if (!val) return "";
  const s = String(val);
  const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[0];
  const d = new Date(s);
  return !isNaN(d) ? toLocalDateStr(d) : s;
}

async function apiCall(action, payload) {
  let res;
  try {
    const body = new URLSearchParams({ action });
    if (payload) body.set("payload", JSON.stringify(payload));
    res = await fetch(API_URL, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: body.toString() });
  } catch (networkErr) { throw new Error("เชื่อมต่อเครือข่ายไม่ได้: " + networkErr.message); }
  const text = await res.text();
  if (!res.ok) throw new Error("เซิร์ฟเวอร์ตอบกลับ HTTP " + res.status + " — " + text.slice(0, 200));
  try { return JSON.parse(text); } catch (e) { throw new Error("รูปแบบข้อมูลที่ได้ไม่ถูกต้อง: " + text.slice(0, 200)); }
}

async function loadAll() {
  try {
    const data = await apiCall("getAll");
    if (data.error) throw new Error(data.error);
    state.income = (data.income || []).map((r) => ({ ...r, amount: Number(r.amount) || 0, date: normalizeDate(r.date) }));
    state.expense = (data.expense || []).map((r) => ({ ...r, amount: Number(r.amount) || 0, date: normalizeDate(r.date) }));
    document.getElementById("errorBox").innerHTML = "";
  } catch (e) {
    document.getElementById("errorBox").innerHTML = '<div class="err-box">เชื่อมต่อข้อมูลไม่สำเร็จ: ' + escapeHtml(e.message) + '</div>';
  }
  state.loaded = true;
  if (state.view !== "add") render();
}

function setView(v) {
  state.view = v;
  document.getElementById("tabDash").classList.toggle("active", v === "dash");
  document.getElementById("tabAdd").classList.toggle("active", v === "add");
  document.getElementById("tabList").classList.toggle("active", v === "list");
  render();
}

function setBranch(b) { state.branch = b; render(); }
function setPeriod(p) { state.period = p; render(); }
function setSelectedDate(d) { state.selectedDate = d; render(); }
function showToast(msg) { const t = document.createElement("div"); t.className = "toast"; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2200); }

// ---------- date ranges ----------
function periodLen(period) { return period === "week" ? 7 : period === "month" ? 30 : 0; }
function rangeFor(period) {
  // คืนช่วงปัจจุบันและช่วงก่อนหน้า (epoch ms) สำหรับเทียบ
  const end = Date.now();
  if (period === "all") return { start: 0, end, prevStart: null, prevEnd: null };
  if (period === "day") {
    const d = new Date(state.selectedDate); d.setHours(0,0,0,0);
    const s = d.getTime(), e = s + 864e5;
    return { start: s, end: e, prevStart: s - 864e5, prevEnd: s };
  }
  const len = periodLen(period) * 864e5;
  return { start: end - len, end, prevStart: end - 2*len, prevEnd: end - len };
}
function inRange(arr, s, e) { return arr.filter((r) => { const t = new Date(r.date).getTime(); return !isNaN(t) && t >= s && t < e + 864e5; }); }
function inRangeStrict(arr, s, e) { return arr.filter((r) => { const t = new Date(r.date).getTime(); return !isNaN(t) && t >= s && t < e; }); }

function getBranchData() {
  if (state.branch === "all") return { income: state.income, expense: state.expense };
  return { income: state.income.filter((r) => r.branch === state.branch), expense: state.expense.filter((r) => r.branch === state.branch) };
}

function sum(arr) { return arr.reduce((s, r) => s + r.amount, 0); }
function pctChange(cur, prev) { if (prev === 0) return cur === 0 ? 0 : null; return ((cur - prev) / Math.abs(prev)) * 100; }
function deltaHtml(cur, prev, goodWhenUp) {
  const pc = pctChange(cur, prev);
  if (pc === null) return `<div class="delta flat">— ไม่มีข้อมูลช่วงก่อน</div>`;
  const up = pc > 0.5, down = pc < -0.5;
  const good = (up && goodWhenUp) || (down && !goodWhenUp);
  const cls = up || down ? (good ? "up" : "down") : "flat";
  const arrow = up ? "▲" : down ? "▼" : "—";
  return `<div class="delta ${cls}">${arrow} ${Math.abs(pc).toFixed(0)}% เทียบช่วงก่อน</div>`;
}

// ---------- render ----------
function render() {
  document.getElementById("branchRush").classList.toggle("active", state.branch === "rush");
  document.getElementById("branchRushhour").classList.toggle("active", state.branch === "rushhour");
  document.getElementById("branchAll").classList.toggle("active", state.branch === "all");
  document.getElementById("bodyEl").className = state.branch === "rushhour" ? "theme-rushhour" : state.branch === "rush" ? "theme-rush" : "";
  document.getElementById("appTitle").innerHTML = '<span class="brand-dot"></span>' + (state.branch === "rush" ? "บัญชี Rush" : state.branch === "rushhour" ? "บัญชี Rush Hour" : "บัญชีร้านกาแฟ");

  const empty = state.income.length === 0 && state.expense.length === 0;
  document.getElementById("summaryText").textContent = !state.loaded ? "กำลังโหลดข้อมูล..." : empty ? "ยังไม่มีข้อมูล — เริ่มบันทึกรายการแรก" : "ภาพรวมรายรับ-รายจ่ายของร้าน";

  const content = document.getElementById("content");
  if (state.view === "dash") { content.innerHTML = renderDash(); setTimeout(drawCharts, 0); }
  else if (state.view === "add") { content.innerHTML = renderAdd(); setTimeout(toggleStockFields, 0); }
  else content.innerHTML = renderList();
}

function renderDash() {
  let html = `<div class="chiprow">
      ${["day","week","month","all"].map((p) => `<div class="chip ${state.period===p?"active":""}" onclick="setPeriod('${p}')">${p==="day"?"รายวัน":p==="week"?"7 วันล่าสุด":p==="month"?"30 วันล่าสุด":"ทั้งหมด"}</div>`).join("")}
    </div>`;

  if (state.period === "day") {
    html += `<div class="field" style="max-width:220px; margin-bottom:14px;"><label class="label">เลือกวันที่ดู</label><input type="date" value="${state.selectedDate}" onchange="setSelectedDate(this.value)" /></div>`;
  }

  const bd = getBranchData();
  const { start, end, prevStart, prevEnd } = rangeFor(state.period);
  const incomeF = inRange(bd.income, start, end), expenseF = inRange(bd.expense, start, end);
  const totalIncome = sum(incomeF), totalExpense = sum(expenseF), profit = totalIncome - totalExpense;
  const margin = totalIncome > 0 ? (profit / totalIncome) * 100 : 0;

  // ช่วงก่อนหน้า
  let pIncome = null, pExpense = null, pProfit = null;
  if (prevStart != null) {
    const pin = inRangeStrict(bd.income, prevStart, prevEnd), pex = inRangeStrict(bd.expense, prevStart, prevEnd);
    pIncome = sum(pin); pExpense = sum(pex); pProfit = pIncome - pExpense;
  }

  const showCmp = prevStart != null;
  html += `
    <div class="kpi-grid">
      <div class="kpi-card"><p class="kpi-label">รายรับรวม</p><p class="kpi-value income">${fmtMoney(totalIncome)} <span class="unit">฿</span></p>${showCmp ? deltaHtml(totalIncome, pIncome, true) : ""}</div>
      <div class="kpi-card"><p class="kpi-label">รายจ่ายรวม</p><p class="kpi-value expense">${fmtMoney(totalExpense)} <span class="unit">฿</span></p>${showCmp ? deltaHtml(totalExpense, pExpense, false) : ""}</div>
      <div class="kpi-card wide"><p class="kpi-label">กำไร/ขาดทุน · อัตรากำไร ${margin.toFixed(0)}%</p><p class="kpi-value lg ${profit>=0?"profit-pos":"profit-neg"}">${profit>=0?"+":""}${fmtMoney(profit)} <span class="unit">฿</span></p>${showCmp ? deltaHtml(profit, pProfit, true) : ""}</div>
    </div>`;

  // ---------- auto insights ----------
  const insights = buildInsights(incomeF, expenseF, { totalIncome, totalExpense, profit, margin, showCmp, pProfit, pIncome });
  if (insights.length) {
    html += `<h2>ข้อสังเกต <span class="h2-sub">${PERIOD_LABEL[state.period]}</span></h2>` + insights.map((i) => `
      <div class="insight"><span class="ic">${i.ic}</span><div style="flex:1;"><p class="lead">${i.lead}</p>${i.det?`<p class="det">${i.det}</p>`:""}</div></div>`).join("");
  }

  // ---------- branch comparison (all only) ----------
  if (state.branch === "all") {
    const byBranch = { rush: { inc: 0, exp: 0 }, rushhour: { inc: 0, exp: 0 } };
    incomeF.forEach((r) => { if (byBranch[r.branch]) byBranch[r.branch].inc += r.amount; });
    expenseF.forEach((r) => { if (byBranch[r.branch]) byBranch[r.branch].exp += r.amount; });
    html += `<h2>เทียบรายสาขา</h2><div class="kpi-grid">
      ${[["rush","สาขา Rush"],["rushhour","สาขา Rush Hour"]].map(([k,lbl]) => {
        const p = byBranch[k].inc - byBranch[k].exp;
        return `<div class="kpi-card"><p class="kpi-label">${lbl}</p><p class="kpi-value income">${fmtMoney(byBranch[k].inc)} <span class="unit">฿</span></p><p class="det" style="font-size:12px;color:var(--muted);margin:4px 0 0;">กำไร ${p>=0?"+":""}${fmtMoney(p)} ฿</p></div>`;
      }).join("")}
    </div>`;
  }

  // ---------- channel mix ----------
  const byChannel = {}; CHANNELS.forEach((c) => (byChannel[c.id] = 0));
  incomeF.forEach((r) => { byChannel[r.channel] = (byChannel[r.channel] || 0) + r.amount; });
  html += `<h2>รายรับแยกตามช่องทาง</h2><div class="kpi-grid">
    ${CHANNELS.map((c) => { const v = byChannel[c.id]||0; const pct = totalIncome>0?Math.round(v/totalIncome*100):0; return `<div class="kpi-card"><p class="kpi-label">${c.label} · ${pct}%</p><p class="kpi-value income">${fmtMoney(v)} <span class="unit">฿</span></p></div>`; }).join("")}
  </div>`;

  // ---------- trend ----------
  html += `<h2>แนวโน้มรายวัน</h2>`;
  html += state.period === "day"
    ? `<div class="insight"><span class="ic">📈</span><div><p class="det">สลับไปแท็บ "7 วัน" หรือ "30 วัน" เพื่อดูแนวโน้มเทียบหลายวัน</p></div></div>`
    : `<div class="chart-card"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>`;

  // ---------- expense by category ----------
  html += `<h2>รายจ่ายแยกตามหมวด</h2><div class="chart-card"><div class="chart-wrap" style="height:200px;"><canvas id="expenseChart"></canvas></div></div>`;

  // ---------- stock summary ----------
  html += `<h2>สรุปวัตถุดิบที่ซื้อ</h2>${renderStockSummary(expenseF)}`;
  return html;
}

function buildInsights(incomeF, expenseF, m) {
  const out = [];
  // กำไร
  if (m.totalIncome > 0 || m.totalExpense > 0) {
    out.push({ ic: m.profit >= 0 ? "💰" : "🔻",
      lead: m.profit >= 0 ? `ช่วงนี้กำไร ${fmtMoney(m.profit)} บาท` : `ช่วงนี้ขาดทุน ${fmtMoney(-m.profit)} บาท`,
      det: `อัตรากำไร ${m.margin.toFixed(0)}% ของรายรับ` });
  }
  // เทียบช่วงก่อน
  if (m.showCmp && m.pProfit != null) {
    const pc = pctChange(m.profit, m.pProfit);
    if (pc != null && Math.abs(pc) >= 1) {
      out.push({ ic: pc > 0 ? "📈" : "📉",
        lead: pc > 0 ? `กำไรดีขึ้น ${Math.abs(pc).toFixed(0)}% จากช่วงก่อน` : `กำไรลดลง ${Math.abs(pc).toFixed(0)}% จากช่วงก่อน`,
        det: `เทียบ ${PERIOD_LABEL[state.period]} ก่อนหน้า` });
    }
  }
  // วันยอดขายสูงสุด
  if (state.period !== "day") {
    const byDay = {};
    incomeF.forEach((r) => (byDay[r.date] = (byDay[r.date] || 0) + r.amount));
    const best = Object.entries(byDay).sort((a, b) => b[1] - a[1])[0];
    if (best && best[1] > 0) {
      const d = new Date(best[0]);
      out.push({ ic: "⭐", lead: `วันขายดีที่สุด: ${isNaN(d)?best[0]:d.toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"short"})}`, det: `รายรับ ${fmtMoney(best[1])} บาท` });
    }
  }
  // หมวดรายจ่ายก้อนใหญ่
  const byCat = {}; expenseF.forEach((r) => (byCat[r.category] = (byCat[r.category] || 0) + r.amount));
  const topCat = Object.entries(byCat).sort((a, b) => b[1] - a[1])[0];
  if (topCat && topCat[1] > 0) {
    const lbl = (EXPENSE_CATEGORIES.find((c) => c.id === topCat[0]) || {}).label || topCat[0];
    const pct = m.totalExpense > 0 ? Math.round(topCat[1] / m.totalExpense * 100) : 0;
    out.push({ ic: "🧾", lead: `รายจ่ายก้อนใหญ่สุด: ${lbl}`, det: `${fmtMoney(topCat[1])} บาท · ${pct}% ของรายจ่ายทั้งหมด` });
  }
  // ต้นทุนวัตถุดิบ
  const stockCost = byCat["stock"] || 0;
  if (stockCost > 0 && m.totalIncome > 0) {
    out.push({ ic: "📦", lead: `ต้นทุนวัตถุดิบคิดเป็น ${Math.round(stockCost/m.totalIncome*100)}% ของรายรับ`, det: `ซื้อวัตถุดิบรวม ${fmtMoney(stockCost)} บาท` });
  }
  return out;
}

function renderStockSummary(expenseF) {
  const stockRows = expenseF.filter((r) => r.category === "stock" && r.itemName);
  if (stockRows.length === 0) return `<div class="insight"><span class="ic">📦</span><div><p class="det">ยังไม่มีข้อมูลวัตถุดิบในช่วงนี้ — กรอกชื่อวัตถุดิบตอนบันทึกรายจ่ายหมวด "วัตถุดิบ/สต๊อก" เพื่อให้ขึ้นสรุปที่นี่</p></div></div>`;
  const summary = {};
  stockRows.forEach((r) => {
    const key = r.itemName + "|" + (r.itemUnit || "");
    if (!summary[key]) summary[key] = { name: r.itemName, unit: r.itemUnit || "", qty: 0, amount: 0 };
    summary[key].qty += Number(r.itemQty) || 0; summary[key].amount += r.amount;
  });
  const rows = Object.values(summary).sort((a, b) => b.amount - a.amount);
  return `<div class="chart-card" style="padding:4px 14px;">
    ${rows.map((r) => `<div class="log-row"><div><p style="margin:0; font-size:14px; font-weight:700;">${escapeHtml(r.name)}</p><p style="margin:1px 0 0; font-size:12px; color:var(--muted);">${r.qty>0?`รวม ${r.qty} ${escapeHtml(r.unit)}`:"ไม่ได้ระบุจำนวน"}</p></div><span style="font-weight:800; color:var(--red); font-variant-numeric:tabular-nums;">${fmtMoney(r.amount)} ฿</span></div>`).join("")}
  </div>`;
}

function buildDailySeries(incomeF, expenseF, period) {
  const days = period === "month" ? 30 : 7;
  const labels = [], storeArr = [], deliveryArr = [], expenseArr = [], profitArr = [];
  let cum = 0;
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = toLocalDateStr(d);
    labels.push(d.toLocaleDateString("th-TH", { day: "2-digit", month: "2-digit" }));
    const st = incomeF.filter((r) => r.date === key && r.channel === "store").reduce((s, r) => s + r.amount, 0);
    const dl = incomeF.filter((r) => r.date === key && r.channel === "delivery").reduce((s, r) => s + r.amount, 0);
    const ex = expenseF.filter((r) => r.date === key).reduce((s, r) => s + r.amount, 0);
    storeArr.push(st); deliveryArr.push(dl); expenseArr.push(ex);
    cum += (st + dl - ex); profitArr.push(cum);
  }
  return { labels, storeArr, deliveryArr, expenseArr, profitArr };
}

function drawCharts() {
  Object.values(charts).forEach((c) => c && c.destroy()); charts = {};
  const bd = getBranchData();
  const { start, end } = rangeFor(state.period);
  const incomeF = inRange(bd.income, start, end), expenseF = inRange(bd.expense, start, end);
  const primary = state.branch === "rush" ? "#C1502E" : state.branch === "rushhour" ? "#E0B71E" : "#A9744F";
  const secondary = state.branch === "rush" ? "#E0926F" : state.branch === "rushhour" ? "#F2D873" : "#C9A876";

  const tc = document.getElementById("trendChart");
  if (tc && state.period !== "day") {
    const { labels, storeArr, deliveryArr, expenseArr } = buildDailySeries(incomeF, expenseF, state.period);
    charts.trend = new Chart(tc, {
      type: "bar",
      data: { labels, datasets: [
        { label: "หน้าร้าน", data: storeArr, backgroundColor: primary, stack: "income", borderRadius: 4 },
        { label: "Delivery", data: deliveryArr, backgroundColor: secondary, stack: "income", borderRadius: 4 },
        { label: "รายจ่าย", data: expenseArr, type: "line", borderColor: "#C24A2C", backgroundColor: "#C24A2C", tension: .35, borderWidth: 2, pointRadius: 2 },
      ]},
      options: { responsive: true, maintainAspectRatio: false, interaction: { mode: "index", intersect: false },
        scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, beginAtZero: true, grid: { color: "#EFE7DC" } } },
        plugins: { legend: { position: "bottom", labels: { font: { size: 11 }, usePointStyle: true, padding: 12 } } } },
    });
  }

  const ec = document.getElementById("expenseChart");
  if (ec) {
    const byCat = {}; EXPENSE_CATEGORIES.forEach((c) => (byCat[c.id] = 0));
    expenseF.forEach((r) => { byCat[r.category] = (byCat[r.category] || 0) + r.amount; });
    const hasData = EXPENSE_CATEGORIES.some((c) => byCat[c.id] > 0);
    charts.exp = new Chart(ec, {
      type: "doughnut",
      data: { labels: EXPENSE_CATEGORIES.map((c) => c.label), datasets: [{ data: hasData ? EXPENSE_CATEGORIES.map((c) => byCat[c.id]) : [1], backgroundColor: hasData ? EXPENSE_CATEGORIES.map((c) => c.color) : ["#ECE4DA"], borderWidth: 2, borderColor: "#fff" }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: "60%", plugins: { legend: { position: "bottom", labels: { font: { size: 11 }, usePointStyle: true, padding: 10 } }, tooltip: { enabled: hasData } } },
    });
  }
}

// ---------- Add form ----------
function toggleStockFields() {
  const sel = document.getElementById("expCategory"), box = document.getElementById("stockFields");
  if (sel && box) box.style.display = sel.value === "stock" ? "block" : "none";
}

function renderAdd() {
  const def = state.branch === "all" ? "rush" : state.branch;
  return `
    <div class="card">
      <h2 style="margin-top:0;">บันทึกรายรับ</h2>
      <div class="field"><label class="label">สาขา</label><select id="incBranch"><option value="rush" ${def==="rush"?"selected":""}>สาขา Rush</option><option value="rushhour" ${def==="rushhour"?"selected":""}>สาขา Rush Hour</option></select></div>
      <div class="field"><label class="label">วันที่</label><input id="incDate" type="date" value="${todayStr()}" /></div>
      <div class="field"><label class="label">ช่องทาง</label><select id="incChannel">${CHANNELS.map((c)=>`<option value="${c.id}">${c.label}</option>`).join("")}</select></div>
      <div class="field"><label class="label">จำนวนเงิน (บาท)</label><input id="incAmount" type="number" inputmode="decimal" min="0" placeholder="0" /></div>
      <div class="field"><label class="label">บันทึกเพิ่มเติม (ไม่บังคับ)</label><input id="incNote" placeholder="เช่น ยอดขายกะเช้า" /></div>
      <button class="btn-primary btn-income btn-block" onclick="submitIncome()">บันทึกรายรับ</button>
    </div>
    <div class="card">
      <h2 style="margin-top:0;">บันทึกรายจ่าย</h2>
      <div class="field"><label class="label">สาขา</label><select id="expBranch"><option value="rush" ${def==="rush"?"selected":""}>สาขา Rush</option><option value="rushhour" ${def==="rushhour"?"selected":""}>สาขา Rush Hour</option></select></div>
      <div class="field"><label class="label">วันที่</label><input id="expDate" type="date" value="${todayStr()}" /></div>
      <div class="field"><label class="label">หมวดรายจ่าย</label><select id="expCategory" onchange="toggleStockFields()">${EXPENSE_CATEGORIES.map((c)=>`<option value="${c.id}">${c.label}</option>`).join("")}</select></div>
      <div id="stockFields" style="display:none;">
        <div class="field"><label class="label">ชื่อวัตถุดิบ</label><input id="expItemName" placeholder="เช่น เมล็ดกาแฟอราบิก้า" /></div>
        <div class="row">
          <div class="field" style="flex:1;"><label class="label">จำนวน</label><input id="expItemQty" type="number" inputmode="decimal" min="0" placeholder="0" /></div>
          <div class="field" style="flex:1;"><label class="label">หน่วย</label><select id="expItemUnit">${STOCK_UNITS.map((u)=>`<option value="${u}">${u}</option>`).join("")}</select></div>
        </div>
      </div>
      <div class="field"><label class="label">จำนวนเงิน (บาท)</label><input id="expAmount" type="number" inputmode="decimal" min="0" placeholder="0" /></div>
      <div class="field"><label class="label">บันทึกเพิ่มเติม (ไม่บังคับ)</label><input id="expNote" placeholder="เช่น ซื้อเมล็ดกาแฟ 5 kg" /></div>
      <button class="btn-primary btn-expense btn-block" onclick="submitExpense()">บันทึกรายจ่าย</button>
    </div>`;
}

async function submitIncome() {
  const branch = document.getElementById("incBranch").value, date = document.getElementById("incDate").value;
  const channel = document.getElementById("incChannel").value, amount = Number(document.getElementById("incAmount").value), note = document.getElementById("incNote").value;
  if (!amount || amount <= 0) { showToast("กรุณาใส่จำนวนเงิน"); return; }
  try {
    await apiCall("addIncome", { id: uid(), date, channel, amount, note, branch });
    showToast(`บันทึกรายรับ ${fmtMoney(amount)} บาทแล้ว`);
    document.getElementById("incAmount").value = ""; document.getElementById("incNote").value = "";
    await loadAll();
  } catch (e) { showToast("บันทึกไม่สำเร็จ: " + e.message); }
}

async function submitExpense() {
  const branch = document.getElementById("expBranch").value, date = document.getElementById("expDate").value;
  const category = document.getElementById("expCategory").value, amount = Number(document.getElementById("expAmount").value), note = document.getElementById("expNote").value;
  const itemName = category === "stock" ? document.getElementById("expItemName").value : "";
  const itemQty = category === "stock" ? document.getElementById("expItemQty").value : "";
  const itemUnit = category === "stock" ? document.getElementById("expItemUnit").value : "";
  if (!amount || amount <= 0) { showToast("กรุณาใส่จำนวนเงิน"); return; }
  try {
    await apiCall("addExpense", { id: uid(), date, category, amount, note, branch, itemName, itemQty, itemUnit });
    showToast(`บันทึกรายจ่าย ${fmtMoney(amount)} บาทแล้ว`);
    document.getElementById("expAmount").value = ""; document.getElementById("expNote").value = "";
    if (category === "stock") { document.getElementById("expItemName").value = ""; document.getElementById("expItemQty").value = ""; }
    await loadAll();
  } catch (e) { showToast("บันทึกไม่สำเร็จ: " + e.message); }
}

// ---------- List ----------
function renderList() {
  const bd = getBranchData();
  const all = [
    ...bd.income.map((r) => ({ ...r, type: "income", label: (CHANNELS.find((c) => c.id === r.channel) || {}).label || r.channel })),
    ...bd.expense.map((r) => ({ ...r, type: "expense", label: (EXPENSE_CATEGORIES.find((c) => c.id === r.category) || {}).label || r.category })),
  ].sort((a, b) => new Date(b.date) - new Date(a.date));

  if (all.length === 0) return `<div class="empty"><span class="big">🧾</span>ยังไม่มีรายการ — ไปที่แท็บ "บันทึกรายการ" เพื่อเริ่มบันทึก</div>`;

  let html = `<div class="list-head"><span class="sub" style="margin:0;">${all.length} รายการ</span><button class="chip" onclick="exportCSV()">⬇ ส่งออก CSV</button></div><div class="chart-card" style="padding:4px 14px;">`;
  html += all.map((r) => `
    <div class="log-row">
      <div style="min-width:0;"><p style="margin:0; font-size:14px; font-weight:600;">${escapeHtml(r.label)} <span style="color:var(--muted);font-size:12px;font-weight:500;">${r.type==="income"?"รายรับ":"รายจ่าย"}</span></p>
      <p style="margin:1px 0 0; font-size:12px; color:var(--muted);">${escapeHtml(r.note || "")}${r.note?" · ":""}${escapeHtml(r.date || "")}${r.branch?" · "+(r.branch==="rush"?"Rush":"Rush Hour"):""}</p></div>
      <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;"><span style="font-weight:800; color:${r.type==="income"?"var(--green)":"var(--red)"}; font-variant-numeric:tabular-nums;">${r.type==="income"?"+":"−"}${fmtMoney(r.amount)}</span>
      <button class="del-btn" onclick="deleteRecord('${r.type}', '${r.id}')">✕</button></div>
    </div>`).join("");
  html += `</div>`;
  return html;
}

function exportCSV() {
  const bd = getBranchData();
  const rows = [["ประเภท","วันที่","สาขา","หมวด/ช่องทาง","จำนวนเงิน","วัตถุดิบ","จำนวน","หน่วย","หมายเหตุ"]];
  bd.income.forEach((r) => rows.push(["รายรับ", r.date, r.branch||"", (CHANNELS.find(c=>c.id===r.channel)||{}).label||r.channel, r.amount, "", "", "", r.note||""]));
  bd.expense.forEach((r) => rows.push(["รายจ่าย", r.date, r.branch||"", (EXPENSE_CATEGORIES.find(c=>c.id===r.category)||{}).label||r.category, r.amount, r.itemName||"", r.itemQty||"", r.itemUnit||"", r.note||""]));
  const csv = "﻿" + rows.map((r) => r.map((c) => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `rushcoffee-${state.branch}-${todayStr()}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  showToast("ส่งออกไฟล์ CSV แล้ว");
}

async function deleteRecord(type, id) {
  try {
    await fetch(API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: new URLSearchParams({ action: type === "income" ? "deleteIncome" : "deleteExpense", id }).toString() });
    showToast("ลบรายการแล้ว");
    await loadAll();
  } catch (e) { showToast("ลบไม่สำเร็จ: " + e.message); }
}

// ---------- init ----------
loadAll();
setInterval(loadAll, 15000);
</script>
