<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>สูตรต้นทุนเมนู</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

:root {
  --bg: #FAF6F0;
  --surface: #fff;
  --border: #EDE7DD;
  --t1: #2C1810;
  --t2: #7A6B62;
  --t3: #B5A99E;
  --good: #4E7A30;
  --warn: #C08010;
  --bad: #B5482A;
  --branch: #C1502E;
  --r: 12px;
}
body.rushhour { --branch: #C49000; }

body {
  font-family: -apple-system, "Noto Sans Thai", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  padding-bottom: 96px;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 20;
  background: var(--bg);
  padding: 18px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.hdr-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.app-name { font-size: 22px; font-weight: 800; color: var(--branch); letter-spacing: -0.5px; }
.app-sub  { font-size: 12px; color: var(--t3); margin-top: 2px; }

.branch-pills {
  display: flex; background: var(--border); border-radius: 9px; padding: 3px; gap: 2px;
}
.branch-pill {
  padding: 5px 13px; border-radius: 7px; font-size: 12px; font-weight: 700;
  border: none; background: transparent; color: var(--t2); cursor: pointer;
  transition: all .15s; white-space: nowrap; font-family: inherit;
}
.branch-pill.active {
  background: var(--surface); color: var(--branch);
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}

.search-wrap { position: relative; }
.search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 14px; pointer-events: none; }
.search-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 14px 9px 36px; font-size: 14px; background: var(--surface);
  color: var(--t1); font-family: inherit; outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--branch); }

/* ── Content ── */
.content { padding: 14px 16px; }

/* ── Menu Card ── */
.menu-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 16px; margin-bottom: 12px;
}

.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.card-meta  { flex: 1; min-width: 0; }
.card-name  { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
.card-price { font-size: 13px; color: var(--t2); margin-top: 3px; }

.card-btns { display: flex; gap: 6px; margin-left: 10px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1.5px solid var(--border); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--t2); transition: all .15s;
}
.icon-btn:hover          { background: var(--bg); }
.icon-btn.del:hover      { border-color: var(--bad); color: var(--bad); }

/* ── GP ── */
.gp-area { margin-bottom: 14px; }
.gp-top  { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.gp-pct  { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
.gp-detail { font-size: 13px; color: var(--t2); }
.gp-track  { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.gp-fill   { height: 100%; border-radius: 3px; transition: width .5s ease; }

/* ── Cost row ── */
.cost-row { display: flex; border-top: 1px solid var(--border); padding-top: 12px; margin-bottom: 10px; }
.cost-item + .cost-item { border-left: 1px solid var(--border); padding-left: 14px; }
.cost-item { flex: 1; }
.cost-lbl  { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.cost-val  { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* ── Ingredient chips ── */
.ing-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.ing-chip  {
  font-size: 12px; padding: 4px 10px; border-radius: 999px;
  background: var(--bg); border: 1px solid var(--border); color: var(--t2);
}

/* ── FAB ── */
.fab {
  position: fixed; bottom: 24px; right: 16px; z-index: 30;
  width: 56px; height: 56px; border-radius: 16px;
  background: var(--branch); color: #fff; border: none;
  font-size: 26px; cursor: pointer; line-height: 1;
  box-shadow: 0 4px 18px rgba(0,0,0,.22);
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.fab:active { transform: scale(.93); }

/* ── Empty ── */
.empty { text-align: center; padding: 60px 20px; }
.empty-ico   { font-size: 44px; margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--t2); margin-bottom: 6px; }
.empty-sub   { font-size: 13px; color: var(--t3); }

/* ── Loading ── */
.loading { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; gap: 12px; color: var(--t3); font-size: 14px; }
.spinner { width: 24px; height: 24px; border: 2.5px solid var(--border); border-top-color: var(--branch); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error ── */
.err-box { margin: 10px 16px 0; background: #FDEAEA; color: var(--bad); border-radius: 8px; padding: 10px 14px; font-size: 13px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
  background: var(--t1); color: #fff; padding: 10px 20px; border-radius: 999px;
  font-size: 13px; z-index: 200; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
  animation: toastIn .2s ease;
}
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(6px); } }

/* ── Sheet overlay ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 50;
  display: flex; align-items: flex-end;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } }

.sheet {
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 10px 20px 36px; width: 100%;
  max-height: 93vh; overflow-y: auto;
  animation: slideUp .25s cubic-bezier(.22,1,.36,1);
}
@keyframes slideUp { from { transform: translateY(24px); opacity: 0; } }

.sheet-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 6px auto 18px;
}
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ── Form ── */
.field { margin-bottom: 12px; }
.field-lbl {
  font-size: 11px; font-weight: 700; color: var(--t3);
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 5px; display: block;
}
.field-input, .field-select {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 15px; background: var(--surface);
  color: var(--t1); font-family: inherit; outline: none;
  transition: border-color .15s; -webkit-appearance: none;
}
.field-input:focus, .field-select:focus { border-color: var(--branch); }

/* ── Ingredient form item ── */
.ing-form-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
}
.ing-row1 { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.ing-row1 .field-input { flex: 1; margin: 0; }
.ing-del {
  width: 32px; height: 38px; border: 1.5px solid var(--border); border-radius: 7px;
  background: transparent; color: var(--t3); cursor: pointer; font-size: 15px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.ing-del:hover { border-color: var(--bad); color: var(--bad); }

.ing-row2 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
.ing-row2 .field-input, .ing-row2 .field-select { font-size: 13px; padding: 8px 8px; }
.ing-row2 .field-lbl { font-size: 10px; }

.add-ing-btn {
  width: 100%; border: 1.5px dashed var(--border); border-radius: 8px;
  background: transparent; color: var(--t2); font-size: 13px; font-weight: 600;
  padding: 10px; cursor: pointer; font-family: inherit; margin-bottom: 14px;
  transition: border-color .15s;
}
.add-ing-btn:hover { border-color: var(--t2); }

/* ── Preview box ── */
.preview-box {
  background: var(--bg); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
  min-height: 54px; display: flex; align-items: center;
}
.preview-gp { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.3; }

/* ── Action buttons ── */
.btn-primary {
  width: 100%; background: var(--branch); color: #fff; border: none;
  border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-bottom: 8px;
  transition: opacity .15s;
}
.btn-primary:active  { opacity: .85; }
.btn-primary:disabled { opacity: .55; cursor: default; }

.btn-secondary {
  width: 100%; background: transparent; color: var(--t2);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-danger-text {
  width: 100%; background: transparent; color: var(--bad);
  border: none; padding: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit; margin-top: 4px;
}
</style>
</head>
<body id="bodyEl">

<!-- Header -->
<div class="header">
  <div class="hdr-top">
    <div>
      <div class="app-name">สูตรต้นทุน</div>
      <div class="app-sub" id="appSub">กำลังโหลด...</div>
    </div>
    <div class="branch-pills">
      <button class="branch-pill active" id="pillRush"     onclick="setBranch('rush')">Rush</button>
      <button class="branch-pill"        id="pillRushhour" onclick="setBranch('rushhour')">Rush Hour</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-ico">⌕</span>
    <input class="search-input" id="searchInput" placeholder="ค้นหาเมนู..." oninput="onSearch(this.value)" />
  </div>
</div>

<div id="errorBox"></div>

<div class="content" id="content">
  <div class="loading"><div class="spinner"></div>กำลังโหลดข้อมูล</div>
</div>

<button class="fab" onclick="openAddSheet()" title="เพิ่มเมนูใหม่">+</button>
<div id="sheetRoot"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyjUOdNkE1p-07AdWC_ouO4SiuI3v-blgStfJWSdr-i1K4ydDVztRsTM1319siKXIrH/exec";
const UNITS   = ["g", "kg", "ml", "l", "ชิ้น", "ฟอง", "ถุง", "ขวด"];

// ─────────── State ───────────────────────────────────────
let state = {
  recipes : [],
  branch  : "rush",
  search  : "",
  form    : null,   // { mode:'add'|'edit', origName, menuName, sellingPrice, ingredients[] }
};

// ─────────── Helpers ─────────────────────────────────────
function uid()    { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(n)   { return Number(n||0).toLocaleString("th-TH", {maximumFractionDigits:2}); }
function esc(s)   { const d=document.createElement("div"); d.textContent=s??""  ; return d.innerHTML; }
function newIng() { return {name:"",qty:"",unit:"g",buyPrice:"",packSize:""}; }

function gpColor(pct) {
  if (pct < 30) return "var(--bad)";
  if (pct < 60) return "var(--warn)";
  return "var(--good)";
}

function costOfIng(ing) {
  // ใช้ได้ทั้ง backend row (ingredientQty) และ form state (qty)
  const qty      = Number(ing.ingredientQty ?? ing.qty ?? 0);
  const buyPrice = Number(ing.buyPrice || 0);
  const packSize = Number(ing.packSize || 0);
  return packSize > 0 ? (buyPrice / packSize) * qty : 0;
}

function computeCost(ingredients) {
  return ingredients.reduce((s, i) => s + costOfIng(i), 0);
}

// ─────────── API ─────────────────────────────────────────
async function apiCall(action, payload) {
  const body = new URLSearchParams({action});
  if (payload) body.set("payload", JSON.stringify(payload));
  const res  = await fetch(API_URL, {
    method: "POST", redirect: "follow",
    headers: {"Content-Type":"text/plain;charset=utf-8"},
    body: body.toString(),
  });
  const text = await res.text();
  if (!res.ok) throw new Error("HTTP " + res.status);
  return JSON.parse(text);
}

async function loadAll() {
  try {
    const data = await apiCall("getAll");
    if (data.error) throw new Error(data.error);
    state.recipes = (data.recipes||[]).map(r => ({
      ...r,
      sellingPrice  : Number(r.sellingPrice)   || 0,
      ingredientQty : Number(r.ingredientQty)  || 0,
      buyPrice      : Number(r.buyPrice)        || 0,
      packSize      : Number(r.packSize)        || 0,
    }));
    document.getElementById("errorBox").innerHTML = "";
  } catch(e) {
    document.getElementById("errorBox").innerHTML =
      `<div class="err-box">เชื่อมต่อไม่ได้: ${esc(e.message)}</div>`;
  }
  renderList();
}

// ─────────── Branch / Search ─────────────────────────────
function setBranch(b) {
  state.branch = b;
  document.getElementById("pillRush").classList.toggle("active",     b==="rush");
  document.getElementById("pillRushhour").classList.toggle("active", b==="rushhour");
  document.getElementById("bodyEl").className = b==="rushhour" ? "rushhour" : "";
  renderList();
}

function onSearch(v) { state.search = v; renderList(); }

function getMenus() {
  // Group rows by menuName for current branch
  const rows = state.recipes.filter(r => r.branch === state.branch);
  const map  = {};
  rows.forEach(r => {
    if (!map[r.menuName])
      map[r.menuName] = {menuName: r.menuName, sellingPrice: r.sellingPrice, ingredients: []};
    map[r.menuName].ingredients.push(r);
  });
  let menus = Object.values(map);
  if (state.search) {
    const q = state.search.toLowerCase();
    menus = menus.filter(m => m.menuName.toLowerCase().includes(q));
  }
  return menus;
}

// ─────────── Render List ──────────────────────────────────
function renderList() {
  const menus = getMenus();
  document.getElementById("appSub").textContent =
    menus.length === 0 ? "ยังไม่มีเมนู" :
    `${menus.length} เมนู${state.search ? " (ค้นหา)" : ""}`;

  const ct = document.getElementById("content");
  if (menus.length === 0) {
    ct.innerHTML = `
      <div class="empty">
        <div class="empty-ico">☕</div>
        <div class="empty-title">${state.search ? "ไม่พบเมนูที่ค้นหา" : "ยังไม่มีเมนูในสาขานี้"}</div>
        <div class="empty-sub">${state.search ? "ลองคำค้นอื่น" : "กดปุ่ม + เพื่อเพิ่มเมนูแรก"}</div>
      </div>`;
    return;
  }

  ct.innerHTML = menus.map(menu => {
    const totalCost = computeCost(menu.ingredients);
    const gpAmt  = menu.sellingPrice - totalCost;
    const gpPct  = menu.sellingPrice > 0 ? (gpAmt / menu.sellingPrice) * 100 : 0;
    const color  = gpColor(gpPct);
    const chips  = menu.ingredients.map(i =>
      `<span class="ing-chip">${esc(i.ingredientName)} ${i.ingredientQty} ${esc(i.ingredientUnit)}</span>`
    ).join("");

    return `
      <div class="menu-card">
        <div class="card-header">
          <div class="card-meta">
            <div class="card-name">${esc(menu.menuName)}</div>
            <div class="card-price">ราคาขาย ${fmt(menu.sellingPrice)} บาท</div>
          </div>
          <div class="card-btns">
            <button class="icon-btn"     onclick='openEditSheet(${JSON.stringify(menu.menuName)})' title="แก้ไข">✏️</button>
            <button class="icon-btn del" onclick='deleteMenu(${JSON.stringify(menu.menuName)})'   title="ลบ">🗑</button>
          </div>
        </div>

        <div class="gp-area">
          <div class="gp-top">
            <span class="gp-pct" style="color:${color}">GP ${gpPct.toFixed(0)}%</span>
            <span class="gp-detail">กำไร ${fmt(gpAmt)} ฿</span>
          </div>
          <div class="gp-track">
            <div class="gp-fill" style="width:${Math.max(0,Math.min(100,gpPct))}%;background:${color}"></div>
          </div>
        </div>

        <div class="cost-row">
          <div class="cost-item">
            <div class="cost-lbl">ต้นทุน</div>
            <div class="cost-val">${fmt(totalCost)} ฿</div>
          </div>
          <div class="cost-item">
            <div class="cost-lbl">ราคาขาย</div>
            <div class="cost-val">${fmt(menu.sellingPrice)} ฿</div>
          </div>
        </div>

        <div class="ing-chips">${chips}</div>
      </div>`;
  }).join("");
}

// ─────────── Delete ───────────────────────────────────────
async function deleteMenu(menuName) {
  if (!confirm(`ลบเมนู "${menuName}" ทั้งหมดใช่ไหม?`)) return;
  try {
    await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: new URLSearchParams({action:"deleteRecipeMenu", menuName, branch:state.branch}).toString(),
    });
    showToast(`ลบ "${menuName}" แล้ว`);
    closeSheet();
    await loadAll();
  } catch(e) { showToast("ลบไม่สำเร็จ"); }
}

// ─────────── Open Sheets ──────────────────────────────────
function openAddSheet() {
  state.form = {mode:"add", origName:"", menuName:"", sellingPrice:"", ingredients:[newIng()]};
  renderSheet();
}

function openEditSheet(menuName) {
  const rows = state.recipes.filter(r => r.branch===state.branch && r.menuName===menuName);
  if (!rows.length) return;
  state.form = {
    mode        : "edit",
    origName    : menuName,
    menuName    : menuName,
    sellingPrice: String(rows[0].sellingPrice),
    ingredients : rows.map(r => ({
      name    : r.ingredientName,
      qty     : String(r.ingredientQty),
      unit    : r.ingredientUnit || "g",
      buyPrice: String(r.buyPrice),
      packSize: String(r.packSize),
    })),
  };
  renderSheet();
}

function closeSheet() {
  state.form = null;
  document.getElementById("sheetRoot").innerHTML = "";
}

// ─────────── Render Sheet ────────────────────────────────
function renderSheet() {
  const f = state.form;
  if (!f) return;
  const isEdit = f.mode === "edit";

  const ingHTML = f.ingredients.map((ing, i) => `
    <div class="ing-form-item">
      <div class="ing-row1">
        <input class="field-input" value="${esc(ing.name)}" placeholder="ชื่อวัตถุดิบ"
          oninput="updIng(${i},'name',this.value)" />
        ${f.ingredients.length > 1
          ? `<button class="ing-del" onclick="removeIng(${i})">✕</button>`
          : ""}
      </div>
      <div class="ing-row2">
        <div>
          <label class="field-lbl">ใช้กี่หน่วย</label>
          <input class="field-input" type="number" inputmode="decimal" min="0"
            value="${esc(ing.qty)}" placeholder="0" oninput="updIng(${i},'qty',this.value)" />
        </div>
        <div>
          <label class="field-lbl">หน่วย</label>
          <select class="field-select" onchange="updIng(${i},'unit',this.value)">
            ${UNITS.map(u=>`<option value="${u}" ${ing.unit===u?"selected":""}>${u}</option>`).join("")}
          </select>
        </div>
        <div>
          <label class="field-lbl">ราคาซื้อ</label>
          <input class="field-input" type="number" inputmode="decimal" min="0"
            value="${esc(ing.buyPrice)}" placeholder="0" oninput="updIng(${i},'buyPrice',this.value)" />
        </div>
        <div>
          <label class="field-lbl">ขนาดแพ็ค</label>
          <input class="field-input" type="number" inputmode="decimal" min="0"
            value="${esc(ing.packSize)}" placeholder="0" oninput="updIng(${i},'packSize',this.value)" />
        </div>
      </div>
    </div>`).join("");

  const {html: preHtml, color: preColor} = calcPreview(f);

  document.getElementById("sheetRoot").innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeSheet()">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">${isEdit ? "✏️ แก้ไขเมนู" : "☕ เพิ่มเมนูใหม่"}</div>

        <div class="field">
          <label class="field-lbl">ชื่อเมนู</label>
          <input class="field-input" value="${esc(f.menuName)}" placeholder="เช่น ลาเต้ร้อน"
            oninput="updForm('menuName',this.value)" />
        </div>
        <div class="field">
          <label class="field-lbl">ราคาขาย (บาท)</label>
          <input class="field-input" type="number" inputmode="decimal" min="0"
            value="${esc(f.sellingPrice)}" placeholder="0"
            oninput="updForm('sellingPrice',this.value)" />
        </div>

        <div class="divider"></div>
        <label class="field-lbl" style="margin-bottom:10px;display:block">วัตถุดิบที่ใช้</label>

        <div id="ingRows">${ingHTML}</div>
        <button class="add-ing-btn" onclick="addIng()">+ เพิ่มวัตถุดิบ</button>

        <div class="preview-box">
          <div class="preview-gp" id="previewGp" style="color:${preColor}">${preHtml}</div>
        </div>

        <button class="btn-primary" id="submitBtn" onclick="submitForm()">
          ${isEdit ? "บันทึกการแก้ไข" : "บันทึกเมนูนี้"}
        </button>
        <button class="btn-secondary" onclick="closeSheet()">ยกเลิก</button>
        ${isEdit ? `<button class="btn-danger-text" onclick='deleteMenu(${JSON.stringify(f.origName)})'>ลบเมนูนี้</button>` : ""}
      </div>
    </div>`;
}

// ─────────── Form Logic ───────────────────────────────────
function calcPreview(f) {
  const sel  = Number(f.sellingPrice) || 0;
  const cost = f.ingredients.reduce((s,ing) => {
    const qty = Number(ing.qty||0), bp = Number(ing.buyPrice||0), ps = Number(ing.packSize||0);
    return s + (ps > 0 ? (bp/ps)*qty : 0);
  }, 0);
  const gpAmt = sel - cost;
  const gpPct = sel > 0 ? (gpAmt/sel)*100 : 0;
  const color = gpColor(gpPct);
  const html  = sel > 0 || cost > 0
    ? `GP ${gpPct.toFixed(1)}%<span style="font-size:15px;font-weight:600;color:var(--t2)"> &nbsp;·&nbsp; ต้นทุน ${fmt(cost)} ฿ &nbsp;·&nbsp; กำไร ${fmt(gpAmt)} ฿</span>`
    : `<span style="font-size:15px;color:var(--t3)">กรอกราคาและวัตถุดิบเพื่อดูผลลัพธ์</span>`;
  return {html, color};
}

function refreshPreview() {
  const el = document.getElementById("previewGp");
  if (!el || !state.form) return;
  const {html, color} = calcPreview(state.form);
  el.innerHTML    = html;
  el.style.color  = color;
}

function updForm(field, val) { state.form[field] = val; refreshPreview(); }
function updIng(i, field, val) { state.form.ingredients[i][field] = val; refreshPreview(); }

function addIng()    { state.form.ingredients.push(newIng()); renderSheet(); }
function removeIng(i){ state.form.ingredients.splice(i,1);   renderSheet(); }

async function submitForm() {
  const f   = state.form;
  const name = f.menuName.trim();
  const price = Number(f.sellingPrice) || 0;

  if (!name) { showToast("กรุณาใส่ชื่อเมนู"); return; }
  const validIngs = f.ingredients.filter(i => i.name.trim());
  if (!validIngs.length) { showToast("กรุณาใส่วัตถุดิบอย่างน้อย 1 รายการ"); return; }

  const btn = document.getElementById("submitBtn");
  if (btn) { btn.textContent = "กำลังบันทึก..."; btn.disabled = true; }

  try {
    // Edit: delete old record first
    if (f.mode === "edit" && f.origName) {
      await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type":"text/plain;charset=utf-8"},
        body: new URLSearchParams({action:"deleteRecipeMenu", menuName:f.origName, branch:state.branch}).toString(),
      });
    }
    // Add rows
    for (const ing of validIngs) {
      await apiCall("addRecipeRow", {
        id: uid(), menuName: name, sellingPrice: price,
        ingredientName : ing.name.trim(),
        ingredientQty  : Number(ing.qty)      || 0,
        ingredientUnit : ing.unit,
        buyPrice       : Number(ing.buyPrice) || 0,
        packSize       : Number(ing.packSize) || 0,
        branch         : state.branch,
      });
    }
    showToast(f.mode==="edit" ? `บันทึก "${name}" แล้ว` : `เพิ่ม "${name}" แล้ว`);
    closeSheet();
    await loadAll();
  } catch(e) {
    showToast("บันทึกไม่สำเร็จ: " + e.message);
    if (btn) { btn.textContent = f.mode==="edit" ? "บันทึกการแก้ไข" : "บันทึกเมนูนี้"; btn.disabled = false; }
  }
}

// ─────────── Toast ────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement("div");
  t.className   = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

// ─────────── Init ─────────────────────────────────────────
setBranch("rush");
loadAll();
setInterval(loadAll, 15000);
</script>
