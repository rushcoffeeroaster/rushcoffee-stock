<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F3EE">
<title>ต้นทุนเมนู · Rush Coffee</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #F7F3EE; --surface: #FFFFFF; --surface-2: #FBF8F3;
    --ink: #2A1D16; --muted: #9A8B7E; --line: #ECE4DA;
    --brand: #B5734A; --brand-deep: #3C2A21;
    --green: #6F8F4E; --amber: #D08A2C; --red: #C24A2C;
    --radius: 16px; --radius-sm: 11px; --shadow-sm: 0 1px 2px rgba(60,42,33,.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, "Noto Sans Thai", "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--ink); padding-bottom: calc(40px + env(safe-area-inset-bottom)); -webkit-font-smoothing: antialiased; line-height: 1.5; transition: background .25s; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 18px 16px; }
  .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  h1 { font-size: 23px; font-weight: 800; margin: 0; letter-spacing: -.01em; transition: color .25s; }
  .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--brand); display: inline-block; margin-right: 7px; vertical-align: 1px; transition: background .25s; }
  .nav { display: flex; gap: 12px; }
  .navlink { color: var(--brand); font-size: 13px; font-weight: 700; text-decoration: none; }
  .sub { color: var(--muted); font-size: 13px; margin: 3px 0 16px; }
  h2 { font-size: 15px; font-weight: 800; margin: 22px 0 11px; letter-spacing: -.01em; }
  h2 .h2-sub { font-weight: 500; color: var(--muted); font-size: 12px; margin-left: 6px; }

  .branch-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .branch-btn { flex: 1; text-align: center; padding: 10px 6px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; border: 1.5px solid var(--line); background: var(--surface); cursor: pointer; color: var(--ink); transition: .15s; }
  .branch-btn.active.b-rush { background: #C1502E; color: #fff; border-color: #C1502E; }
  .branch-btn.active.b-rushhour { background: #F2C744; color: #3A3420; border-color: #F2C744; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface-2); border: 1px solid var(--line); padding: 4px; border-radius: 13px; }
  .tab { flex: 1; text-align: center; padding: 9px 4px; border-radius: 9px; font-size: 13.5px; font-weight: 700; background: transparent; cursor: pointer; color: var(--muted); transition: .18s; border: none; }
  .tab.active { background: var(--surface); color: var(--brand-deep); box-shadow: var(--shadow-sm); }

  .row { display: flex; gap: 8px; }
  input, select { width: 100%; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 11px 12px; font-size: 15px; background: var(--surface); color: var(--ink); font-family: inherit; transition: .15s; }
  input:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(181,115,74,.12); }
  .btn-primary { background: var(--brand); color: #fff; border: none; border-radius: var(--radius-sm); padding: 11px 16px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: .15s; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-block { width: 100%; padding: 13px; }
  .btn-ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-danger { color: var(--red); border-color: #E0BBAA; }

  .card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
  .label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; font-weight: 600; }
  .field { margin-bottom: 13px; }

  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-sm); }
  .kpi.wide { grid-column: 1 / -1; }
  .kpi-label { font-size: 12px; color: var(--muted); margin: 0 0 5px; font-weight: 600; }
  .kpi-val { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .kpi-val small { font-size: 13px; font-weight: 600; color: var(--muted); }
  .kpi.green .kpi-val { color: var(--green); } .kpi.amber .kpi-val { color: var(--amber); } .kpi.red .kpi-val { color: var(--red); }

  .insight { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 13px 15px; margin-bottom: 9px; box-shadow: var(--shadow-sm); display: flex; gap: 11px; align-items: flex-start; }
  .insight .ic { font-size: 17px; } .insight p { margin: 0; font-size: 13.5px; } .insight .lead { font-weight: 700; } .insight .det { color: var(--muted); font-size: 12.5px; margin-top: 1px; }

  .chart-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-sm); }
  .chart-wrap { position: relative; }

  .toast { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: var(--brand-deep); color: #fff; padding: 11px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,.22); }
  .loading-text { color: var(--muted); font-size: 14px; text-align: center; padding: 40px 0; }
  .skel { background: linear-gradient(90deg, var(--line) 25%, #F4EEE6 50%, var(--line) 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: var(--radius); height: 96px; margin-bottom: 10px; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .err-box { background: #FDEAEA; color: var(--red); border: 1px solid #F3CFCF; border-radius: var(--radius-sm); padding: 10px 13px; font-size: 13px; margin-bottom: 12px; }
  .empty { text-align: center; padding: 46px 16px; color: var(--muted); font-size: 14px; }
  .empty .big { font-size: 30px; display: block; margin-bottom: 8px; opacity: .6; }

  .menu-card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); padding: 15px; margin-bottom: 10px; box-shadow: var(--shadow-sm); animation: rise .35s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .menu-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .menu-name { margin: 0; font-weight: 800; font-size: 16px; }
  .menu-price { font-size: 14px; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .gp-bar-row { display: flex; align-items: center; gap: 8px; margin: 9px 0; }
  .gp-bar-bg { flex: 1; height: 9px; border-radius: 5px; background: var(--line); overflow: hidden; }
  .gp-bar-fg { height: 100%; border-radius: 5px; transition: width .5s ease; }
  .gp-label { font-size: 13px; font-weight: 800; white-space: nowrap; }
  .ingredient-list { font-size: 12px; color: var(--muted); margin: 6px 0; line-height: 1.6; }
  .menu-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .cost-summary { display: flex; gap: 16px; font-size: 13px; }
  .cost-summary b { font-variant-numeric: tabular-nums; }
  .menu-acts { display: flex; gap: 6px; }

  .ingredient-row { display: flex; gap: 6px; align-items: flex-end; margin-bottom: 8px; }
  .ingredient-row .field { margin-bottom: 0; flex: 1; }
  .ingredient-row .field.small { flex: 0 0 64px; }
  .ingredient-row .field.unit { flex: 0 0 72px; }
  .ingredient-row input, .ingredient-row select { padding: 9px 8px; font-size: 14px; }
  .del-ing-btn { background: none; border: none; color: #c4a896; font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; height: 40px; }
  .hint { font-size: 11.5px; color: var(--muted); margin: -2px 0 12px; }

  /* themes */
  body.theme-rush { --brand: #C1502E; } body.theme-rush h1 { color: #C1502E; }
  body.theme-rushhour { background: #FFFEF7; --surface: #FFFFFF; --surface-2: #FFFCF0; --line: #F0DD8A; --brand: #C9A21A; --ink: #3A3420; --muted: #a89233; }
  body.theme-rushhour .branch-btn { border-color: #F0DD8A; }
</style>
</head>
<body id="bodyEl">
<div class="wrap" id="app">
  <div class="head">
    <h1 id="appTitle"><span class="brand-dot"></span>ต้นทุนเมนู</h1>
    <div class="nav"><a class="navlink" href="index.html">สต๊อก</a><a class="navlink" href="dashboard.html">บัญชี</a></div>
  </div>
  <p class="sub" id="summaryText">กำลังโหลดข้อมูล...</p>

  <div class="branch-row" id="branchRow">
    <div class="branch-btn b-rush" id="branchRush" onclick="setBranch('rush')">สาขา Rush</div>
    <div class="branch-btn b-rushhour" id="branchRushhour" onclick="setBranch('rushhour')">สาขา Rush Hour</div>
  </div>

  <div class="tabs">
    <button class="tab" id="tabOverview" onclick="setView('overview')">ภาพรวม</button>
    <button class="tab active" id="tabList" onclick="setView('list')">รายการเมนู</button>
    <button class="tab" id="tabAdd" onclick="setView('add')">เพิ่มเมนู</button>
  </div>

  <div id="errorBox"></div>
  <div id="content"><div class="skel"></div><div class="skel"></div></div>
</div>

<div id="modalRoot"></div>

<script>
// ===== Google Apps Script endpoint (เดิม ไม่เปลี่ยน) =====
const API_URL = "https://script.google.com/macros/s/AKfycbyjUOdNkE1p-07AdWC_ouO4SiuI3v-blgStfJWSdr-i1K4ydDVztRsTM1319siKXIrH/exec";

const UNITS = ["g", "kg", "ml", "l", "ชิ้น", "ฟอง", "ถุง", "ขวด"];
const GP_TARGET = 60; // เกณฑ์ GP ที่ตั้งเป้า (%)
const GP_MIN = 30;    // ต่ำกว่านี้ถือว่าน่าห่วง

let state = { recipes: [], view: "list", branch: "rush", sort: "gp", loaded: false, form: blankForm() };
let charts = {};

function blankForm() { return { menuName: "", sellingPrice: "", originalMenuName: null, ingredients: [newIngredientRow()] }; }
function newIngredientRow() { return { name: "", qty: "", unit: "g", buyPrice: "", packSize: "" }; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function fmtMoney(n) { return Number(n || 0).toLocaleString("th-TH", { maximumFractionDigits: 2 }); }
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }

async function apiCall(action, payload) {
  let res;
  try {
    const body = new URLSearchParams({ action });
    if (payload) body.set("payload", JSON.stringify(payload));
    res = await fetch(API_URL, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: body.toString() });
  } catch (networkErr) { throw new Error("เชื่อมต่อเครือข่ายไม่ได้: " + networkErr.message); }
  const text = await res.text();
  if (!res.ok) throw new Error("เซิร์ฟเวอร์ตอบกลับ HTTP " + res.status + " — " + text.slice(0, 200));
  try { return JSON.parse(text); } catch (e) { throw new Error("รูปแบบข้อมูลที่ได้ไม่ถูกต้อง: " + text.slice(0, 200)); }
}

async function loadAll() {
  try {
    const data = await apiCall("getAll");
    if (data.error) throw new Error(data.error);
    state.recipes = (data.recipes || []).map((r) => ({ ...r, sellingPrice: Number(r.sellingPrice) || 0, ingredientQty: Number(r.ingredientQty) || 0, buyPrice: Number(r.buyPrice) || 0, packSize: Number(r.packSize) || 0 }));
    document.getElementById("errorBox").innerHTML = "";
  } catch (e) {
    document.getElementById("errorBox").innerHTML = '<div class="err-box">เชื่อมต่อข้อมูลไม่สำเร็จ: ' + escapeHtml(e.message) + '</div>';
  }
  state.loaded = true;
  if (state.view !== "add") render();
}

function setBranch(b) { state.branch = b; render(); }
function setView(v) {
  state.view = v;
  document.getElementById("tabOverview").classList.toggle("active", v === "overview");
  document.getElementById("tabList").classList.toggle("active", v === "list");
  document.getElementById("tabAdd").classList.toggle("active", v === "add");
  if (v === "add" && !state.form.originalMenuName && state.form.menuName === "") state.form = blankForm();
  render();
}
function setSort(s) { state.sort = s; render(); }
function showToast(msg) { const t = document.createElement("div"); t.className = "toast"; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2200); }

// ---------- compute ----------
function getMenusForBranch() {
  const rows = state.recipes.filter((r) => r.branch === state.branch);
  const byMenu = {};
  rows.forEach((r) => {
    if (!byMenu[r.menuName]) byMenu[r.menuName] = { menuName: r.menuName, sellingPrice: r.sellingPrice, ingredients: [] };
    byMenu[r.menuName].ingredients.push(r);
  });
  return Object.values(byMenu);
}
function computeCost(menu) {
  let totalCost = 0;
  menu.ingredients.forEach((ing) => { const unitPrice = ing.packSize > 0 ? ing.buyPrice / ing.packSize : 0; totalCost += unitPrice * ing.ingredientQty; });
  const gpAmount = menu.sellingPrice - totalCost;
  const gpPercent = menu.sellingPrice > 0 ? (gpAmount / menu.sellingPrice) * 100 : 0;
  return { totalCost, gpAmount, gpPercent };
}
function gpColor(pct) { if (pct < GP_MIN) return "var(--red)"; if (pct < GP_TARGET) return "var(--amber)"; return "var(--green)"; }
function gpHex(pct) { if (pct < GP_MIN) return "#C24A2C"; if (pct < GP_TARGET) return "#D08A2C"; return "#6F8F4E"; }

// ---------- render ----------
function render() {
  document.getElementById("branchRush").classList.toggle("active", state.branch === "rush");
  document.getElementById("branchRushhour").classList.toggle("active", state.branch === "rushhour");
  document.getElementById("bodyEl").className = state.branch === "rushhour" ? "theme-rushhour" : "theme-rush";

  const menus = getMenusForBranch();
  document.getElementById("summaryText").textContent = !state.loaded ? "กำลังโหลดข้อมูล..." : menus.length === 0 ? "ยังไม่มีเมนู — เริ่มเพิ่มเมนูแรก" : `มี ${menus.length} เมนูในสาขานี้`;

  const content = document.getElementById("content");
  if (state.view === "overview") { content.innerHTML = renderOverview(menus); setTimeout(() => drawGPChart(menus), 0); }
  else if (state.view === "list") content.innerHTML = renderList(menus);
  else content.innerHTML = renderAddForm();
}

function renderOverview(menus) {
  if (menus.length === 0) return `<div class="empty"><span class="big">☕</span>ยังไม่มีเมนูในสาขานี้<br>ไปแท็บ "เพิ่มเมนู" เพื่อกรอกสูตรแรก</div>`;
  const stats = menus.map((m) => ({ name: m.menuName, ...computeCost(m) }));
  const avgGP = stats.reduce((s, m) => s + m.gpPercent, 0) / stats.length;
  const avgCost = stats.reduce((s, m) => s + m.totalCost, 0) / stats.length;
  const sorted = [...stats].sort((a, b) => b.gpPercent - a.gpPercent);
  const best = sorted[0], worst = sorted[sorted.length - 1];
  const lowCount = stats.filter((m) => m.gpPercent < GP_MIN).length;

  let html = `
    <div class="kpi-grid">
      <div class="kpi"><p class="kpi-label">จำนวนเมนู</p><p class="kpi-val">${menus.length}</p></div>
      <div class="kpi ${avgGP < GP_MIN ? "red" : avgGP < GP_TARGET ? "amber" : "green"}"><p class="kpi-label">GP เฉลี่ย</p><p class="kpi-val">${avgGP.toFixed(0)}<small>%</small></p></div>
      <div class="kpi"><p class="kpi-label">ต้นทุนเฉลี่ย/แก้ว</p><p class="kpi-val">${fmtMoney(avgCost)} <small>฿</small></p></div>
      <div class="kpi ${lowCount ? "red" : "green"}"><p class="kpi-label">เมนูกำไรต่ำ (&lt;${GP_MIN}%)</p><p class="kpi-val">${lowCount}</p></div>
    </div>`;

  html += `<h2>ข้อสังเกต</h2>`;
  html += `<div class="insight"><span class="ic">🏆</span><div><p class="lead">กำไรดีสุด: ${escapeHtml(best.name)} — GP ${best.gpPercent.toFixed(0)}%</p><p class="det">กำไร ${fmtMoney(best.gpAmount)} บาท/แก้ว</p></div></div>`;
  if (worst && worst.name !== best.name) {
    html += `<div class="insight"><span class="ic">${worst.gpPercent < GP_MIN ? "🔴" : "⚠️"}</span><div><p class="lead">กำไรต่ำสุด: ${escapeHtml(worst.name)} — GP ${worst.gpPercent.toFixed(0)}%</p><p class="det">${worst.gpPercent < GP_MIN ? "ต่ำกว่าเกณฑ์ — ควรทบทวนราคา/สูตร" : "กำไร " + fmtMoney(worst.gpAmount) + " บาท/แก้ว"}</p></div></div>`;
  }
  if (lowCount > 0) {
    const lows = stats.filter((m) => m.gpPercent < GP_MIN).map((m) => m.name).slice(0, 4);
    html += `<div class="insight"><span class="ic">🧮</span><div><p class="lead">${lowCount} เมนูมี GP ต่ำกว่า ${GP_MIN}%</p><p class="det">${escapeHtml(lows.join(", "))}${lowCount > 4 ? " …" : ""}</p></div></div>`;
  }

  html += `<h2>เทียบ GP รายเมนู <span class="h2-sub">เรียงจากมากไปน้อย</span></h2><div class="chart-card"><div class="chart-wrap" style="height:${Math.max(140, sorted.length * 34)}px;"><canvas id="gpChart"></canvas></div></div>`;
  return html;
}

function drawGPChart(menus) {
  Object.values(charts).forEach((c) => c && c.destroy()); charts = {};
  const cv = document.getElementById("gpChart");
  if (!cv) return;
  const stats = menus.map((m) => ({ name: m.menuName, ...computeCost(m) })).sort((a, b) => b.gpPercent - a.gpPercent);
  charts.gp = new Chart(cv, {
    type: "bar",
    data: { labels: stats.map((s) => s.name), datasets: [{ data: stats.map((s) => Math.round(s.gpPercent)), backgroundColor: stats.map((s) => gpHex(s.gpPercent)), borderRadius: 6, barThickness: 18 }] },
    options: { indexAxis: "y", responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => "GP " + c.raw + "%" } } },
      scales: { x: { beginAtZero: true, max: 100, grid: { color: "#EFE7DC" }, ticks: { callback: (v) => v + "%" } }, y: { grid: { display: false } } } },
  });
}

function renderList(menus) {
  if (menus.length === 0) return `<div class="empty"><span class="big">☕</span>ยังไม่มีเมนูในสาขานี้ — ไปแท็บ "เพิ่มเมนู" เพื่อกรอกสูตร</div>`;
  const withCost = menus.map((m) => ({ menu: m, c: computeCost(m) }));
  withCost.sort((a, b) => state.sort === "gp" ? b.c.gpPercent - a.c.gpPercent : a.menu.menuName.localeCompare(b.menu.menuName, "th"));

  let html = `<div class="row" style="margin-bottom:12px; gap:6px;">
      <button class="chip btn-ghost" style="flex:1; ${state.sort === "gp" ? "background:var(--brand);color:#fff;border-color:var(--brand);" : ""}" onclick="setSort('gp')">เรียงตาม GP</button>
      <button class="chip btn-ghost" style="flex:1; ${state.sort === "name" ? "background:var(--brand);color:#fff;border-color:var(--brand);" : ""}" onclick="setSort('name')">เรียงตามชื่อ</button>
    </div>`;

  html += withCost.map(({ menu, c }) => {
    const color = gpColor(c.gpPercent);
    const ing = menu.ingredients.map((i) => `${escapeHtml(i.ingredientName)} ${i.ingredientQty}${escapeHtml(i.ingredientUnit)}`).join(" · ");
    const nameJson = JSON.stringify(menu.menuName);
    return `
      <div class="menu-card">
        <div class="menu-top"><p class="menu-name">${escapeHtml(menu.menuName)}</p><span class="menu-price">ขาย ${fmtMoney(menu.sellingPrice)} ฿</span></div>
        <p class="ingredient-list">${ing}</p>
        <div class="gp-bar-row"><div class="gp-bar-bg"><div class="gp-bar-fg" style="width:${Math.max(0, Math.min(100, c.gpPercent))}%; background:${color}"></div></div><span class="gp-label" style="color:${color}">GP ${c.gpPercent.toFixed(0)}%</span></div>
        <div class="menu-bottom">
          <div class="cost-summary"><span>ต้นทุน <b>${fmtMoney(c.totalCost)}</b></span><span>กำไร <b style="color:${c.gpAmount >= 0 ? "var(--green)" : "var(--red)"}">${fmtMoney(c.gpAmount)}</b></span></div>
          <div class="menu-acts">
            <button class="btn-ghost" onclick='editMenu(${nameJson})'>แก้ไข</button>
            <button class="btn-ghost btn-danger" onclick='deleteMenu(${nameJson})'>ลบ</button>
          </div>
        </div>
      </div>`;
  }).join("");
  return html;
}

function editMenu(menuName) {
  const menu = getMenusForBranch().find((m) => m.menuName === menuName);
  if (!menu) return;
  state.form = {
    menuName: menu.menuName, sellingPrice: String(menu.sellingPrice || ""), originalMenuName: menu.menuName,
    ingredients: menu.ingredients.map((i) => ({ name: i.ingredientName || "", qty: String(i.ingredientQty || ""), unit: i.ingredientUnit || "g", buyPrice: String(i.buyPrice || ""), packSize: String(i.packSize || "") })),
  };
  if (state.form.ingredients.length === 0) state.form.ingredients = [newIngredientRow()];
  setView("add");
}

async function deleteMenu(menuName) {
  if (!confirm(`ลบเมนู "${menuName}" ทั้งหมด (ทุกวัตถุดิบในเมนูนี้) ใช่ไหม?`)) return;
  try {
    await fetch(API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: new URLSearchParams({ action: "deleteRecipeMenu", menuName, branch: state.branch }).toString() });
    showToast(`ลบเมนู "${menuName}" แล้ว`);
    await loadAll();
  } catch (e) { showToast("ลบไม่สำเร็จ: " + e.message); }
}

// ---------- add/edit form ----------
function renderAddForm() {
  const editing = !!state.form.originalMenuName;
  return `
    <div class="card">
      ${editing ? `<div class="insight" style="margin:-4px 0 14px;"><span class="ic">✏️</span><div><p class="lead">กำลังแก้ไข "${escapeHtml(state.form.originalMenuName)}"</p><p class="det">บันทึกแล้วระบบจะแทนที่สูตรเดิม</p></div></div>` : ""}
      <div class="field"><label class="label">ชื่อเมนู</label><input id="formMenuName" value="${escapeHtml(state.form.menuName)}" oninput="state.form.menuName=this.value" placeholder="เช่น ลาเต้ร้อน" /></div>
      <div class="field"><label class="label">ราคาขาย (บาท)</label><input id="formSellingPrice" type="number" inputmode="decimal" min="0" value="${escapeHtml(state.form.sellingPrice)}" oninput="state.form.sellingPrice=this.value; updateLivePreview()" placeholder="0" /></div>

      <h2 style="margin-top:8px;">วัตถุดิบที่ใช้</h2>
      <p class="hint">"ราคาซื้อ" = ราคาที่ซื้อมาทั้งแพ็ก · "ขนาดที่ซื้อ" = ปริมาณรวมในแพ็กนั้น (หน่วยเดียวกับที่ใช้) ระบบจะหารเป็นต้นทุนต่อหน่วยให้เอง</p>
      <div id="ingredientRows">${renderIngredientRows()}</div>
      <button class="btn-ghost" style="width:100%; margin-bottom:14px;" onclick="addIngredientRow()">+ เพิ่มวัตถุดิบ</button>

      <div class="card" style="background:var(--surface-2); margin-bottom:14px;">
        <p style="margin:0 0 4px; font-size:13px; color:var(--muted); font-weight:600;">ตัวอย่างผลคำนวณ</p>
        <p id="livePreview" style="margin:0; font-weight:800; font-size:15px;"></p>
      </div>

      <button class="btn-primary btn-block" onclick="submitMenu()">${editing ? "บันทึกการแก้ไข" : "บันทึกเมนูนี้"}</button>
      ${editing ? `<button class="btn-ghost" style="width:100%; margin-top:8px;" onclick="cancelEdit()">ยกเลิกการแก้ไข</button>` : ""}
    </div>`;
}

function renderIngredientRows() {
  return state.form.ingredients.map((ing, idx) => `
    <div class="ingredient-row">
      <div class="field"><label class="label">${idx === 0 ? "วัตถุดิบ" : ""}</label><input value="${escapeHtml(ing.name)}" oninput="updateIngredient(${idx}, 'name', this.value)" placeholder="ชื่อ" /></div>
      <div class="field small"><label class="label">${idx === 0 ? "ใช้" : ""}</label><input type="number" inputmode="decimal" min="0" value="${escapeHtml(ing.qty)}" oninput="updateIngredient(${idx}, 'qty', this.value)" placeholder="0" /></div>
      <div class="field unit"><label class="label">${idx === 0 ? "หน่วย" : ""}</label><select onchange="updateIngredient(${idx}, 'unit', this.value)">${UNITS.map((u) => `<option value="${u}" ${ing.unit === u ? "selected" : ""}>${u}</option>`).join("")}</select></div>
      <div class="field small"><label class="label">${idx === 0 ? "ราคาซื้อ" : ""}</label><input type="number" inputmode="decimal" min="0" value="${escapeHtml(ing.buyPrice)}" oninput="updateIngredient(${idx}, 'buyPrice', this.value)" placeholder="0" /></div>
      <div class="field small"><label class="label">${idx === 0 ? "ขนาด" : ""}</label><input type="number" inputmode="decimal" min="0" value="${escapeHtml(ing.packSize)}" oninput="updateIngredient(${idx}, 'packSize', this.value)" placeholder="0" /></div>
      ${state.form.ingredients.length > 1 ? `<button class="del-ing-btn" onclick="removeIngredientRow(${idx})">✕</button>` : ""}
    </div>`).join("");
}

function updateIngredient(idx, field, value) { state.form.ingredients[idx][field] = value; updateLivePreview(); }
function addIngredientRow() { state.form.ingredients.push(newIngredientRow()); document.getElementById("ingredientRows").innerHTML = renderIngredientRows(); updateLivePreview(); }
function removeIngredientRow(idx) { state.form.ingredients.splice(idx, 1); document.getElementById("ingredientRows").innerHTML = renderIngredientRows(); updateLivePreview(); }
function cancelEdit() { state.form = blankForm(); setView("list"); }

function updateLivePreview() {
  const sellingPrice = Number(state.form.sellingPrice) || 0;
  let totalCost = 0;
  state.form.ingredients.forEach((ing) => {
    const qty = Number(ing.qty) || 0, buyPrice = Number(ing.buyPrice) || 0, packSize = Number(ing.packSize) || 0;
    const unitPrice = packSize > 0 ? buyPrice / packSize : 0;
    totalCost += unitPrice * qty;
  });
  const gpAmount = sellingPrice - totalCost;
  const gpPercent = sellingPrice > 0 ? (gpAmount / sellingPrice) * 100 : 0;
  const color = gpColor(gpPercent);
  const el = document.getElementById("livePreview");
  if (el) el.innerHTML = (sellingPrice > 0 || totalCost > 0)
    ? `ต้นทุน ${fmtMoney(totalCost)} ฿ &nbsp;·&nbsp; กำไร ${fmtMoney(gpAmount)} ฿ &nbsp;·&nbsp; <span style="color:${color}">GP ${gpPercent.toFixed(1)}%</span>`
    : `<span style="color:var(--muted); font-weight:600;">กรอกราคาขายและวัตถุดิบเพื่อดูตัวอย่าง</span>`;
}

async function submitMenu() {
  const menuName = state.form.menuName.trim();
  const sellingPrice = Number(state.form.sellingPrice) || 0;
  if (!menuName) { showToast("กรุณาใส่ชื่อเมนู"); return; }
  const valid = state.form.ingredients.filter((i) => i.name.trim());
  if (valid.length === 0) { showToast("กรุณาใส่วัตถุดิบอย่างน้อย 1 รายการ"); return; }
  const original = state.form.originalMenuName;
  try {
    // แก้ไข: ลบสูตรเดิมก่อนแล้วบันทึกใหม่ (ใช้ action เดิมที่มีอยู่)
    if (original) {
      await fetch(API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: new URLSearchParams({ action: "deleteRecipeMenu", menuName: original, branch: state.branch }).toString() });
    }
    for (const ing of valid) {
      await apiCall("addRecipeRow", {
        id: uid(), menuName, sellingPrice,
        ingredientName: ing.name.trim(), ingredientQty: Number(ing.qty) || 0, ingredientUnit: ing.unit,
        buyPrice: Number(ing.buyPrice) || 0, packSize: Number(ing.packSize) || 0, branch: state.branch,
      });
    }
    showToast(original ? `แก้ไขเมนู "${menuName}" แล้ว` : `บันทึกเมนู "${menuName}" แล้ว`);
    state.form = blankForm();
    await loadAll();
    setView("list");
  } catch (e) { showToast("บันทึกไม่สำเร็จ: " + e.message); }
}

// ---------- init ----------
loadAll();
setInterval(loadAll, 15000);
</script>
</body>
</html>
