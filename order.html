<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>RUSH HOUR · สั่งเครื่องดื่ม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Noto+Sans+Thai:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="order-manifest.json">
<meta name="theme-color" content="#1A1407">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Rush Hour สั่ง">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#EFE7D4; --surface:#fff; --surface-2:#FBF7EC; --ink:#2A2208; --ink-2:#6E6446; --ink-3:#A99E7E;
    --line:#E7DCBD; --line-strong:#D9CBA3;
    --gold:#C2941A; --gold-deep:#8A6608; --gold-grad:linear-gradient(135deg,#E8C24E,#C2941A);
    --dark:#1A1407; --dark-grad:linear-gradient(135deg,#23190A,#3A2B0E);
    --green:#2F8F5B; --green-bg:#E7F3EC; --red:#C7553B; --amber:#CF9A2B;
    --shadow-sm:0 1px 2px rgba(40,32,8,.05),0 3px 12px rgba(40,32,8,.06);
    --shadow-md:0 10px 34px rgba(40,32,8,.14); --radius:18px;
  }
  *{ box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  html,body{ background:var(--bg); }
  body{ font-family:"Inter","Noto Sans Thai",sans-serif; color:var(--ink); padding-bottom:96px; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:560px; margin:0 auto; padding:0 15px; }
  img{ max-width:100%; display:block; }

  .hero{ background:var(--dark-grad); color:#fff; padding:20px 0 22px; border-bottom-left-radius:26px; border-bottom-right-radius:26px; box-shadow:var(--shadow-md); }
  .hero-inner{ max-width:560px; margin:0 auto; padding:0 18px; }
  .badge-shop{ display:inline-block; font-weight:800; font-size:12px; letter-spacing:2px; color:#2A2208; background:var(--gold-grad); padding:4px 12px; border-radius:999px; }
  .hero h1{ font-size:26px; font-weight:800; margin:12px 0 3px; background:linear-gradient(120deg,#EBC955,#FFF1C2 55%,#D9A93B); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .hero p{ font-size:13px; color:#E7DCBD; }
  .deliv{ display:inline-flex; align-items:center; gap:6px; margin-top:12px; font-size:12.5px; font-weight:700; color:#2A2208; background:#EBC955; padding:6px 13px; border-radius:999px; }
  .deliv svg{ width:16px; height:16px; }
  #installBtn{ margin-top:12px; margin-left:8px; border:1px solid #C2941A; background:transparent; color:#EBC955; font-family:inherit; font-size:12.5px; font-weight:800; padding:6px 13px; border-radius:999px; cursor:pointer; }

  h2{ font-size:16px; font-weight:800; margin:20px 0 10px; }
  .promo-row{ display:flex; gap:9px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none; }
  .promo-row::-webkit-scrollbar{ display:none; }
  .promo{ flex:0 0 auto; min-width:200px; background:var(--surface); border:1px solid var(--line); border-left:4px solid var(--gold); border-radius:14px; padding:11px 14px; box-shadow:var(--shadow-sm); }
  .promo .pt{ font-weight:800; font-size:14px; } .promo .pd{ font-size:12px; color:var(--ink-2); margin-top:2px; }

  .cats{ display:flex; gap:8px; overflow-x:auto; padding:14px 0 4px; position:sticky; top:0; background:var(--bg); z-index:20; scrollbar-width:none; }
  .cats::-webkit-scrollbar{ display:none; }
  .cat-chip{ flex:0 0 auto; padding:9px 16px; border-radius:999px; font-size:14px; font-weight:700; background:var(--surface); border:1px solid var(--line); color:var(--ink-2); cursor:pointer; white-space:nowrap; }
  .cat-chip.active{ background:var(--dark); color:#EBC955; border-color:transparent; }

  .item{ display:flex; gap:12px; align-items:center; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:11px; margin-bottom:10px; box-shadow:var(--shadow-sm); }
  .item-img{ flex:0 0 66px; width:66px; height:66px; border-radius:12px; object-fit:cover; background:var(--surface-2); }
  .item-img.ph{ display:grid; place-items:center; color:var(--line-strong); }
  .item-info{ flex:1; min-width:0; }
  .item-name{ font-weight:700; font-size:15px; }
  .item-name .tag{ font-size:10.5px; font-weight:800; color:#2A2208; background:#EBC955; padding:1px 7px; border-radius:999px; margin-left:6px; vertical-align:middle; }
  .item-desc{ font-size:11.5px; color:var(--ink-3); margin-top:2px; }
  .item-price{ font-weight:800; font-size:15px; color:var(--gold-deep); white-space:nowrap; }
  .add-btn{ flex:0 0 auto; width:38px; height:38px; border-radius:12px; border:none; background:var(--gold-grad); color:#2A2208; font-size:22px; font-weight:800; cursor:pointer; box-shadow:var(--shadow-sm); }
  .qty-ctl{ display:inline-flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:4px; }
  .qty-ctl button{ width:30px; height:30px; border:none; border-radius:9px; background:var(--dark); color:#EBC955; font-size:18px; font-weight:800; cursor:pointer; }
  .qty-ctl b{ min-width:16px; text-align:center; font-variant-numeric:tabular-nums; }

  .cart-bar{ position:fixed; left:0; right:0; bottom:0; z-index:60; padding:11px 15px calc(11px + env(safe-area-inset-bottom)); }
  .cart-bar.hidden{ display:none; }
  .cart-btn{ max-width:560px; margin:0 auto; width:100%; display:flex; align-items:center; justify-content:space-between; background:var(--dark-grad); color:#fff; border:none; border-radius:16px; padding:15px 20px; font-family:inherit; font-size:15px; font-weight:800; cursor:pointer; box-shadow:var(--shadow-md); }
  .cart-btn .c-left{ display:flex; align-items:center; gap:11px; } .cart-count{ background:#EBC955; color:#2A2208; border-radius:999px; min-width:26px; height:26px; display:grid; place-items:center; font-size:13px; } .c-total{ color:#EBC955; }

  .overlay{ position:fixed; inset:0; background:rgba(26,20,7,.5); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
  .sheet{ background:var(--bg); width:100%; max-width:560px; border-top-left-radius:24px; border-top-right-radius:24px; padding:8px 18px calc(20px + env(safe-area-inset-bottom)); max-height:92vh; overflow-y:auto; box-shadow:var(--shadow-md); }
  .sheet-grab{ width:42px; height:5px; border-radius:3px; background:var(--line-strong); margin:6px auto 12px; }
  .sheet h3{ font-size:19px; font-weight:800; margin-bottom:4px; }
  .label{ font-size:12.5px; font-weight:700; color:var(--ink-2); display:block; margin:14px 0 6px; }
  input,textarea{ width:100%; border:1px solid var(--line-strong); border-radius:11px; padding:11px 12px; font-size:14px; font-family:inherit; background:#fff; color:var(--ink); }
  input:focus,textarea:focus{ outline:none; border-color:var(--gold); }
  .seg{ display:flex; gap:7px; flex-wrap:wrap; }
  .seg button{ flex:1 1 auto; min-width:78px; border:1px solid var(--line-strong); background:#fff; border-radius:11px; padding:11px; font-family:inherit; font-size:13.5px; font-weight:700; cursor:pointer; color:var(--ink-2); }
  .seg button.on{ background:var(--gold-grad); color:#2A2208; border-color:transparent; }
  .btn-line{ width:100%; display:flex; align-items:center; justify-content:center; gap:9px; background:var(--dark-grad); color:#EBC955; border:none; border-radius:14px; padding:15px; font-family:inherit; font-size:16px; font-weight:800; cursor:pointer; box-shadow:var(--shadow-sm); margin-top:18px; }
  .btn-ghost{ width:100%; background:#fff; color:var(--ink); border:1px solid var(--line-strong); border-radius:12px; padding:12px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; margin-top:9px; }
  .crow{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--line); }
  .crow-name{ font-weight:700; font-size:14.5px; } .crow-sub{ font-size:12px; color:var(--ink-3); margin-top:2px; }
  .crow .rm{ font-size:12px; color:var(--red); font-weight:700; background:none; border:none; cursor:pointer; }
  .total-line{ display:flex; justify-content:space-between; align-items:center; padding:14px 0 4px; font-size:14px; font-weight:700; }
  .total-line b{ font-size:24px; color:var(--gold-deep); font-variant-numeric:tabular-nums; }
  .step{ display:inline-flex; align-items:center; gap:14px; background:#fff; border:1px solid var(--line-strong); border-radius:12px; padding:6px 10px; }
  .step button{ width:34px; height:34px; border:none; border-radius:9px; background:var(--dark); color:#EBC955; font-size:20px; font-weight:800; cursor:pointer; } .step b{ min-width:22px; text-align:center; font-size:16px; }
  .toast{ position:fixed; bottom:120px; left:50%; transform:translateX(-50%); background:var(--dark); color:#EBC955; padding:12px 22px; border-radius:999px; font-size:13.5px; font-weight:700; z-index:300; box-shadow:var(--shadow-md); }
  .foot-link{ text-align:center; margin:30px 0 12px; } .foot-link button{ border:none; background:none; color:var(--ink-3); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; }

  /* ===== Queue / status (ลูกค้า) ===== */
  .qwrap{ max-width:560px; margin:0 auto; padding:22px 18px; }
  .qcard{ background:var(--surface); border:1px solid var(--line); border-radius:22px; padding:26px 22px; box-shadow:var(--shadow-md); text-align:center; margin-top:14px; }
  .qcard .lab{ font-size:13px; font-weight:700; color:var(--ink-2); }
  .qno{ font-size:64px; font-weight:800; letter-spacing:1px; background:var(--gold-grad); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1.1; margin:4px 0 2px; }
  .qmeta{ font-size:12.5px; color:var(--ink-3); }
  .qstatus{ display:inline-flex; align-items:center; gap:8px; margin-top:18px; padding:11px 20px; border-radius:999px; font-weight:800; font-size:15px; }
  .qs-new{ background:var(--surface-2); color:var(--ink-2); } .qs-making{ background:#FDF3D6; color:var(--gold-deep); } .qs-done{ background:var(--green-bg); color:var(--green); }
  .qbar{ display:flex; gap:6px; margin:18px 0 4px; } .qbar div{ flex:1; height:7px; border-radius:4px; background:var(--line); } .qbar div.on{ background:var(--gold); }
  .qitems{ text-align:left; margin-top:18px; border-top:1px solid var(--line); padding-top:14px; }
  .qitems .qi{ display:flex; justify-content:space-between; font-size:13.5px; padding:4px 0; }
  .qhint{ font-size:12px; color:var(--ink-3); margin-top:14px; }

  /* ===== Barista board ===== */
  .bhead{ background:var(--dark-grad); color:#fff; padding:16px 0; position:sticky; top:0; z-index:20; }
  .bhead-in{ max-width:640px; margin:0 auto; padding:0 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .bhead h1{ font-size:17px; font-weight:800; color:#EBC955; } .bhead .sub{ font-size:11px; color:#C9BC98; }
  .bstat{ display:flex; gap:9px; max-width:640px; margin:14px auto 4px; padding:0 16px; }
  .bstat .s{ flex:1; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:11px; text-align:center; box-shadow:var(--shadow-sm); }
  .bstat .s .n{ font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; } .bstat .s .l{ font-size:11px; color:var(--ink-3); }
  .bwrap{ max-width:640px; margin:0 auto; padding:10px 16px 40px; }
  .ocard{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:var(--shadow-sm); }
  .ocard.st-making{ border-color:var(--gold); box-shadow:0 0 0 2px #FDF3D6; } .ocard.st-done{ opacity:.6; }
  .otop{ display:flex; justify-content:space-between; align-items:baseline; }
  .oqno{ font-size:20px; font-weight:800; color:var(--gold-deep); } .obadge{ font-size:11px; font-weight:800; padding:2px 9px; border-radius:999px; }
  .ob-new{ background:var(--surface-2); color:var(--ink-2); } .ob-making{ background:#FDF3D6; color:var(--gold-deep); } .ob-done{ background:var(--green-bg); color:var(--green); }
  .ometa{ font-size:12.5px; color:var(--ink-2); margin:3px 0 8px; } .ometa b{ color:var(--ink); }
  .oitems{ font-size:14px; line-height:1.6; } .oitems .v{ color:var(--ink-3); font-size:12px; }
  .oact{ display:flex; gap:8px; margin-top:11px; }
  .oact button{ flex:1; border:none; border-radius:11px; padding:11px; font-family:inherit; font-weight:800; font-size:13.5px; cursor:pointer; }
  .act-start{ background:var(--gold-grad); color:#2A2208; } .act-done{ background:var(--dark); color:#EBC955; } .act-cancel{ background:#fff; color:var(--red); border:1px solid #EED2C8; flex:0 0 auto; }
  .empty{ text-align:center; color:var(--ink-3); padding:44px 16px; }
</style>
</head>
<body>

<!-- ================= CUSTOMER: MENU ================= -->
<div id="viewMenu">
  <div class="hero"><div class="hero-inner">
    <span class="badge-shop">RUSH HOUR</span>
    <h1 id="shopName">สั่งเครื่องดื่ม-ขนม</h1>
    <p id="shopBranch">เซ็นทรัล พิษณุโลก</p>
    <span class="deliv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h11v5a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V8Z"/><path d="M16 9h2.5a2.5 2.5 0 0 1 0 5H16"/></svg><span id="delivNote">สั่งก่อน ไม่ต้องต่อคิว</span></span>
    <button id="installBtn" onclick="installApp()" style="display:none;">⤓ ติดตั้งแอป</button>
  </div></div>

  <div class="wrap">
    <h2 id="promoHead">โปรโมชั่น</h2>
    <div class="promo-row" id="promoRow"></div>
    <div class="cats" id="cats"></div>
    <div id="menu"></div>
    <div class="foot-link"><button onclick="openBaristaPin()">⚙ โหมดพนักงาน / จัดการเมนู</button></div>
  </div>

  <div class="cart-bar hidden" id="cartBar">
    <button class="cart-btn" onclick="openCart()">
      <span class="c-left"><span class="cart-count" id="cartCount">0</span><span>ดูตะกร้า &amp; สั่ง</span></span>
      <span class="c-total" id="cartTotal">฿0</span>
    </button>
  </div>
</div>

<!-- ================= CUSTOMER: QUEUE STATUS ================= -->
<div id="viewQueue" style="display:none;"></div>

<!-- ================= BARISTA ================= -->
<div id="viewBarista" style="display:none;"></div>

<div id="modalRoot"></div>

<script>
const ORDER_API = "https://script.google.com/macros/s/AKfycbxNqAugRDIWyMzd8cYp9TyW-dMCc39VBXkMX9tlAM0MzKLowTMJDTnf0VVoYs_33DQcQA/exec";

const SWEET = ["หวานปกติ", "หวานน้อย", "ไม่หวาน"];
const PICKUPS = ["ตอนนี้เลย", "พักเที่ยง 12:00", "บ่าย 15:00"];

let SHOP = { name:"RUSH HOUR", branch:"เซ็นทรัล พิษณุโลก", delivNote:"สั่งก่อน ไม่ต้องต่อคิว", icedFee:0, blendFee:10 };
let PROMOS = [];
let MENU = [];
let state = { activeCat:0, cart:{} };
let adminPin = "";
let _pollTimer = null;

function apiReady(){ return /^https:\/\/script\.google\.com/.test(ORDER_API); }
function fmt(n){ return "฿" + Number(n||0).toLocaleString("th-TH"); }
function esc(s){ const d=document.createElement("div"); d.textContent=s==null?"":s; return d.innerHTML; }
function key(name, variant){ return name + "|" + (variant||""); }
function todayISO(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }

async function api(action, payload){
  const url = ORDER_API + (ORDER_API.indexOf("?")>=0?"&":"?") + "_cb=" + Date.now();
  const body = new URLSearchParams({ action });
  if (payload) body.set("payload", JSON.stringify(payload));
  const res = await fetch(url, { method:"POST", redirect:"follow", cache:"no-store", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: body.toString() });
  const t = await res.text();
  try{ return JSON.parse(t); }catch(e){ throw new Error("รูปแบบข้อมูลผิด: " + t.slice(0,100)); }
}
function toast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2400); }
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }

/* ===================== MENU RENDER ===================== */
function initHero(){
  document.getElementById("shopName").textContent = "สั่งเครื่องดื่ม-ขนม";
  document.getElementById("shopBranch").textContent = SHOP.branch;
  document.getElementById("delivNote").textContent = SHOP.delivNote;
  document.getElementById("promoHead").style.display = PROMOS.length ? "block" : "none";
}
function renderPromos(){
  document.getElementById("promoRow").innerHTML = PROMOS.map(p=>`<div class="promo"><div class="pt">${esc(p.title)}</div><div class="pd">${esc(p.detail||"")}</div></div>`).join("");
}
function renderCats(){
  document.getElementById("cats").innerHTML = MENU.map((c,i)=>`<div class="cat-chip ${i===state.activeCat?'active':''}" onclick="setCat(${i})">${esc(c.cat)}</div>`).join("");
}
function setCat(i){ state.activeCat=i; renderCats(); renderMenu(); window.scrollTo({top:0,behavior:"smooth"}); }
function renderMenu(){
  const c = MENU[state.activeCat]; if(!c){ document.getElementById("menu").innerHTML=""; return; }
  const isCoffee = c.cat==="กาแฟ" || c.cat==="ไม่ใช่กาแฟ";
  document.getElementById("menu").innerHTML = c.items.map(it=>{
    const inCart = Object.keys(state.cart).filter(k=>state.cart[k].name===it.name).reduce((s,k)=>s+state.cart[k].qty,0);
    const hasOpts = it.temp || isCoffee;
    const right = inCart>0 && !hasOpts
      ? `<div class="qty-ctl"><button onclick="changeQty('${esc(key(it.name,""))}',-1)">−</button><b>${inCart}</b><button onclick="addItem('${esc(it.name)}')">+</button></div>`
      : `<button class="add-btn" onclick="addItem('${esc(it.name)}')">+</button>`;
    const img = it.img ? `<img class="item-img" src="${esc(it.img)}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="item-img ph"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 8h11v5a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V8Z"/><path d="M16 9h2.5a2.5 2.5 0 0 1 0 5H16"/></svg></div>`;
    const sub = it.desc ? esc(it.desc) : (it.temp ? "ร้อน/เย็น · ปรับหวานได้" : "");
    return `<div class="item">${img}
      <div class="item-info"><p class="item-name">${esc(it.name)}${it.tag?`<span class="tag">${esc(it.tag)}</span>`:""}</p>${sub?`<p class="item-desc">${sub}</p>`:""}</div>
      <span class="item-price">${fmt(it.price)}</span>${right}</div>`;
  }).join("");
}
function findItem(name){ for(const c of MENU){ for(const it of c.items){ if(it.name===name) return { it, cat:c.cat }; } } return null; }

/* ===================== ITEM OPTIONS ===================== */
let _opt = null;
function addItem(name){
  const f = findItem(name); if(!f) return;
  const isCoffee = f.cat==="กาแฟ" || f.cat==="ไม่ใช่กาแฟ";
  if (f.it.temp || isCoffee){ openOptions(f.it, isCoffee); return; }
  bump(key(name,""), name, "", f.it.price, 1);
}
function openOptions(it, isCoffee){
  _opt = { name:it.name, base:it.price, temp:it.temp?"ร้อน":"", sweet:isCoffee?"หวานปกติ":"", qty:1, isCoffee, hasTemp:it.temp };
  const tempSeg = it.temp ? `<label class="label">อุณหภูมิ</label><div class="seg" id="segTemp">
     <button class="on" data-v="ร้อน" data-add="0" onclick="pickOpt('temp',this)">ร้อน</button>
     <button data-v="เย็น" data-add="${SHOP.icedFee}" onclick="pickOpt('temp',this)">เย็น${SHOP.icedFee?` +${SHOP.icedFee}`:""}</button>
     <button data-v="ปั่น" data-add="${SHOP.blendFee}" onclick="pickOpt('temp',this)">ปั่น +${SHOP.blendFee}</button></div>` : "";
  const sweetSeg = isCoffee ? `<label class="label">ความหวาน</label><div class="seg" id="segSweet">
     ${SWEET.map((s,i)=>`<button class="${i===0?'on':''}" data-v="${s}" onclick="pickOpt('sweet',this)">${s}</button>`).join("")}</div>` : "";
  document.getElementById("modalRoot").innerHTML = `
    <div class="overlay" onclick="if(event.target===this) closeModal()"><div class="sheet">
      <div class="sheet-grab"></div><h3>${esc(it.name)}</h3>
      ${tempSeg}${sweetSeg}
      <label class="label">จำนวน</label>
      <div class="step"><button onclick="optQty(-1)">−</button><b id="optQty">1</b><button onclick="optQty(1)">+</button></div>
      <button class="btn-line" onclick="confirmOpt()">ใส่ตะกร้า · <span id="optTotal">${fmt(it.price)}</span></button>
    </div></div>`;
}
function pickOpt(kind, btn){
  const seg = btn.parentNode; seg.querySelectorAll("button").forEach(b=>b.classList.remove("on")); btn.classList.add("on");
  if(kind==="temp") _opt.temp = btn.dataset.v; else _opt.sweet = btn.dataset.v;
  updateOptTotal();
}
function optQty(d){ _opt.qty=Math.max(1,_opt.qty+d); document.getElementById("optQty").textContent=_opt.qty; updateOptTotal(); }
function optAdd(){ let a=0; if(_opt.hasTemp){ const b=document.querySelector("#segTemp button.on"); a=Number(b&&b.dataset.add||0); } return a; }
function updateOptTotal(){ const el=document.getElementById("optTotal"); if(el) el.textContent=fmt((_opt.base+optAdd())*_opt.qty); }
function confirmOpt(){
  const parts=[]; if(_opt.temp) parts.push(_opt.temp); if(_opt.sweet && _opt.sweet!=="หวานปกติ") parts.push(_opt.sweet);
  const variant = parts.join(" · ");
  bump(key(_opt.name, variant), _opt.name, variant, _opt.base+optAdd(), _opt.qty);
  closeModal();
}

/* ===================== CART ===================== */
function bump(k,name,variant,unit,delta){
  if(!state.cart[k]) state.cart[k]={ name,variant,unit,qty:0 };
  state.cart[k].qty+=delta; if(state.cart[k].qty<=0) delete state.cart[k];
  renderMenu(); renderCartBar();
}
function changeQty(k,d){ if(state.cart[k]) bump(k,state.cart[k].name,state.cart[k].variant,state.cart[k].unit,d); }
function cartCount(){ return Object.values(state.cart).reduce((s,c)=>s+c.qty,0); }
function cartTotal(){ return Object.values(state.cart).reduce((s,c)=>s+c.unit*c.qty,0); }
function renderCartBar(){ const n=cartCount(); document.getElementById("cartBar").classList.toggle("hidden",n===0); document.getElementById("cartCount").textContent=n; document.getElementById("cartTotal").textContent=fmt(cartTotal()); }

let _pickup = PICKUPS[0];
function cartRows(){
  return Object.entries(state.cart).map(([k,c])=>`<div class="crow">
    <div><div class="crow-name">${c.qty}× ${esc(c.name)}</div><div class="crow-sub">${c.variant?esc(c.variant)+" · ":""}${fmt(c.unit)} /แก้ว <button class="rm" onclick="cartQty('${esc(k)}',-99)">ลบ</button></div></div>
    <div class="qty-ctl"><button onclick="cartQty('${esc(k)}',-1)">−</button><b>${c.qty}</b><button onclick="cartQty('${esc(k)}',1)">+</button></div></div>`).join("");
}
function openCart(){
  if(cartCount()===0) return; _pickup=PICKUPS[0];
  document.getElementById("modalRoot").innerHTML = `
    <div class="overlay" onclick="if(event.target===this) closeModal()"><div class="sheet">
      <div class="sheet-grab"></div><h3>ตะกร้า · สั่งเลย</h3>
      <div id="cartRows">${cartRows()}</div>
      <div class="total-line"><span>รวม (ราคาพนักงาน)</span><b id="sumTotal">${fmt(cartTotal())}</b></div>
      <label class="label">ชื่อ + ร้าน/ชั้น (ไว้เรียกรับ)</label><input id="fName" placeholder="เช่น มายด์ · ร้านรองเท้า ชั้น 2">
      <label class="label">รับเมื่อไหร่</label>
      <div class="seg" id="segPickup">${PICKUPS.map((t,i)=>`<button class="${i===0?'on':''}" data-v="${t}" onclick="pickPickup(this)">${t}</button>`).join("")}<button data-v="custom" onclick="pickPickup(this)">อื่นๆ</button></div>
      <input id="fPickupCustom" placeholder="เช่น 14:30" style="display:none; margin-top:8px;">
      <label class="label">หมายเหตุถึงบาริสต้า (ถ้ามี)</label><input id="fNote" placeholder="เช่น แก้วส่วนตัว / แยกน้ำแข็ง">
      <button class="btn-line" onclick="submitOrder()">ส่งออเดอร์ · เข้าคิวรับเลข</button>
      <button class="btn-ghost" onclick="closeModal()">สั่งเพิ่ม</button>
    </div></div>`;
}
function cartQty(k,d){
  if(state.cart[k]){ if(d===-99){ delete state.cart[k]; renderMenu(); renderCartBar(); } else bump(k,state.cart[k].name,state.cart[k].variant,state.cart[k].unit,d); }
  if(cartCount()===0){ closeModal(); return; }
  const r=document.getElementById("cartRows"); if(r) r.innerHTML=cartRows();
  const e=document.getElementById("sumTotal"); if(e) e.textContent=fmt(cartTotal());
}
function pickPickup(btn){
  btn.parentNode.querySelectorAll("button").forEach(b=>b.classList.remove("on")); btn.classList.add("on");
  const cust=document.getElementById("fPickupCustom");
  if(btn.dataset.v==="custom"){ cust.style.display="block"; _pickup=""; cust.focus(); } else { cust.style.display="none"; _pickup=btn.dataset.v; }
}
async function submitOrder(){
  if(!apiReady()){ toast("ยังไม่ได้ตั้งค่า ORDER_API"); return; }
  const name=(document.getElementById("fName").value||"").trim();
  if(!name){ toast("ใส่ชื่อ+ร้าน ไว้เรียกรับ"); return; }
  let pickup=_pickup; const cust=document.getElementById("fPickupCustom"); if(cust&&cust.style.display!=="none") pickup=(cust.value||"").trim()||"ตอนนี้เลย";
  const note=(document.getElementById("fNote").value||"").trim();
  const items=Object.values(state.cart).map(c=>({ name:c.name, variant:c.variant, unit:c.unit, qty:c.qty }));
  const total=cartTotal();
  const btn=event&&event.target; if(btn){ btn.disabled=true; btn.textContent="กำลังส่ง..."; }
  try{
    const r=await api("createOrder",{ name, note, pickup, items, total, branch:"rushhour" });
    if(r&&r.error) throw new Error(r.error);
    state.cart={}; renderCartBar(); closeModal();
    saveMyOrder({ id:r.id, queueNo:r.queueNo });
    showQueue(r.id);
  }catch(e){ toast("ส่งไม่สำเร็จ: "+e.message); if(btn){ btn.disabled=false; btn.textContent="ส่งออเดอร์ · เข้าคิวรับเลข"; } }
}

/* ===================== QUEUE STATUS (customer) ===================== */
function saveMyOrder(o){ try{ localStorage.setItem("rh_myorder", JSON.stringify(o)); }catch(e){} }
function getMyOrder(){ try{ return JSON.parse(localStorage.getItem("rh_myorder")||"null"); }catch(e){ return null; } }
function clearMyOrder(){ try{ localStorage.removeItem("rh_myorder"); }catch(e){} }

const ST = { new:{t:"รับออเดอร์แล้ว",c:"qs-new",bars:1}, making:{t:"กำลังทำ ☕",c:"qs-making",bars:2}, done:{t:"เสร็จแล้ว มารับได้เลย 🎉",c:"qs-done",bars:3}, cancel:{t:"ยกเลิกแล้ว",c:"qs-new",bars:0} };
function showQueue(id){
  document.getElementById("viewMenu").style.display="none";
  document.getElementById("viewBarista").style.display="none";
  const v=document.getElementById("viewQueue"); v.style.display="block";
  renderQueue(null);
  stopPoll(); pollOrder(id); _pollTimer=setInterval(()=>pollOrder(id),8000);
}
async function pollOrder(id){ try{ const r=await api("getOrder",{id}); if(r&&r.ok) renderQueue(r.order); else if(r&&r.error==="not found"){ stopPoll(); } }catch(e){} }
function renderQueue(o){
  const v=document.getElementById("viewQueue");
  if(!o){ v.innerHTML=`<div class="qwrap"><div class="qcard"><div class="lab">กำลังโหลดสถานะ...</div></div></div>`; return; }
  const s=ST[o.status]||ST.new;
  const items=(o.items||[]).map(i=>`<div class="qi"><span>${i.qty}× ${esc(i.name)}${i.variant?` <span style="color:var(--ink-3)">(${esc(i.variant)})</span>`:""}</span><span>${fmt(i.unit*i.qty)}</span></div>`).join("");
  v.innerHTML=`<div class="qwrap">
    <div style="text-align:center;"><span class="badge-shop" style="background:var(--gold-grad);">RUSH HOUR</span></div>
    <div class="qcard">
      <div class="lab">หมายเลขคิวของคุณ</div>
      <div class="qno">${esc(o.queueNo)}</div>
      <div class="qmeta">${(o.items||[]).reduce((s,i)=>s+i.qty,0)} รายการ · ${fmt(o.total)} · รับ ${esc(o.pickup||"ตอนนี้เลย")} · ชำระตอนรับ</div>
      <div class="qbar"><div class="${s.bars>=1?'on':''}"></div><div class="${s.bars>=2?'on':''}"></div><div class="${s.bars>=3?'on':''}"></div></div>
      <div class="qstatus ${s.c}">${s.t}</div>
      <div class="qitems">${items}</div>
      <div class="qhint">หน้านี้อัปเดตสถานะอัตโนมัติ ไม่ต้องรีเฟรช</div>
    </div>
    <button class="btn-ghost" style="max-width:560px;margin:14px auto 0;" onclick="backToMenu()">สั่งเพิ่มอีกออเดอร์</button>
  </div>`;
}
function backToMenu(){ stopPoll(); clearMyOrder(); document.getElementById("viewQueue").style.display="none"; document.getElementById("viewMenu").style.display="block"; }
function stopPoll(){ if(_pollTimer){ clearInterval(_pollTimer); _pollTimer=null; } }

/* ===================== BARISTA MODE ===================== */
function openBaristaPin(){
  if(!apiReady()){ alert("ยังไม่ได้ตั้งค่า ORDER_API — ต้อง Deploy order.gs แล้ววางลิงก์ก่อน"); return; }
  document.getElementById("modalRoot").innerHTML=`
    <div class="overlay" onclick="if(event.target===this) closeModal()"><div class="sheet" style="max-width:380px;">
      <div class="sheet-grab"></div><h3>โหมดพนักงาน</h3>
      <p style="font-size:12.5px;color:var(--ink-2);">ใส่ PIN พนักงานเพื่อดูคิวออเดอร์ + จัดการเมนู</p>
      <input id="bpin" type="password" inputmode="numeric" maxlength="8" placeholder="••••" style="text-align:center;letter-spacing:8px;font-size:22px;margin-top:10px;" onkeydown="if(event.key==='Enter') submitBaristaPin()">
      <button class="btn-line" onclick="submitBaristaPin()">เข้าโหมดพนักงาน</button>
    </div></div>`;
  setTimeout(()=>{ const el=document.getElementById("bpin"); if(el) el.focus(); },120);
}
async function submitBaristaPin(){
  const pin=(document.getElementById("bpin")||{}).value||""; if(!pin){ toast("ใส่ PIN"); return; }
  try{ const r=await api("checkPin",{pin}); if(r&&r.ok){ adminPin=pin; closeModal(); openBarista(); } else toast("PIN ไม่ถูกต้อง"); }
  catch(e){ toast("เชื่อมต่อไม่ได้: "+e.message); }
}
function openBarista(){
  document.getElementById("viewMenu").style.display="none";
  document.getElementById("viewQueue").style.display="none";
  const v=document.getElementById("viewBarista"); v.style.display="block";
  v.innerHTML=`<div class="bhead"><div class="bhead-in"><div><h1>คิวออเดอร์วันนี้</h1><div class="sub">อัปเดตอัตโนมัติทุก 8 วินาที</div></div>
      <div style="display:flex;gap:8px;"><button class="btn-ghost" style="width:auto;margin:0;padding:8px 12px;font-size:12px;" onclick="openMenuEditor()">แก้เมนู</button>
      <button class="btn-ghost" style="width:auto;margin:0;padding:8px 12px;font-size:12px;" onclick="exitBarista()">ออก</button></div></div></div>
    <div class="bstat"><div class="s"><div class="n" id="cNew">0</div><div class="l">รอทำ</div></div><div class="s"><div class="n" id="cMaking" style="color:var(--gold-deep)">0</div><div class="l">กำลังทำ</div></div><div class="s"><div class="n" id="cDone" style="color:var(--green)">0</div><div class="l">เสร็จ</div></div><div class="s"><div class="n" id="cTotal" style="color:var(--gold-deep)">฿0</div><div class="l">ยอดวันนี้</div></div></div>
    <div class="bwrap" id="boardRows"><div class="empty">กำลังโหลด...</div></div>`;
  stopPoll(); loadBoard(); _pollTimer=setInterval(loadBoard,8000);
}
function exitBarista(){ stopPoll(); document.getElementById("viewBarista").style.display="none"; document.getElementById("viewMenu").style.display="block"; }
async function loadBoard(){
  try{
    const r=await api("listOrders",{ pin:adminPin });
    if(r&&r.error) return;
    document.getElementById("cNew").textContent=r.counts.new||0;
    document.getElementById("cMaking").textContent=r.counts.making||0;
    document.getElementById("cDone").textContent=r.counts.done||0;
    document.getElementById("cTotal").textContent=fmt(r.dailyTotal||0);
    renderBoard(r.orders||[]);
  }catch(e){}
}
const OB={ new:{t:"ใหม่",c:"ob-new"}, making:{t:"กำลังทำ",c:"ob-making"}, done:{t:"เสร็จ",c:"ob-done"}, cancel:{t:"ยกเลิก",c:"ob-new"} };
function renderBoard(orders){
  const active=orders.filter(o=>o.status!=="done"&&o.status!=="cancel");
  const done=orders.filter(o=>o.status==="done");
  const box=document.getElementById("boardRows");
  if(orders.length===0){ box.innerHTML=`<div class="empty">ยังไม่มีออเดอร์วันนี้</div>`; return; }
  const card=o=>{
    const b=OB[o.status]||OB.new;
    const items=(o.items||[]).map(i=>`<div>${i.qty}× ${esc(i.name)}${i.variant?` <span class="v">(${esc(i.variant)})</span>`:""}</div>`).join("");
    let act="";
    if(o.status==="new") act=`<button class="act-start" onclick="setStatus('${o.id}','making')">เริ่มทำ</button><button class="act-cancel" onclick="setStatus('${o.id}','cancel')">ยกเลิก</button>`;
    else if(o.status==="making") act=`<button class="act-done" onclick="setStatus('${o.id}','done')">เสร็จ · เรียกรับ</button>`;
    else act=`<button class="act-cancel" style="flex:1;" onclick="setStatus('${o.id}','making')">กลับไปทำ</button>`;
    return `<div class="ocard st-${o.status}"><div class="otop"><span class="oqno">${esc(o.queueNo)}</span><span class="obadge ${b.c}">${b.t} · ${esc(o.time)}</span></div>
      <div class="ometa"><b>${esc(o.name||"-")}</b> · รับ ${esc(o.pickup||"-")} · ${fmt(o.total)}${o.note?`<br>📝 ${esc(o.note)}`:""}</div>
      <div class="oitems">${items}</div><div class="oact">${act}</div></div>`;
  };
  box.innerHTML = active.map(card).join("") + (done.length?`<div class="label" style="margin:16px 0 6px;">เสร็จแล้ว (${done.length})</div>`+done.map(card).join(""):"");
}
async function setStatus(id,status){
  try{ const r=await api("setOrderStatus",{ pin:adminPin, id, status }); if(r&&r.error){ toast(r.error); return; } loadBoard(); }
  catch(e){ toast("ไม่สำเร็จ: "+e.message); }
}

/* ===================== MENU EDITOR (PIN) ===================== */
let adm={ menu:[], promos:[] };
function openMenuEditor(){
  adm.menu = JSON.parse(JSON.stringify(MENU)).map(c=>({cat:c.cat,items:(c.items||[]).map(it=>({name:it.name||"",price:Number(it.price)||0,temp:!!it.temp,tag:it.tag||"",desc:it.desc||"",img:it.img||""}))}));
  adm.promos = JSON.parse(JSON.stringify(PROMOS)).map(p=>({title:p.title||"",detail:p.detail||""}));
  renderEditor();
}
function renderEditor(){
  const cats=adm.menu.map((c,ci)=>{
    const items=c.items.map((it,ii)=>`<div style="border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:9px;background:var(--surface-2);">
      <div class="seg" style="margin-bottom:7px;"><input value="${esc(it.name)}" placeholder="ชื่อเมนู" oninput="admI(${ci},${ii},'name',this.value)"><input style="flex:0 0 90px;" type="number" value="${it.price}" placeholder="ราคา" oninput="admI(${ci},${ii},'price',this.value)"></div>
      <div class="seg" style="margin-bottom:7px;"><input value="${esc(it.tag)}" placeholder="ป้าย (ขายดี)" oninput="admI(${ci},${ii},'tag',this.value)"><label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--ink-2);white-space:nowrap;padding:0 4px;"><input type="checkbox" style="width:18px;height:18px;" ${it.temp?"checked":""} onchange="admI(${ci},${ii},'temp',this.checked)">ร้อน/เย็น</label></div>
      <input value="${esc(it.img)}" placeholder="ลิงก์รูปเมนู (https://...)" oninput="admI(${ci},${ii},'img',this.value)" style="margin-bottom:7px;">
      <div class="seg"><input value="${esc(it.desc)}" placeholder="คำอธิบาย" oninput="admI(${ci},${ii},'desc',this.value)"><button class="act-cancel" style="flex:0 0 auto;" onclick="admDelI(${ci},${ii})">ลบ</button></div>
    </div>`).join("");
    return `<div style="background:#fff;border:1px solid var(--line-strong);border-radius:16px;padding:12px;margin-bottom:12px;">
      <div class="seg" style="margin-bottom:9px;"><input value="${esc(c.cat)}" placeholder="ชื่อหมวด" style="font-weight:800;" oninput="admC(${ci},this.value)"><button class="act-cancel" style="flex:0 0 auto;" onclick="admDelC(${ci})">ลบหมวด</button></div>
      ${items}<button class="btn-ghost" style="margin-top:0;" onclick="admAddI(${ci})">+ เพิ่มเมนูในหมวดนี้</button></div>`;
  }).join("");
  const promos=adm.promos.map((p,pi)=>`<div style="border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:9px;background:var(--surface-2);">
     <input value="${esc(p.title)}" placeholder="หัวข้อโปร" style="margin-bottom:7px;" oninput="admP(${pi},'title',this.value)">
     <div class="seg"><input value="${esc(p.detail)}" placeholder="รายละเอียด" oninput="admP(${pi},'detail',this.value)"><button class="act-cancel" style="flex:0 0 auto;" onclick="admDelP(${pi})">ลบ</button></div></div>`).join("");
  document.getElementById("modalRoot").innerHTML=`
    <div class="overlay"><div class="sheet" style="max-height:94vh;">
      <div class="sheet-grab"></div><h3>จัดการเมนู</h3>
      <div class="label">เมนู &amp; ราคา &amp; รูป</div>${cats}
      <button class="btn-ghost" onclick="admAddC()">+ เพิ่มหมวดใหม่</button>
      <div class="label">โปรโมชั่น</div>${promos}<button class="btn-ghost" onclick="admAddP()">+ เพิ่มโปรโมชั่น</button>
      <button class="btn-line" onclick="admSave()">💾 บันทึกเมนู (ลูกค้าเห็นทันที)</button>
      <button class="btn-ghost" onclick="closeModal()">ปิด</button>
    </div></div>`;
}
function admC(ci,v){ adm.menu[ci].cat=v; }
function admI(ci,ii,f,v){ adm.menu[ci].items[ii][f]=(f==="price")?(Number(v)||0):v; }
function admP(pi,f,v){ adm.promos[pi][f]=v; }
function admAddI(ci){ adm.menu[ci].items.push({name:"",price:0,temp:false,tag:"",desc:"",img:""}); renderEditor(); }
function admDelI(ci,ii){ adm.menu[ci].items.splice(ii,1); renderEditor(); }
function admAddC(){ adm.menu.push({cat:"",items:[{name:"",price:0,temp:false,tag:"",desc:"",img:""}]}); renderEditor(); }
function admDelC(ci){ if(confirm("ลบทั้งหมวด?")){ adm.menu.splice(ci,1); renderEditor(); } }
function admAddP(){ adm.promos.push({title:"",detail:""}); renderEditor(); }
function admDelP(pi){ adm.promos.splice(pi,1); renderEditor(); }
async function admSave(){
  const menu=[]; adm.menu.forEach(c=>{ const cat=(c.cat||"").trim(); c.items.forEach(it=>{ if(cat&&(it.name||"").trim()) menu.push({cat,name:it.name.trim(),price:Number(it.price)||0,temp:it.temp?"yes":"no",tag:(it.tag||"").trim(),desc:(it.desc||"").trim(),img:(it.img||"").trim()}); }); });
  const promos=adm.promos.filter(p=>(p.title||"").trim()).map(p=>({title:p.title.trim(),detail:(p.detail||"").trim()}));
  if(menu.length===0){ toast("ต้องมีเมนูอย่างน้อย 1"); return; }
  try{ const r=await api("saveMenu",{ pin:adminPin, menu, promos }); if(r&&r.error) throw new Error(r.error); toast("บันทึกเมนูแล้ว ✓"); closeModal(); await fetchMenu(); }
  catch(e){ toast("บันทึกไม่สำเร็จ: "+e.message); }
}

/* ===================== INIT ===================== */
initHero(); renderPromos(); renderCats(); renderMenu(); renderCartBar();
async function fetchMenu(){
  if(!apiReady()) return;
  try{
    const d=await api("getMenu");
    if(d&&!d.error){
      if(d.shop) SHOP=Object.assign({},SHOP,d.shop);
      if(Array.isArray(d.promos)) PROMOS=d.promos;
      if(Array.isArray(d.menu)&&d.menu.length) MENU=d.menu;
      state.activeCat=0; initHero(); renderPromos(); renderCats(); renderMenu(); renderCartBar();
    }
  }catch(e){}
}
(function boot(){
  const mode=new URLSearchParams(location.search).get("mode");
  fetchMenu();
  if(mode==="barista"){ openBaristaPin(); return; }
  const mine=getMyOrder();
  if(mine&&mine.id){ showQueue(mine.id); }
})();
</script>

(function(){ if(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone) return; var b=document.getElementById('installBtn'); window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();_dp=e;if(b)b.style.display='inline-block';}); if(_iOS&&b) setTimeout(()=>{b.style.display='inline-block';},1400); })();
