<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>เบเกอรี่ · Rush Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F6F3EC">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
  :root{
    --bg:#F6F3EC; --bg-grad: radial-gradient(135% 110% at 50% -10%, #FDFBF6 0%, #F6F3EC 55%, #EFE9DC 100%);
    --surface:#FFFFFF; --surface-2:#FBF8F1; --line:#ECE6DA; --line-strong:#DED6C5;
    --ink:#241F17; --ink-2:#6B6253; --ink-3:#A49A86;
    --green:#2F8F5B; --green-bg:#E9F4EE; --red:#C7553B; --red-bg:#FBEDE9; --amber:#CF9A2B; --amber-bg:#FAF2DD; --blue:#3E6E8E; --blue-bg:#E9F0F5;
    --shadow-sm:0 1px 2px rgba(40,32,20,.04), 0 2px 8px rgba(40,32,20,.05); --shadow-md:0 6px 22px rgba(40,32,20,.10);
    --radius:16px; --radius-sm:11px;
    --accent:#B5870F; --accent-deep:#8A6608; --accent-soft:#FAF3DC;
    --accent-grad:linear-gradient(135deg,#E3BE4A 0%,#C2941A 100%);
    --metal-grad:linear-gradient(120deg,#A6800E 0%,#EBC955 48%,#9A7110 100%); --on-accent:#3A2C04;
  }
  body.b-rush{ --accent:#6E7884; --accent-deep:#3A424D; --accent-soft:#EDF0F3; --accent-grad:linear-gradient(135deg,#8C95A1 0%,#69727E 100%); --metal-grad:linear-gradient(120deg,#737C88 0%,#CBD1D8 48%,#6A7280 100%); --on-accent:#FFFFFF; }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{ font-family:"Inter","Noto Sans Thai",-apple-system,"Segoe UI",sans-serif; background:var(--bg); background-image:var(--bg-grad); background-attachment:fixed; color:var(--ink); padding-bottom:86px; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:600px; margin:0 auto; padding:14px 16px 8px; }

  .appbar{ position:sticky; top:0; z-index:40; background:rgba(246,243,236,.85); backdrop-filter:saturate(160%) blur(14px); border-bottom:1px solid var(--line); }
  .appbar-inner{ max-width:600px; margin:0 auto; padding:11px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .logo{ width:38px; height:38px; border-radius:12px; display:grid; place-items:center; color:#fff; background:var(--accent-grad); box-shadow:var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.35); flex-shrink:0; }
  .logo svg{ width:21px; height:21px; }
  .wordmark{ font-weight:800; font-size:15px; letter-spacing:.4px; line-height:1; background:var(--metal-grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .brand-tag{ font-size:11px; color:var(--ink-3); margin-top:2px; }
  .clock-now{ font-variant-numeric:tabular-nums; font-size:15px; font-weight:800; color:var(--accent-deep); }

  h1{ font-size:20px; font-weight:800; margin:6px 0 2px; }
  h2{ font-size:14px; font-weight:800; margin:18px 0 9px; }
  .sub{ color:var(--ink-2); font-size:12.5px; margin:0 0 14px; }

  .tabs{ display:flex; gap:5px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:4px; margin-bottom:14px; box-shadow:var(--shadow-sm); overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{ flex:1; min-width:74px; text-align:center; padding:9px 6px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; color:var(--ink-2); white-space:nowrap; transition:.15s; }
  .tab.active{ background:var(--accent-grad); color:var(--on-accent); box-shadow:var(--shadow-sm); }

  .row{ display:flex; gap:8px; margin-bottom:11px; align-items:center; }
  input,select{ width:100%; border:1px solid var(--line-strong); border-radius:10px; padding:10px 11px; font-size:14px; background:var(--surface); color:var(--ink); font-family:inherit; transition:.15s; }
  input:focus,select:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .label{ font-size:12px; color:var(--ink-2); margin-bottom:5px; display:block; font-weight:600; }
  .field{ margin-bottom:12px; }
  .card{ border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); padding:15px; margin-bottom:11px; box-shadow:var(--shadow-sm); }

  .btn-primary{ background:var(--accent-grad); color:var(--on-accent); border:none; border-radius:11px; padding:11px 16px; font-size:14px; font-weight:800; cursor:pointer; white-space:nowrap; box-shadow:var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.3); }
  .btn-primary:active{ transform:scale(.98); }
  .btn-block{ width:100%; padding:13px; }
  .btn-ghost{ background:var(--surface); color:var(--ink); border:1px solid var(--line-strong); border-radius:11px; padding:10px 14px; font-size:13px; font-weight:700; cursor:pointer; }
  .chip{ border:1px solid var(--line); border-radius:999px; padding:7px 13px; font-size:13px; background:var(--surface); cursor:pointer; white-space:nowrap; color:var(--ink-2); font-weight:600; }
  .chip.active{ background:var(--accent-grad); color:var(--on-accent); border-color:transparent; box-shadow:var(--shadow-sm); }
  .chiprow{ display:flex; gap:7px; overflow-x:auto; padding-bottom:11px; scrollbar-width:none; }
  .chiprow::-webkit-scrollbar{ display:none; }

  /* timeline run card */
  .run-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .run-name{ margin:0; font-weight:800; font-size:17px; }
  .run-ready{ font-size:12.5px; color:var(--ink-2); margin:3px 0 0; }
  .start-banner{ display:flex; align-items:center; gap:10px; background:var(--accent-soft); border:1px solid #EFE0B8; border-radius:12px; padding:11px 13px; margin:12px 0; }
  .start-banner svg{ width:20px; height:20px; color:var(--accent-deep); flex-shrink:0; }
  .start-banner b{ font-variant-numeric:tabular-nums; }
  .behind{ background:var(--red-bg); border-color:#EED2C8; color:var(--red); }
  .ontime{ background:var(--green-bg); border-color:#CDE6D7; color:#27764a; }
  .step{ display:flex; align-items:center; gap:11px; padding:9px 0; border-bottom:1px dashed var(--line); }
  .step:last-child{ border-bottom:none; }
  .step-check{ width:24px; height:24px; border-radius:7px; border:1.8px solid var(--line-strong); flex-shrink:0; display:grid; place-items:center; cursor:pointer; background:var(--surface); }
  .step-check.done{ background:var(--green); border-color:var(--green); color:#fff; }
  .step-check svg{ width:15px; height:15px; }
  .step-body{ flex:1; min-width:0; }
  .step-name{ font-size:14px; font-weight:600; }
  .step.done .step-name{ text-decoration:line-through; color:var(--ink-3); }
  .step-time{ font-size:12px; color:var(--ink-2); font-variant-numeric:tabular-nums; margin-top:1px; }
  .step.now{ background:var(--accent-soft); border-radius:9px; margin:0 -8px; padding:9px 8px; }
  .daybadge{ font-size:10px; font-weight:800; padding:1px 6px; border-radius:6px; background:var(--blue-bg); color:var(--blue); margin-left:5px; }

  /* orders */
  .ord-row{ display:grid; grid-template-columns:1fr auto auto auto; gap:8px; align-items:center; padding:11px 0; border-bottom:1px solid var(--line); }
  .ord-row:last-child{ border-bottom:none; }
  .ord-name{ font-weight:700; font-size:14px; }
  .ord-mini{ width:58px; }
  .ord-mini input{ padding:7px 6px; text-align:center; font-variant-numeric:tabular-nums; font-weight:700; }
  .ord-lbl{ font-size:10px; color:var(--ink-3); text-align:center; display:block; margin-bottom:3px; font-weight:600; }
  .idea{ background:var(--amber-bg); border:1px solid #EFE0B8; border-radius:10px; padding:9px 12px; font-size:12px; color:#8a6a14; margin:8px 0 2px; line-height:1.55; }
  .idea b{ color:#6e5410; }

  /* stats */
  .stat-card{ border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); padding:14px; margin-bottom:10px; box-shadow:var(--shadow-sm); }
  .stat-top{ display:flex; justify-content:space-between; align-items:baseline; }
  .bar{ height:9px; border-radius:6px; background:var(--accent-soft); overflow:hidden; margin:9px 0 6px; }
  .bar > span{ display:block; height:100%; border-radius:6px; }
  .kv{ display:flex; gap:14px; flex-wrap:wrap; font-size:12.5px; color:var(--ink-2); }
  .kv b{ color:var(--ink); font-variant-numeric:tabular-nums; }

  .badge{ font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:999px; }
  .b-amber{ background:var(--amber-bg); color:#8a6a14; } .b-green{ background:var(--green-bg); color:#27764a; } .b-red{ background:var(--red-bg); color:var(--red); }
  .empty{ text-align:center; padding:40px 16px; color:var(--ink-3); font-size:14px; }
  .empty svg{ width:38px; height:38px; opacity:.5; margin-bottom:10px; }
  .loading-text{ color:var(--ink-3); font-size:14px; text-align:center; padding:36px 0; }
  .err-box{ background:var(--red-bg); color:var(--red); border:1px solid #EED2C8; border-radius:10px; padding:10px 13px; font-size:13px; margin-bottom:13px; font-weight:600; }
  .setup-box{ background:var(--amber-bg); color:#8a6a14; border:1px solid #EFE0B8; border-radius:12px; padding:14px; font-size:13px; line-height:1.6; }
  .setup-box code{ background:#fff; padding:1px 6px; border-radius:5px; }
  .toast{ position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:13px; font-weight:600; z-index:160; box-shadow:var(--shadow-md); white-space:nowrap; }

  .bottom-nav{ position:fixed; left:0; right:0; bottom:0; z-index:60; background:rgba(246,243,236,.9); backdrop-filter:saturate(160%) blur(14px); border-top:1px solid var(--line); padding:7px 6px calc(7px + env(safe-area-inset-bottom)); }
  .nav-inner{ display:flex; max-width:600px; margin:0 auto; gap:2px; }
  .nav-item{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 1px; border-radius:13px; color:var(--ink-3); font-size:9.5px; font-weight:700; text-decoration:none; white-space:nowrap; transition:.15s; }
  .nav-item svg{ width:21px; height:21px; }
  .nav-item.active{ color:var(--accent-deep); background:var(--accent-soft); }
  .fab{ position:fixed; right:16px; bottom:calc(96px + env(safe-area-inset-bottom)); z-index:70; display:flex; align-items:center; gap:8px; padding:14px 18px; border:none; border-radius:999px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:800; color:var(--on-accent); background:var(--accent-grad); box-shadow:var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.3); }
  .fab svg{ width:18px; height:18px; }

  .overlay{ position:fixed; inset:0; background:rgba(36,31,23,.5); backdrop-filter:blur(2px); display:flex; align-items:flex-end; justify-content:center; z-index:120; }
  .sheet{ background:var(--surface); border-radius:20px 20px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); width:100%; max-width:600px; box-shadow:0 -10px 40px rgba(0,0,0,.18); animation:up .22s ease; max-height:90vh; overflow-y:auto; }
  @keyframes up{ from{ transform:translateY(20px); opacity:.6 } to{ transform:none; opacity:1 } }
  @media(min-width:600px){ .overlay{ align-items:center; padding:16px; } .sheet{ border-radius:20px; max-width:440px; } }
  .sheet h3{ margin:0 0 14px; font-size:18px; font-weight:800; }
  .step-edit{ display:flex; gap:7px; align-items:center; margin-bottom:8px; }
  .step-edit input.nm{ flex:1; } .step-edit input.du{ width:78px; text-align:center; }
  .del-ic{ background:none; border:none; color:#C4B9A6; font-size:19px; cursor:pointer; padding:0 4px; }
</style>
</head>
<body id="bodyEl">

  <div class="appbar-inner">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13h16M5 13c0-4 3-7 7-7s7 3 7 7"/><path d="M4 13a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2"/><path d="M9 6V4M12 6V3.5M15 6V4"/></svg>

      <div><div class="wordmark">RUSH BAKERY</div><div class="brand-tag">วางแผนผลิต · ส่งสาขา · ของเหลือ</div></div>

</button>

  <a class="nav-item" href="attendance.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>ตอกบัตร</a>

<div id="modalRoot"></div>

<script>
// ====== วาง URL ของ Google Apps Script (Bakery) ที่ deploy เป็น Web App ======
const API_URL = "https://script.google.com/macros/s/AKfycbxelwmSht1vaPZc9Y5wjjffHIIOKZx-OCxuuhBDXcwebbxm3w05ZlaBL98UpzPjQCkr/exec";

const BRANCHES = [ { id:"rush", label:"Rush" }, { id:"rushhour", label:"Rush Hour" } ];
const BRANCH_LABEL = { rush:"Rush", rushhour:"Rush Hour", all:"รวมทุกสาขา" };

let state = {
  tab:"timeline", date: todayStr(), branch:"all", statsPeriod:"30",
  data:{ items:[], runs:[], orders:[] }, loaded:false, error:"", modal:false,
};

function apiReady(){ return /^https:\/\/script\.google\.com/.test(API_URL); }
function escapeHtml(s){ const d=document.createElement("div"); d.textContent=s==null?"":s; return d.innerHTML; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function todayStr(){ return toLocal(new Date()); }
function toLocal(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${dd}`; }
function fmtClock(d){ return d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}); }
function fmtDayShort(d){ return d.toLocaleDateString("th-TH",{weekday:"short",day:"2-digit",month:"short"}); }
function hm(min){ min=Math.round(min); const h=Math.floor(min/60), m=min%60; return (h?h+" ชม. ":"")+(m?m+" นาที":(h?"":"0 นาที")); }

function tickClock(){ const el=document.getElementById("clockNow"); if(el) el.textContent=new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}); }

async function apiCall(action, payload){
  let res;
  try{
    const body=new URLSearchParams({ action });
    if (payload) body.set("payload", JSON.stringify(payload));
    res=await fetch(API_URL,{ method:"POST", redirect:"follow", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body:body.toString() });
  }catch(e){ throw new Error("เชื่อมต่อเครือข่ายไม่ได้: "+e.message); }
  const t=await res.text();
  if(!res.ok) throw new Error("HTTP "+res.status+" — "+t.slice(0,180));
  try{ return JSON.parse(t); }catch(e){ throw new Error("ข้อมูลไม่ถูกต้อง: "+t.slice(0,180)); }
}

async function loadAll(){
  if (!apiReady()){ state.loaded=true; render(); return; }
  try{
    const d=await apiCall("getAll");
    if (d.error) throw new Error(d.error);
    state.data={ items:d.items||[], runs:d.runs||[], orders:d.orders||[] };
    state.error="";
  }catch(e){
    // ถ้ามีข้อมูลอยู่แล้ว (เคยโหลดสำเร็จ) อย่าเด้ง error ใหญ่จากการรีเฟรชที่สะดุดชั่วคราว
    const hasData = state.data && (state.data.items.length || state.data.runs.length || state.data.orders.length);
    state.error = hasData ? "" : e.message;
  }
  state.loaded=true; render();
}

function itemById(id){ return state.data.items.find(function(i){ return i.id===id; }); }
function showToast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; state.modal=false; }

function setTab(t){
  state.tab=t;
  ["timeline","orders","stats","items"].forEach(function(x){ document.getElementById("tab"+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle("active", x===t); });
  document.getElementById("bodyEl").className = (t==="orders" && state.branch==="rush") ? "b-rush" : "";
  render();
}

function render(){
  if (state.tab==="orders" && state.branch==="rush") document.getElementById("bodyEl").className="b-rush"; else document.getElementById("bodyEl").className="";
  document.getElementById("errorBox").innerHTML = state.error ? `<div class="err-box">${escapeHtml(state.error)}</div>` : "";
  const fab=document.getElementById("fab"); const fl=document.getElementById("fabLabel");
  const c=document.getElementById("content");
  if (!state.loaded){ c.innerHTML=`<div class="loading-text">กำลังโหลด...</div>`; fab.style.display="none"; return; }
  if (!apiReady()){ c.innerHTML=setupNotice(); fab.style.display="none"; return; }

  if (state.tab==="timeline"){ c.innerHTML=renderTimeline(); fab.style.display="flex"; fl.textContent="เพิ่มรอบผลิต"; }
  else if (state.tab==="orders"){ c.innerHTML=renderOrders(); fab.style.display="flex"; fl.textContent="เพิ่มออเดอร์"; }
  else if (state.tab==="stats"){ c.innerHTML=renderStats(); fab.style.display="none"; }
  else { c.innerHTML=renderItems(); fab.style.display="flex"; fl.textContent="เพิ่มเมนู"; }
}

function setupNotice(){
  return `<div class="setup-box"><b>⚙️ ยังไม่ได้เชื่อมระบบหลังบ้าน</b><br>
  เปิดไฟล์ <code>bakery.html</code> แล้ววางลิงก์ Google Apps Script (Web App) ในตัวแปร <code>API_URL</code><br>
  โค้ดหลังบ้านอยู่ในไฟล์ <code>bakery.gs</code> — รัน <code>setup()</code> ครั้งเดียวจะได้เมนูตัวอย่าง 3 ชนิด แล้ว Deploy เอา /exec มาวาง</div>`;
}

// ---------------- TIMELINE ----------------
function computeSchedule(steps, dateStr, timeStr){
  const end=new Date(dateStr+"T"+(timeStr||"06:30")+":00");
  let cur=new Date(end); const out=[];
  for(let i=steps.length-1;i>=0;i--){
    const dur=Number(steps[i].durationMin)||0;
    const e=new Date(cur), s=new Date(cur.getTime()-dur*60000);
    out.unshift({ idx:i, name:steps[i].name, dur:dur, start:s, end:e });
    cur=s;
  }
  return { start:cur, end:end, steps:out };
}

function renderTimeline(){
  let html=`<h1>ไทม์ไลน์ผลิต</h1><p class="sub">วางแผนถอยหลังให้เสร็จทันเวลา</p>
    <div class="row"><div class="field" style="flex:1; margin:0;"><label class="label">วันที่ผลิต (วันที่ต้องเสร็จ)</label>
    <input type="date" value="${state.date}" onchange="setDate(this.value)"></div></div>`;

  const runs=state.data.runs.filter(function(r){ return r.date===state.date; });
  if (runs.length===0){
    html+=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><div>ยังไม่มีรอบผลิตวันนี้ — กด "เพิ่มรอบผลิต"</div></div>`;
    return html;
  }
  const now=new Date();
  runs.sort(function(a,b){ return (a.readyTime||"").localeCompare(b.readyTime||""); });
  runs.forEach(function(run){
    const item=itemById(run.itemId); if(!item) return;
    const sc=computeSchedule(item.steps||[], run.date, run.readyTime);
    const done=(run.doneSteps||"").split(",").filter(function(x){return x!=="";}).map(Number);
    const allDone=item.steps.length>0 && done.length>=item.steps.length;
    // หา step ปัจจุบัน / สถานะช้า
    let behind=false, nowIdx=-1;
    sc.steps.forEach(function(st){ if(now>=st.start && now<st.end) nowIdx=st.idx; if(now>st.end && done.indexOf(st.idx)<0) behind=true; });
    const startSoon = now < sc.start;
    let bannerClass = allDone ? "ontime" : (behind ? "behind" : "");
    let bannerText = allDone
      ? `เสร็จครบทุกขั้นแล้ว ✓`
      : (startSoon
          ? `ต้องเริ่ม <b>${fmtClock(sc.start)}</b> ${sameDay(sc.start,now)?"":"("+fmtDayShort(sc.start)+")"} — อีก ${hm((sc.start-now)/60000)}`
          : (behind ? `ช้ากว่ากำหนด! รีบทำขั้นที่ค้างอยู่` : `กำลังอยู่ในช่วงผลิต — ทำตามคิวด้านล่าง`));

    html+=`<div class="card">
      <div class="run-head">
        <div><p class="run-name">${escapeHtml(item.name)}</p>
        <p class="run-ready">พร้อมเสิร์ฟ ${run.readyTime} น. · ${fmtDayShort(new Date(run.date+'T00:00:00'))} · ใช้เวลารวม ${hm((sc.end-sc.start)/60000)}</p></div>
        <button class="del-ic" onclick="deleteRun('${run.id}')">✕</button>
      </div>
      <div class="start-banner ${bannerClass}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>
        <div>${bannerText}</div>
      </div>`;
    sc.steps.forEach(function(st){
      const isDone=done.indexOf(st.idx)>=0;
      const cross = !sameDay(st.start, new Date(run.date+'T00:00:00'));
      html+=`<div class="step ${isDone?'done':''} ${st.idx===nowIdx&&!isDone?'now':''}">
        <div class="step-check ${isDone?'done':''}" onclick="toggleStep('${run.id}',${st.idx})">${isDone?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>':''}</div>
        <div class="step-body">
          <div class="step-name">${escapeHtml(st.name)}</div>
          <div class="step-time">${fmtClock(st.start)} – ${fmtClock(st.end)} · ${hm(st.dur)}${cross?`<span class="daybadge">${fmtDayShort(st.start)}</span>`:''}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  return html;
}
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function setDate(v){ state.date=v; render(); }

async function toggleStep(runId, idx){
  const run=state.data.runs.find(function(r){return r.id===runId;}); if(!run) return;
  let done=(run.doneSteps||"").split(",").filter(function(x){return x!=="";});
  const s=String(idx); const pos=done.indexOf(s);
  if(pos>=0) done.splice(pos,1); else done.push(s);
  run.doneSteps=done.join(","); render();
  try{ await apiCall("saveRun",{ id:run.id, doneSteps:run.doneSteps }); }catch(e){ showToast("บันทึกไม่สำเร็จ"); }
}

function renderStats(){
  let html=`<h1>สถิติ</h1><p class="sub">ส่ง · เหลือ · ขายได้ เพื่อปรับจำนวนผลิต</p>
    <div class="chiprow">
      ${["7","30","all"].map(function(p){return `<div class="chip ${state.statsPeriod===p?'active':''}" onclick="setStatsPeriod('${p}')">${p==='all'?'ทั้งหมด':p+' วัน'}</div>`;}).join("")}
    </div>`;
  const cutoff = state.statsPeriod==="all" ? null : (function(){ const d=new Date(); d.setDate(d.getDate()-(Number(state.statsPeriod)-1)); return toLocal(d); })();
  const orders=state.data.orders.filter(function(o){ return !cutoff || o.date>=cutoff; });
  if (orders.length===0){ html+=`<div class="empty">ยังไม่มีข้อมูลออเดอร์ในช่วงนี้</div>`; return html; }

  const byItem={};
  orders.forEach(function(o){
    const k=o.itemId; if(!byItem[k]) byItem[k]={ sent:0, left:0, order:0, days:{} };
    byItem[k].sent+=o.qtySent; byItem[k].left+=o.qtyLeft; byItem[k].order+=o.qtyOrder; byItem[k].days[o.date]=true;
  });
  // KPI รวม (คิด "ขายได้%" จากยอดสั่ง)
  let TO=0,TS=0,TL=0; Object.keys(byItem).forEach(function(k){ TO+=byItem[k].order; TS+=byItem[k].sent; TL+=byItem[k].left; });
  const TSold=Math.max(0,TS-TL); const TsellPct=TO>0?(TSold/TO*100):0;
  html+=`<div class="card"><div class="kv" style="font-size:13px;">
    <span>สั่ง <b>${TO}</b></span><span>ส่ง <b>${TS}</b></span><span>ขายได้ <b style="color:var(--green)">${TSold}</b></span>
    <span>เหลือ <b style="color:${TL>0?'var(--red)':'var(--ink-3)'}">${TL}</b></span><span>ขายได้ <b>${TsellPct.toFixed(0)}%</b> ของที่สั่ง</span></div></div>`;

  // ----- คำแนะนำจัดการของเหลือ (อิงสถิติจริง) -----
  const leftList=Object.keys(byItem).map(function(k){
    const s=byItem[k]; const it=itemById(k); const nDays=Object.keys(s.days).length||1;
    return { name:it?it.name:k, ideas:it?it.leftoverIdeas:"", left:s.left, sent:s.sent, nDays:nDays, avgLeft:s.left/nDays };
  }).filter(function(x){ return x.left>0; }).sort(function(a,b){ return b.left-a.left; });
  html+=`<h2 style="margin-top:18px;">💡 คำแนะนำจัดการของเหลือ</h2>`;
  if (leftList.length===0){
    html+=`<div class="card" style="text-align:center; color:var(--green); font-weight:700;">ช่วงนี้แทบไม่มีของเหลือ — เยี่ยมมาก! 🎉</div>`;
  } else {
    leftList.forEach(function(x){
      const avgSold=Math.max(0,(x.sent-x.left)/x.nDays); const suggest=Math.ceil(avgSold);
      html+=`<div class="card">
        <div class="stat-top"><b style="font-size:15px;">${escapeHtml(x.name)}</b><span class="badge b-red">เหลือ ~${x.avgLeft.toFixed(1)}/วัน</span></div>
        <p style="margin:6px 0 9px; font-size:12.5px; color:var(--ink-2);">รวมเหลือ ${x.left} ชิ้น จาก ${x.nDays} วัน · ลดผลิตเหลือ ~<b>${suggest}</b>/วัน จะเหลือน้อยลง</p>
        ${x.ideas?`<div class="idea" style="margin:0;"><b>ของเหลือ ~${Math.round(x.avgLeft)} ชิ้น/วัน เอาไปทำต่อ:</b> ${escapeHtml(x.ideas)}</div>`:`<div style="font-size:12px; color:var(--ink-3);">ยังไม่ได้ใส่ไอเดียของเหลือ — เพิ่มในแท็บ "เมนู"</div>`}
      </div>`;
    });
  }
  html+=`<h2 style="margin-top:18px;">รายละเอียดรายชนิด</h2>`;

  Object.keys(byItem).sort(function(a,b){return byItem[b].sent-byItem[a].sent;}).forEach(function(k){
    const s=byItem[k]; const it=itemById(k); const sold=Math.max(0,s.sent-s.left);
    const base=s.order>0?s.order:s.sent;                       // ฐาน = ยอดสั่ง
    const sellPct=base>0?(sold/base*100):0;                    // ขายได้ ÷ สั่ง
    const shortPct=s.order>0?(Math.max(0,s.order-s.sent)/s.order*100):0; // ส่งไม่ครบ
    const nDays=Object.keys(s.days).length||1; const avgSold=sold/nDays; const suggest=Math.ceil(avgSold);
    const col = sellPct>=90?"var(--green)":sellPct>=70?"var(--amber)":"var(--red)";
    html+=`<div class="stat-card">
      <div class="stat-top"><b style="font-size:15px;">${escapeHtml(it?it.name:k)}</b><span class="badge ${sellPct>=90?'b-green':sellPct>=70?'b-amber':'b-red'}">ขายได้ ${sellPct.toFixed(0)}%</span></div>
      <div class="bar"><span style="width:${Math.min(100,sellPct)}%; background:${col};"></span></div>
      <div class="kv"><span>สั่ง <b>${s.order}</b></span><span>ส่ง <b>${s.sent}</b></span><span>ขายได้ <b style="color:var(--green)">${sold}</b></span><span>เหลือ <b style="color:${s.left>0?'var(--red)':'var(--ink-3)'}">${s.left}</b></span></div>
      <div style="margin-top:9px; font-size:12.5px; color:var(--accent-deep); background:var(--accent-soft); border-radius:9px; padding:8px 11px;">💡 ขายได้ <b>${sellPct.toFixed(0)}%</b> ของที่สั่ง${shortPct>0?` · ส่งไม่ครบ ${shortPct.toFixed(0)}%`:''} · แนะนำผลิต ~ <b>${suggest}</b>/วัน</div>
    </div>`;
  });
  return html;
}

      <label class="label">ขั้นตอน + เวลา (นาที) — เรียงจากเริ่มแรก → ออกเตา</label>
      <div id="stepRows">${renderStepRows()}</div>
      <button class="btn-ghost" style="width:100%; margin:2px 0 14px;" onclick="addStepRow()">+ เพิ่มขั้นตอน</button>
      <div class="field"><label class="label">ไอเดียของเหลือ (ทำต่อลดต้นทุน)</label><input id="ifIdeas" value="${escapeHtml(it.leftoverIdeas||'')}" placeholder="เช่น ครัวซองอัลมอนด์ · พุดดิ้ง"></div>
      <div class="row" style="margin:0;">
        ${id?`<button class="btn-ghost" style="color:var(--red); border-color:#EED2C8;" onclick="deleteItem('${escapeHtml(it.id)}')">ลบ</button>`:''}
        <button class="btn-ghost" style="flex:1;" onclick="closeModal()">ยกเลิก</button>
        <button class="btn-primary" style="flex:1;" onclick="submitItem('${id?escapeHtml(it.id):''}')">บันทึก</button>
      </div>
    </div></div>`;
}
function renderStepRows(){
  return window._editSteps.map(function(s,i){
    return `<div class="step-edit"><input class="nm" value="${escapeHtml(s.name)}" oninput="window._editSteps[${i}].name=this.value" placeholder="ชื่อขั้นตอน"><input class="du" type="number" min="0" inputmode="numeric" value="${s.durationMin}" oninput="window._editSteps[${i}].durationMin=Number(this.value)||0" placeholder="นาที">${window._editSteps.length>1?`<button class="del-ic" onclick="removeStepRow(${i})">✕</button>`:''}</div>`;
  }).join("");
}
function addStepRow(){ window._editSteps.push({name:"",durationMin:0}); document.getElementById("stepRows").innerHTML=renderStepRows(); }
function removeStepRow(i){ window._editSteps.splice(i,1); document.getElementById("stepRows").innerHTML=renderStepRows(); }
async function submitItem(id){
  const name=document.getElementById("ifName").value.trim(); if(!name){ showToast("ใส่ชื่อเมนู"); return; }
  const steps=window._editSteps.filter(function(s){ return s.name.trim(); });
  const obj={ id:id||("IT"+uid()), name:name, category:document.getElementById("ifCat").value.trim(), active:"yes", steps:steps, leftoverIdeas:document.getElementById("ifIdeas").value.trim() };
  closeModal();
  try{ await apiCall("saveItem", obj); await loadAll(); showToast("บันทึกเมนูแล้ว"); }catch(e){ showToast("บันทึกไม่สำเร็จ: "+e.message); }
}
async function deleteItem(id){
  if(!confirm("ลบเมนูนี้?")) return; closeModal();
  try{ await apiCall("deleteItem",{ id:id }); await loadAll(); }catch(e){ showToast("ลบไม่สำเร็จ"); }
}

// ---------------- FAB ----------------
function onFab(){
  if (state.tab==="timeline") openRunForm();
  else if (state.tab==="orders") openOrderForm();
  else if (state.tab==="items") openItemForm("");
}

// init
tickClock(); setInterval(tickClock, 1000);
loadAll();
setInterval(function(){ if(!state.modal) loadAll(); }, 25000);
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
