<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F3EE">
<title>สต๊อกวัตถุดิบ · Rush Coffee</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #F7F3EE; --surface: #FFFFFF; --surface-2: #FBF8F3;
    --ink: #2A1D16; --muted: #9A8B7E; --line: #ECE4DA;
    --brand: #B5734A; --brand-deep: #3C2A21;
    --green: #6F8F4E; --amber: #D08A2C; --red: #C24A2C;
    --radius: 16px; --radius-sm: 11px;
    --shadow: 0 1px 2px rgba(60,42,33,.05), 0 10px 30px rgba(60,42,33,.06);
    --shadow-sm: 0 1px 2px rgba(60,42,33,.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, "Noto Sans Thai", "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    padding-bottom: calc(76px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased; line-height: 1.5;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 18px 16px; }
  .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
  h1 { font-size: 23px; font-weight: 800; margin: 0; letter-spacing: -.01em; }
  .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--brand); display: inline-block; margin-right: 7px; vertical-align: 1px; }
  .sub { color: var(--muted); font-size: 13px; margin: 2px 0 18px; }
  h2 { font-size: 15px; font-weight: 800; margin: 22px 0 11px; letter-spacing: -.01em; }
  h2 .h2-sub { font-weight: 500; color: var(--muted); font-size: 12px; margin-left: 6px; }

  /* segmented tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface-2); border: 1px solid var(--line); padding: 4px; border-radius: 13px; }
  .tab {
    flex: 1; text-align: center; padding: 9px 4px; border-radius: 9px; font-size: 13.5px; font-weight: 700;
    background: transparent; cursor: pointer; color: var(--muted); transition: .18s; border: none;
  }
  .tab.active { background: var(--surface); color: var(--brand-deep); box-shadow: var(--shadow-sm); }

  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  input, select {
    width: 100%; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 11px 12px;
    font-size: 15px; background: var(--surface); color: var(--ink); font-family: inherit; transition: .15s;
  }
  input:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(181,115,74,.12); }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input { padding-left: 38px; }
  .search-ic { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }

  .btn-primary {
    background: var(--brand); color: #fff; border: none; border-radius: var(--radius-sm);
    padding: 11px 16px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: .15s;
  }
  .btn-primary:active { transform: scale(0.97); }

  .chip {
    border: 1px solid var(--line); border-radius: 999px; padding: 7px 13px; font-size: 13px; font-weight: 600;
    background: var(--surface); cursor: pointer; white-space: nowrap; color: var(--ink); transition: .15s;
  }
  .chip.active { background: var(--brand-deep); color: #fff; border-color: var(--brand-deep); }
  .chiprow { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
  .chiprow::-webkit-scrollbar { display: none; }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-sm); }
  .kpi-label { font-size: 12px; color: var(--muted); margin: 0 0 6px; font-weight: 600; }
  .kpi-val { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .kpi-val small { font-size: 13px; font-weight: 600; color: var(--muted); margin-left: 3px; }
  .kpi.accent-red .kpi-val { color: var(--red); }
  .kpi.accent-amber .kpi-val { color: var(--amber); }
  .kpi.accent-green .kpi-val { color: var(--green); }

  .card {
    border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface);
    padding: 14px; display: flex; gap: 12px; align-items: stretch; margin-bottom: 10px; box-shadow: var(--shadow-sm);
    animation: rise .35s ease both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .bar { width: 4px; border-radius: 4px; flex-shrink: 0; }
  .card-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .item-name { margin: 0; font-weight: 700; font-size: 15.5px; overflow: hidden; text-overflow: ellipsis; }
  .item-qty { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .gauge-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
  .gauge-bg { flex: 1; height: 7px; border-radius: 5px; background: var(--line); overflow: hidden; }
  .gauge-fg { height: 100%; border-radius: 5px; transition: width .5s ease; }
  .min-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .cat-pill { font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--line); color: var(--muted); font-weight: 600; }
  .meta-note { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .actions { display: flex; gap: 6px; }
  .actions .chip { padding: 5px 11px; font-size: 12px; }

  .empty { text-align: center; padding: 46px 16px; color: var(--muted); font-size: 14px; }
  .empty .big { font-size: 30px; display: block; margin-bottom: 8px; opacity: .6; }

  /* alert banner */
  .alert {
    display: flex; align-items: center; gap: 10px; background: #FCEFE6; border: 1px solid #F1D6C2;
    color: #9B4A22; border-radius: var(--radius); padding: 12px 14px; font-size: 13.5px; font-weight: 600; margin-bottom: 14px;
  }
  .alert .ic { font-size: 18px; }
  .alert.ok { background: #EEF4E6; border-color: #DCE8C8; color: #5A7236; }

  .insight {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 13px 15px; margin-bottom: 9px; box-shadow: var(--shadow-sm); display: flex; gap: 11px; align-items: flex-start;
  }
  .insight .ic { font-size: 17px; line-height: 1.4; }
  .insight p { margin: 0; font-size: 13.5px; }
  .insight .lead { font-weight: 700; }
  .insight .det { color: var(--muted); font-size: 12.5px; margin-top: 1px; }

  .chart-wrap { position: relative; height: 200px; }
  .chart-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-sm); }

  /* overlay / modal */
  .overlay { position: fixed; inset: 0; background: rgba(42,29,22,.42); display: flex; align-items: flex-end; justify-content: center; padding: 0; z-index: 50; animation: fade .2s; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 22px 20px calc(24px + env(safe-area-inset-bottom)); width: 100%; max-width: 520px; animation: slideup .26s cubic-bezier(.2,.8,.2,1); }
  @keyframes slideup { from { transform: translateY(100%); } to { transform: none; } }
  .sheet h2 { margin-top: 0; }
  .grab { width: 38px; height: 4px; background: var(--line); border-radius: 4px; margin: -6px auto 14px; }
  .label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; font-weight: 600; }
  .field { margin-bottom: 13px; }

  .toast {
    position: fixed; bottom: calc(86px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    background: var(--brand-deep); color: #fff; padding: 11px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,.22); animation: fade .2s;
  }
  .log-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); gap: 10px; }
  .log-row:last-child { border-bottom: none; }
  .loading-text { color: var(--muted); font-size: 14px; text-align: center; padding: 40px 0; }
  .skel { background: linear-gradient(90deg, var(--line) 25%, #F4EEE6 50%, var(--line) 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: var(--radius); height: 78px; margin-bottom: 10px; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .err-box { background: #FDEAEA; color: var(--red); border: 1px solid #F3CFCF; border-radius: var(--radius-sm); padding: 10px 13px; font-size: 13px; margin-bottom: 12px; }

  /* bottom nav */
  .fab {
    position: fixed; right: max(18px, calc(50% - 260px + 18px)); bottom: calc(20px + env(safe-area-inset-bottom));
    width: 56px; height: 56px; border-radius: 50%; background: var(--brand); color: #fff; border: none;
    font-size: 28px; font-weight: 300; cursor: pointer; box-shadow: 0 8px 24px rgba(181,115,74,.4); z-index: 40; transition: .15s;
  }
  .fab:active { transform: scale(.92); }
  .navlink { color: var(--brand); font-size: 13px; font-weight: 700; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="head">
    <h1><span class="brand-dot"></span>สต๊อกวัตถุดิบ</h1>
    <a class="navlink" href="dashboard.html">บัญชี →</a>
  </div>
  <p class="sub" id="summaryText">กำลังโหลดข้อมูล...</p>

  <div class="tabs">
    <button class="tab active" id="tabOverview" onclick="setView('overview')">ภาพรวม</button>
    <button class="tab" id="tabList" onclick="setView('list')">รายการสต๊อก</button>
    <button class="tab" id="tabHistory" onclick="setView('history')">ประวัติ</button>
  </div>

  <div id="errorBox"></div>
  <div id="content"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>
</div>

<button class="fab" id="fab" onclick="openItemForm()" title="เพิ่มวัตถุดิบ" style="display:none;">+</button>
<div id="modalRoot"></div>

<script>
// ===== Google Apps Script endpoint (เดิม ไม่เปลี่ยน) =====
const API_URL = "https://script.google.com/macros/s/AKfycbzRGIVn3Vz6doKwYY6ltuEQIhrs9YYtvyiqXJBnckQh9705ZePIYZcOgFwQ5j5LtMoo/exec";

const UNITS = ["g", "kg", "ml", "l", "ชิ้น", "ถุง", "ขวด", "กล่อง"];
const CATEGORIES = [
  { id: "coffee", label: "กาแฟ", color: "#7A4A2B" },
  { id: "drink", label: "เครื่องดื่ม/ไซรัป", color: "#C98A2C" },
  { id: "dairy", label: "นม/ครีม", color: "#C9B79A" },
  { id: "bakery", label: "เบเกอรี่/ขนม", color: "#B5734A" },
  { id: "other", label: "อื่นๆ", color: "#9A8B7E" },
];
const USAGE_WINDOW_DAYS = 14; // หน้าต่างคำนวณอัตราการใช้

let state = { items: [], logs: [], view: "overview", filterCat: "all", search: "", loaded: false };
let charts = {};

function catLabel(id) { const c = CATEGORIES.find((c) => c.id === id); return c ? c.label : "อื่นๆ"; }
function catColor(id) { const c = CATEGORIES.find((c) => c.id === id); return c ? c.color : "#9A8B7E"; }
function levelColor(ratio) { if (ratio <= 0) return "var(--red)"; if (ratio < 1) return "var(--amber)"; return "var(--green)"; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }
function fmtNum(n) { return Number(n || 0).toLocaleString("th-TH", { maximumFractionDigits: 1 }); }

async function apiCall(action, payload) {
  let res;
  try {
    const body = new URLSearchParams({ action });
    if (payload) body.set("payload", JSON.stringify(payload));
    res = await fetch(API_URL, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: body.toString() });
  } catch (networkErr) { throw new Error("เชื่อมต่อเครือข่ายไม่ได้: " + networkErr.message); }
  const text = await res.text();
  if (!res.ok) throw new Error("เซิร์ฟเวอร์ตอบกลับ HTTP " + res.status + " — " + text.slice(0, 200));
  try { return JSON.parse(text); } catch (e) { throw new Error("รูปแบบข้อมูลที่ได้ไม่ถูกต้อง: " + text.slice(0, 200)); }
}

async function loadAll() {
  try {
    const data = await apiCall("getAll");
    if (data.error) throw new Error(data.error);
    state.items = (data.items || []).map((it) => ({ ...it, qty: Number(it.qty) || 0, min: Number(it.min) || 0 }));
    state.logs = (data.logs || []).sort((a, b) => new Date(b.time) - new Date(a.time));
    document.getElementById("errorBox").innerHTML = "";
  } catch (e) {
    document.getElementById("errorBox").innerHTML = '<div class="err-box">เชื่อมต่อข้อมูลไม่สำเร็จ: ' + escapeHtml(e.message) + '</div>';
  }
  state.loaded = true;
  // ไม่ re-render ถ้ามี modal เปิดอยู่ เพื่อไม่ให้ค่าที่กรอกหาย
  if (!document.getElementById("modalRoot").innerHTML.trim()) render();
}

function setView(v) {
  state.view = v;
  ["overview", "list", "history"].forEach((k) => document.getElementById("tab" + k[0].toUpperCase() + k.slice(1)).classList.toggle("active", v === k));
  document.getElementById("fab").style.display = v === "list" ? "block" : "none";
  render();
}

function showToast(msg) { const t = document.createElement("div"); t.className = "toast"; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2200); }

// ---------- analytics ----------
function lowItems() { return state.items.filter((it) => it.min > 0 && it.qty < it.min); }
function outItems() { return state.items.filter((it) => it.qty <= 0); }

function movementsInDays(days) {
  const since = Date.now() - days * 864e5;
  return state.logs.filter((l) => { const t = new Date(l.time).getTime(); return !isNaN(t) && t >= since; });
}

// อัตราการใช้ต่อวัน (จาก log type=out) ภายในหน้าต่างที่กำหนด → ต่อชื่อวัตถุดิบ
function usageRateByName() {
  const since = Date.now() - USAGE_WINDOW_DAYS * 864e5;
  const used = {};
  state.logs.forEach((l) => {
    if (l.type !== "out") return;
    const t = new Date(l.time).getTime();
    if (isNaN(t) || t < since) return;
    const amt = Math.abs(Number(l.delta) || 0);
    used[l.itemName] = (used[l.itemName] || 0) + amt;
  });
  const rate = {};
  Object.keys(used).forEach((n) => (rate[n] = used[n] / USAGE_WINDOW_DAYS));
  return { used, rate };
}

function daysLeftFor(item, rate) {
  const r = rate[item.name];
  if (!r || r <= 0) return null;
  return item.qty / r;
}

function countUp(el, target, suffix) {
  const dur = 600, start = performance.now();
  function step(now) {
    const p = Math.min(1, (now - start) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(target * e).toLocaleString("th-TH") + (suffix || "");
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ---------- render ----------
function render() {
  const low = lowItems().length;
  document.getElementById("summaryText").textContent = !state.loaded ? "กำลังโหลดข้อมูล..."
    : low > 0 ? `${low} รายการใกล้หมด — ควรสั่งเพิ่ม` : `ดูแลอยู่ ${state.items.length} รายการ · ทุกอย่างพอใช้`;

  const content = document.getElementById("content");
  if (state.view === "overview") { content.innerHTML = renderOverview(); setTimeout(drawOverviewCharts, 0); }
  else if (state.view === "list") content.innerHTML = renderList();
  else content.innerHTML = renderHistory();
}

function renderOverview() {
  if (state.items.length === 0) return `<div class="empty"><span class="big">📦</span>ยังไม่มีวัตถุดิบ<br>ไปแท็บ "รายการสต๊อก" เพื่อเพิ่มรายการแรก</div>`;

  const low = lowItems(), out = outItems();
  const moves7 = movementsInDays(7).length;
  const { used, rate } = usageRateByName();

  // KPI
  let html = `
    <div class="kpi-grid">
      <div class="kpi"><p class="kpi-label">วัตถุดิบทั้งหมด</p><p class="kpi-val" data-count="${state.items.length}">0</p></div>
      <div class="kpi ${low.length ? "accent-amber" : "accent-green"}"><p class="kpi-label">ใกล้หมด</p><p class="kpi-val" data-count="${low.length}">0</p></div>
      <div class="kpi ${out.length ? "accent-red" : ""}"><p class="kpi-label">หมดสต๊อก</p><p class="kpi-val" data-count="${out.length}">0</p></div>
      <div class="kpi"><p class="kpi-label">เคลื่อนไหว 7 วัน</p><p class="kpi-val" data-count="${moves7}">0</p></div>
    </div>`;

  // alert
  if (low.length) {
    html += `<div class="alert" style="margin-top:14px;"><span class="ic">⚠️</span><span>${low.length} รายการต่ำกว่าจุดสั่งซื้อ — ${escapeHtml(low.slice(0,3).map(i=>i.name).join(", "))}${low.length>3?" …":""}</span></div>`;
  } else {
    html += `<div class="alert ok" style="margin-top:14px;"><span class="ic">✓</span><span>ทุกรายการอยู่เหนือจุดสั่งซื้อขั้นต่ำ</span></div>`;
  }

  // insights: ประเมินวันที่จะหมด
  const projections = state.items
    .map((it) => ({ it, days: daysLeftFor(it, rate) }))
    .filter((x) => x.days != null && x.days < 999)
    .sort((a, b) => a.days - b.days)
    .slice(0, 4);

  if (projections.length) {
    html += `<h2>ประเมินจากการใช้งานจริง <span class="h2-sub">${USAGE_WINDOW_DAYS} วันล่าสุด</span></h2>`;
    projections.forEach(({ it, days }) => {
      const d = Math.max(0, Math.round(days));
      const urgent = d <= 5;
      html += `
        <div class="insight">
          <span class="ic">${urgent ? "🔴" : "⏳"}</span>
          <div style="flex:1;">
            <p class="lead">${escapeHtml(it.name)} <span style="color:${urgent?"var(--red)":"var(--muted)"}">— เหลือพออีกราว ${d} วัน</span></p>
            <p class="det">คงเหลือ ${fmtNum(it.qty)} ${escapeHtml(it.unit)} · ใช้เฉลี่ย ${fmtNum(rate[it.name])} ${escapeHtml(it.unit)}/วัน</p>
          </div>
        </div>`;
    });
  }

  // ใช้บ่อยที่สุด
  const topUsed = Object.entries(used).sort((a, b) => b[1] - a[1]).slice(0, 5);
  if (topUsed.length) {
    html += `<h2>ใช้บ่อยที่สุด <span class="h2-sub">${USAGE_WINDOW_DAYS} วันล่าสุด</span></h2><div class="chart-card"><div class="chart-wrap" style="height:${Math.max(120, topUsed.length*42)}px;"><canvas id="usageChart"></canvas></div></div>`;
  }

  // หมวดหมู่
  html += `<h2>สัดส่วนตามหมวดหมู่</h2><div class="chart-card"><div class="chart-wrap"><canvas id="catChart"></canvas></div></div>`;

  return html;
}

function drawOverviewCharts() {
  document.querySelectorAll(".kpi-val[data-count]").forEach((el) => countUp(el, Number(el.dataset.count)));
  Object.values(charts).forEach((c) => c && c.destroy()); charts = {};

  const { used } = usageRateByName();

  const uc = document.getElementById("usageChart");
  if (uc) {
    const top = Object.entries(used).sort((a, b) => b[1] - a[1]).slice(0, 5);
    charts.usage = new Chart(uc, {
      type: "bar",
      data: { labels: top.map((t) => t[0]), datasets: [{ data: top.map((t) => t[1]), backgroundColor: "#B5734A", borderRadius: 6, barThickness: 18 }] },
      options: { indexAxis: "y", responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, grid: { color: "#EFE7DC" } }, y: { grid: { display: false } } } },
    });
  }

  const cc = document.getElementById("catChart");
  if (cc) {
    const byCat = {}; CATEGORIES.forEach((c) => (byCat[c.id] = 0));
    state.items.forEach((it) => { byCat[it.category] = (byCat[it.category] || 0) + 1; });
    const cats = CATEGORIES.filter((c) => byCat[c.id] > 0);
    charts.cat = new Chart(cc, {
      type: "doughnut",
      data: { labels: cats.map((c) => c.label), datasets: [{ data: cats.map((c) => byCat[c.id]), backgroundColor: cats.map((c) => c.color), borderWidth: 2, borderColor: "#fff" }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: "62%", plugins: { legend: { position: "bottom", labels: { font: { size: 11 }, padding: 12, usePointStyle: true } } } },
    });
  }
}

function renderList() {
  const visible = state.items
    .filter((it) => state.filterCat === "all" || it.category === state.filterCat)
    .filter((it) => it.name.toLowerCase().includes(state.search.toLowerCase()))
    .sort((a, b) => {
      const aLow = a.min > 0 && a.qty < a.min, bLow = b.min > 0 && b.qty < b.min;
      if (aLow !== bLow) return aLow ? -1 : 1;
      return a.name.localeCompare(b.name, "th");
    });

  let html = `
    <div class="row">
      <div class="search-wrap"><span class="search-ic">🔍</span><input id="searchInput" placeholder="ค้นหาวัตถุดิบ..." value="${escapeHtml(state.search)}" oninput="onSearch(this.value)" /></div>
    </div>
    <div class="chiprow">
      <div class="chip ${state.filterCat === "all" ? "active" : ""}" onclick="setFilter('all')">ทั้งหมด</div>
      ${CATEGORIES.map((c) => `<div class="chip ${state.filterCat === c.id ? "active" : ""}" onclick="setFilter('${c.id}')">${c.label}</div>`).join("")}
    </div>`;

  if (visible.length === 0) {
    html += `<div class="empty"><span class="big">${state.items.length === 0 ? "📦" : "🔍"}</span>${state.items.length === 0 ? "ยังไม่มีวัตถุดิบ — กดปุ่ม + เพื่อเพิ่ม" : "ไม่พบรายการที่ค้นหา"}</div>`;
    return html;
  }

  visible.forEach((it) => {
    const ratio = it.min > 0 ? it.qty / it.min : 1.5;
    const isLow = it.min > 0 && it.qty < it.min;
    const pct = it.min > 0 ? Math.min(100, Math.round((it.qty / (it.min * 2)) * 100)) : 100;
    const color = levelColor(ratio);
    html += `
      <div class="card">
        <div class="bar" style="background:${color}"></div>
        <div style="flex:1; min-width:0;">
          <div class="card-top">
            <p class="item-name">${escapeHtml(it.name)}${isLow ? ' <span style="color:var(--red);font-size:12px;">· ใกล้หมด</span>' : ""}</p>
            <span class="item-qty" style="color:${isLow ? "var(--red)" : "var(--ink)"}">${fmtNum(it.qty)} ${escapeHtml(it.unit)}</span>
          </div>
          <div class="gauge-row">
            <div class="gauge-bg"><div class="gauge-fg" style="width:${pct}%; background:${color}"></div></div>
            <span class="min-label">ขั้นต่ำ ${fmtNum(it.min)}</span>
          </div>
          <div class="card-bottom">
            <span class="cat-pill">${catLabel(it.category)}</span>
            <div class="actions">
              <div class="chip" onclick='openMoveForm(${JSON.stringify(it.id)}, "out")'>ใช้ออก</div>
              <div class="chip" onclick='openMoveForm(${JSON.stringify(it.id)}, "in")'>รับเข้า</div>
              <div class="chip" onclick='openItemForm(${JSON.stringify(it.id)})'>⋯</div>
            </div>
          </div>
        </div>
      </div>`;
  });
  return html;
}

function renderHistory() {
  if (state.logs.length === 0) return `<div class="empty"><span class="big">🕘</span>ยังไม่มีประวัติการเคลื่อนไหว</div>`;
  // จัดกลุ่มตามวัน
  const groups = {};
  state.logs.forEach((l) => {
    const d = new Date(l.time);
    const key = isNaN(d) ? "ไม่ทราบวันที่" : d.toLocaleDateString("th-TH", { weekday: "short", day: "2-digit", month: "short" });
    (groups[key] = groups[key] || []).push(l);
  });
  return Object.entries(groups).map(([day, logs]) => `
    <h2 style="margin:18px 0 8px;">${day}</h2>
    <div class="chart-card" style="padding:4px 14px;">
      ${logs.map((l) => {
        const sign = l.type === "in" ? "+" : l.type === "out" ? "−" : "";
        const color = l.type === "in" ? "var(--green)" : l.type === "out" ? "var(--red)" : "var(--muted)";
        const d = new Date(l.time);
        const tStr = isNaN(d) ? "" : d.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
        const tag = l.type === "in" ? "รับเข้า" : l.type === "out" ? "ใช้ออก" : "เพิ่มรายการ";
        return `<div class="log-row">
          <div style="min-width:0;"><p style="margin:0; font-size:14px; font-weight:600;">${escapeHtml(l.itemName || "")}</p>
          <p style="margin:1px 0 0; font-size:12px; color:var(--muted);">${tag}${l.note ? " · " + escapeHtml(l.note) : ""}</p></div>
          <div style="text-align:right; white-space:nowrap;"><p style="margin:0; font-weight:800; color:${color}; font-variant-numeric:tabular-nums;">${sign}${fmtNum(Math.abs(l.delta || 0))}</p>
          <p style="margin:0; font-size:11px; color:var(--muted);">${tStr}</p></div>
        </div>`;
      }).join("")}
    </div>`).join("");
}

function onSearch(v) { state.search = v; render(); setTimeout(() => { const i = document.getElementById("searchInput"); if (i) { i.focus(); i.setSelectionRange(i.value.length, i.value.length); } }, 0); }
function setFilter(c) { state.filterCat = c; render(); }

// ---------- modals ----------
function openMoveForm(itemId, type) {
  const item = state.items.find((i) => i.id === itemId); if (!item) return;
  const title = type === "in" ? "รับเข้า" : "ใช้ออก";
  document.getElementById("modalRoot").innerHTML = `
    <div class="overlay" onclick="if(event.target===this) closeModal()">
      <div class="sheet"><div class="grab"></div>
        <h2>${title} — ${escapeHtml(item.name)}</h2>
        <p style="font-size:13px; color:var(--muted); margin-top:-6px;">คงเหลือปัจจุบัน ${fmtNum(item.qty)} ${escapeHtml(item.unit)}</p>
        <div class="field"><label class="label">จำนวน (${escapeHtml(item.unit)})</label><input id="moveAmount" type="number" inputmode="decimal" min="0" autofocus /></div>
        <div class="field"><label class="label">บันทึกเพิ่มเติม (ไม่บังคับ)</label><input id="moveNote" placeholder="${type === "in" ? "เช่น ซื้อจากซัพพลายเออร์ A" : "เช่น ใช้ทำเมนูประจำวัน"}" /></div>
        <div class="row"><button class="chip" style="flex:1; text-align:center; padding:12px;" onclick="closeModal()">ยกเลิก</button>
        <button class="btn-primary" style="flex:1;" onclick="submitMove('${itemId}', '${type}')">ยืนยัน</button></div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById("moveAmount").focus(), 50);
}

async function submitMove(itemId, type) {
  const amount = Number(document.getElementById("moveAmount").value);
  const note = document.getElementById("moveNote").value;
  if (!amount || amount <= 0) { showToast("กรุณาใส่จำนวน"); return; }
  const item = state.items.find((i) => i.id === itemId);
  closeModal();
  try {
    await apiCall("moveStock", { itemId, itemName: item.name, type, amount, note });
    showToast(type === "in" ? `รับเข้า ${item.name} +${amount} ${item.unit}` : `ใช้ออก ${item.name} −${amount} ${item.unit}`);
    await loadAll();
  } catch (e) { showToast("บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง"); }
}

function openItemForm(itemId) {
  const editing = itemId ? state.items.find((i) => i.id === itemId) : null;
  document.getElementById("modalRoot").innerHTML = `
    <div class="overlay" onclick="if(event.target===this) closeModal()">
      <div class="sheet"><div class="grab"></div>
        <h2>${editing ? "แก้ไขวัตถุดิบ" : "เพิ่มวัตถุดิบใหม่"}</h2>
        <div class="field"><label class="label">ชื่อวัตถุดิบ</label><input id="fName" value="${editing ? escapeHtml(editing.name) : ""}" autofocus /></div>
        <div class="row">
          <div class="field" style="flex:1;"><label class="label">หน่วย</label><select id="fUnit">${UNITS.map((u) => `<option value="${u}" ${editing && editing.unit === u ? "selected" : ""}>${u}</option>`).join("")}</select></div>
          <div class="field" style="flex:1;"><label class="label">หมวดหมู่</label><select id="fCategory">${CATEGORIES.map((c) => `<option value="${c.id}" ${editing && editing.category === c.id ? "selected" : ""}>${c.label}</option>`).join("")}</select></div>
        </div>
        ${!editing ? `<div class="field"><label class="label">จำนวนเริ่มต้น</label><input id="fQty" type="number" inputmode="decimal" min="0" value="0" /></div>` : ""}
        <div class="field"><label class="label">จุดสั่งซื้อขั้นต่ำ (เตือนเมื่อต่ำกว่านี้)</label><input id="fMin" type="number" inputmode="decimal" min="0" value="${editing ? editing.min : 0}" /></div>
        <div class="row"><button class="chip" style="flex:1; text-align:center; padding:12px;" onclick="closeModal()">ยกเลิก</button>
        <button class="btn-primary" style="flex:1;" onclick="submitItem(${editing ? `'${editing.id}'` : "null"})">${editing ? "บันทึก" : "เพิ่ม"}</button></div>
        ${editing ? `<button class="chip" style="width:100%; margin-top:9px; text-align:center; color:var(--red); padding:11px;" onclick="submitDelete('${editing.id}')">ลบรายการนี้</button>` : ""}
      </div>
    </div>`;
  setTimeout(() => document.getElementById("fName").focus(), 50);
}

async function submitItem(editingId) {
  const name = document.getElementById("fName").value.trim();
  if (!name) { showToast("กรุณาใส่ชื่อวัตถุดิบ"); return; }
  const unit = document.getElementById("fUnit").value;
  const category = document.getElementById("fCategory").value;
  const min = Number(document.getElementById("fMin").value) || 0;
  const qtyInput = document.getElementById("fQty");
  const qty = qtyInput ? Number(qtyInput.value) || 0 : null;
  closeModal();
  try {
    if (editingId) {
      const existing = state.items.find((i) => i.id === editingId);
      await apiCall("saveItem", { id: editingId, name, unit, category, qty: existing.qty, min });
      showToast(`บันทึก "${name}" แล้ว`);
    } else {
      const id = uid();
      await apiCall("saveItem", { id, name, unit, category, qty: qty || 0, min });
      await apiCall("logOnly", { itemName: name, type: "add", amount: qty || 0, note: "เพิ่มวัตถุดิบใหม่" });
      showToast(`เพิ่ม "${name}" แล้ว`);
    }
    await loadAll();
  } catch (e) { showToast("บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง"); }
}

async function submitDelete(itemId) {
  const item = state.items.find((i) => i.id === itemId);
  closeModal();
  try {
    await fetch(API_URL + "?" + new URLSearchParams({ action: "deleteItem", id: itemId }));
    showToast(`ลบ "${item.name}" แล้ว`);
    await loadAll();
  } catch (e) { showToast("ลบไม่สำเร็จ ลองใหม่อีกครั้ง"); }
}

function closeModal() { document.getElementById("modalRoot").innerHTML = ""; }

// ---------- init ----------
loadAll();
setInterval(loadAll, 12000);
</script>
</body>
</html>
