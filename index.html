<!DOCTYPE html>
<html lang="th">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  /* ===================== Rush Coffee · Modern Silver & Gold (Light Luxe) ===================== */
  :root{
    --bg:#F4F3EF;
    --bg-grad: radial-gradient(135% 110% at 50% -10%, #FCFBF9 0%, #F4F3EF 55%, #ECEAE3 100%);
    --surface:#FFFFFF; --surface-2:#FBFAF7;
    --line:#EAE7DF; --line-strong:#DDD9CF;
    --ink:#1E232A; --ink-2:#5D646E; --ink-3:#9A9FA8;
    --green:#2F8F5B; --green-bg:#E9F4EE;
    --red:#C7553B; --red-bg:#FBEDE9;
    --amber:#CF9A2B; --amber-bg:#FAF2DD;
    --shadow-sm:0 1px 2px rgba(28,28,36,.04), 0 2px 8px rgba(28,28,36,.05);
    --shadow-md:0 6px 22px rgba(28,28,36,.09);
    --radius:16px; --radius-sm:11px;
    /* accent defaults to silver (Rush) */
    --accent:#6E7884; --accent-deep:#3E4651; --accent-soft:#EEF1F4;
    --accent-grad:linear-gradient(135deg,#8C95A1 0%,#69727E 100%);
    --metal-grad:linear-gradient(120deg,#737C88 0%,#C7CDD5 48%,#6A7280 100%);
    --on-accent:#FFFFFF;
  }
  body.theme-rush{ --accent:#6E7884; --accent-deep:#3A424D; --accent-soft:#EDF0F3;
    --accent-grad:linear-gradient(135deg,#8C95A1 0%,#69727E 100%);
    --metal-grad:linear-gradient(120deg,#737C88 0%,#CBD1D8 48%,#6A7280 100%); --on-accent:#FFFFFF; }
  body.theme-rushhour{ --accent:#B5870F; --accent-deep:#8A6608; --accent-soft:#FAF3DC;
    --accent-grad:linear-gradient(135deg,#E3BE4A 0%,#C2941A 100%);
    --metal-grad:linear-gradient(120deg,#A6800E 0%,#EBC955 48%,#9A7110 100%); --on-accent:#3A2C04; }
  body.theme-all{ --accent:#3C4450; --accent-deep:#262C35; --accent-soft:#ECEEF1;
    --accent-grad:linear-gradient(135deg,#4A5360 0%,#2E343D 100%);
    --metal-grad:linear-gradient(120deg,#4A5360 0%,#8A93A0 48%,#3A424D 100%); --on-accent:#FFFFFF; }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{
    font-family:"Inter","Noto Sans Thai",-apple-system,"Segoe UI",sans-serif;
    background:var(--bg); background-image:var(--bg-grad); background-attachment:fixed;
    color:var(--ink); padding-bottom:84px; -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:560px; margin:0 auto; padding:14px 16px 8px; }

  /* ---------- App bar ---------- */
  .appbar{ position:sticky; top:0; z-index:40; background:rgba(244,243,239,.82);
    backdrop-filter:saturate(160%) blur(14px); border-bottom:1px solid var(--line); }
  .appbar-inner{ max-width:560px; margin:0 auto; padding:11px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .logo{ width:38px; height:38px; border-radius:12px; display:grid; place-items:center; color:#fff;
    background:var(--accent-grad); box-shadow:var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.35); flex-shrink:0; }
  .logo svg{ width:21px; height:21px; }
  .brand-text{ min-width:0; }
  .wordmark{ font-weight:800; font-size:15px; letter-spacing:.4px; line-height:1;
    background:var(--metal-grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .brand-tag{ font-size:11px; color:var(--ink-3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .live-dot{ display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--ink-3);
    border:1px solid var(--line); background:var(--surface); padding:5px 9px; border-radius:999px; white-space:nowrap; }
  .live-dot i{ width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px var(--green-bg); }

  h1{ font-size:20px; font-weight:800; margin:6px 0 2px; letter-spacing:.2px; }
  .sub{ color:var(--ink-2); font-size:12.5px; margin:0 0 14px; }

  /* ---------- Branch switcher ---------- */
  .branch-row{ display:flex; gap:7px; margin:0 0 14px; }
  .branch-btn{ flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
    padding:11px 6px; border-radius:13px; font-size:13px; font-weight:700; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); color:var(--ink-2); transition:.18s; box-shadow:var(--shadow-sm); }
  .branch-btn .sw{ width:11px; height:11px; border-radius:50%; box-shadow:inset 0 1px 1px rgba(255,255,255,.6); }
  .sw.silver{ background:linear-gradient(135deg,#C7CDD5,#7C8794); }
  .sw.gold{ background:linear-gradient(135deg,#EBC955,#B5870F); }
  .sw.all{ background:linear-gradient(135deg,#8A93A0,#2E343D); }
  .branch-btn.active{ color:var(--on-accent); border-color:transparent; background:var(--accent-grad);
    box-shadow:var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.3); }
  .branch-btn.active .sw{ box-shadow:0 0 0 2px rgba(255,255,255,.5); }

  /* ---------- Tabs ---------- */
  .tabs{ display:flex; gap:6px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:4px; margin-bottom:14px; box-shadow:var(--shadow-sm); }
  .tab{ flex:1; text-align:center; padding:9px; border-radius:9px; font-size:13.5px; font-weight:700; cursor:pointer; color:var(--ink-2); transition:.15s; }
  .tab.active{ background:var(--accent-grad); color:var(--on-accent); box-shadow:var(--shadow-sm); }

  /* ---------- Stat strip ---------- */
  .stat-strip{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
  .stat{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); padding:11px 12px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden; }
  .stat::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent-grad); }
  .stat .n{ font-size:21px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1.1; }
  .stat .l{ font-size:11px; color:var(--ink-3); margin-top:3px; }
  .stat.warn .n{ color:var(--amber); } .stat.bad .n{ color:var(--red); }

  /* ---------- Inputs / buttons ---------- */
  .row{ display:flex; gap:8px; margin-bottom:11px; }
  input,select{ width:100%; border:1px solid var(--line-strong); border-radius:10px; padding:10px 11px;
    font-size:14px; background:var(--surface); color:var(--ink); font-family:inherit; transition:.15s; }
  input:focus,select:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .btn-primary{ background:var(--accent-grad); color:var(--on-accent); border:none; border-radius:10px;
    padding:10px 16px; font-size:14px; font-weight:800; cursor:pointer; white-space:nowrap; box-shadow:var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.3); transition:.12s; }
  .btn-primary:active{ transform:scale(.97); }

  .chip{ border:1px solid var(--line); border-radius:999px; padding:7px 13px; font-size:13px; background:var(--surface); cursor:pointer; white-space:nowrap; color:var(--ink-2); font-weight:600; transition:.15s; }
  .chip.active{ background:var(--accent-grad); color:var(--on-accent); border-color:transparent; box-shadow:var(--shadow-sm); }
  .chiprow{ display:flex; gap:7px; overflow-x:auto; padding-bottom:11px; scrollbar-width:none; }
  .chiprow::-webkit-scrollbar{ display:none; }

  /* ---------- Banner ---------- */
  .banner{ display:flex; align-items:center; gap:10px; background:var(--amber-bg); border:1px solid #EFE0B8;
    border-radius:var(--radius-sm); padding:11px 13px; margin-bottom:14px; font-size:13px; color:#8a6a14; font-weight:600; }
  .banner svg{ width:18px; height:18px; flex-shrink:0; }

  /* ---------- Stock cards ---------- */
  .card{ border:1px solid var(--line); border-radius:var(--radius); background:var(--surface);
    padding:14px; display:flex; gap:13px; align-items:stretch; margin-bottom:11px; box-shadow:var(--shadow-sm); }
  .bar{ width:4px; border-radius:4px; flex-shrink:0; }
  .card-top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .item-name{ margin:0; font-weight:700; font-size:15px; overflow:hidden; text-overflow:ellipsis; }
  .item-qty{ font-variant-numeric:tabular-nums; font-size:15px; font-weight:800; white-space:nowrap; }
  .gauge-row{ display:flex; align-items:center; gap:8px; margin:8px 0 6px; }
  .gauge-bg{ flex:1; height:7px; border-radius:5px; background:var(--accent-soft); overflow:hidden; }
  .gauge-fg{ height:100%; border-radius:5px; transition:width .4s; }
  .min-label{ font-size:11px; color:var(--ink-3); white-space:nowrap; }
  .card-bottom{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .cat-pill{ font-size:11px; padding:3px 9px; border-radius:999px; background:var(--accent-soft); color:var(--accent-deep); font-weight:600; }
  .actions{ display:flex; gap:6px; }
  .actions .chip{ padding:5px 11px; font-size:12px; }
  .actions .chip.in{ color:var(--green); border-color:#CDE6D7; }
  .actions .chip.out{ color:var(--red); border-color:#EED2C8; }

  .empty{ text-align:center; padding:46px 16px; color:var(--ink-3); font-size:14px; }
  .empty svg{ width:40px; height:40px; opacity:.5; margin-bottom:10px; }

  /* ---------- History ---------- */
  .hist-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:4px 14px; }
  .log-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line); gap:10px; align-items:center; }
  .log-row:last-child{ border-bottom:none; }
  .log-ic{ width:32px; height:32px; border-radius:9px; display:grid; place-items:center; flex-shrink:0; }
  .log-ic svg{ width:16px; height:16px; }
  .date-head{ font-size:12px; font-weight:700; color:var(--ink-3); margin:16px 2px 6px; }

  /* ---------- Modal ---------- */
  .overlay{ position:fixed; inset:0; background:rgba(24,22,20,.5); backdrop-filter:blur(2px); display:flex;
    align-items:flex-end; justify-content:center; padding:0; z-index:80; }
  .sheet{ background:var(--surface); border-radius:20px 20px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); width:100%; max-width:560px; box-shadow:0 -10px 40px rgba(0,0,0,.18); animation:slideUp .22s ease; }
  @keyframes slideUp{ from{ transform:translateY(20px); opacity:.6; } to{ transform:translateY(0); opacity:1; } }
  @media(min-width:600px){ .overlay{ align-items:center; padding:16px; } .sheet{ border-radius:20px; max-width:380px; } }
  .sheet h2{ margin:0 0 2px; font-size:18px; font-weight:800; }
  .label{ font-size:12px; color:var(--ink-2); margin-bottom:5px; display:block; font-weight:600; }
  .field{ margin-bottom:13px; }

  .toast{ position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:11px 20px; border-radius:999px; font-size:13px; font-weight:600; z-index:120; box-shadow:var(--shadow-md); white-space:nowrap; }
  .loading-text{ color:var(--ink-3); font-size:14px; text-align:center; padding:36px 0; }
  .err-box{ background:var(--red-bg); color:var(--red); border:1px solid #EED2C8; border-radius:10px; padding:10px 13px; font-size:13px; margin-bottom:13px; font-weight:600; }

  /* ---------- Bottom nav ---------- */
  .bottom-nav{ position:fixed; left:0; right:0; bottom:0; z-index:60; background:rgba(255,255,255,.86);
    backdrop-filter:saturate(160%) blur(14px); border-top:1px solid var(--line); padding:7px 10px calc(7px + env(safe-area-inset-bottom)); }
  .nav-inner{ display:flex; max-width:560px; margin:0 auto; gap:2px; }
  .nav-item{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; border-radius:13px;
    color:var(--ink-3); font-size:9.5px; font-weight:700; text-decoration:none; white-space:nowrap; transition:.15s; }
  .nav-item svg{ width:22px; height:22px; }
  .nav-item.active{ color:var(--accent-deep); background:var(--accent-soft); }
</style>
</head>

<script>
// ===== ตั้งค่า: URL ของ Google Apps Script (สต๊อก) — คงเดิมเพื่อให้เชื่อมต่อข้อมูลเดิมได้ =====
const API_URL = "https://script.google.com/macros/s/AKfycbzRGIVn3Vz6doKwYY6ltuEQIhrs9YYtvyiqXJBnckQh9705ZePIYZcOgFwQ5j5LtMoo/exec";

const UNITS = ["g", "kg", "ml", "l", "ชิ้น", "ถุง", "ขวด", "กล่อง"];
const CATEGORIES = [
  { id: "coffee", label: "กาแฟ" },
  { id: "drink", label: "เครื่องดื่ม/ไซรัป" },
  { id: "dairy", label: "นม/ครีม" },
  { id: "bakery", label: "เบเกอรี่/ขนม" },
  { id: "other", label: "อื่นๆ" },
];
const BRANCH_LABEL = { rush: "Rush", rushhour: "Rush Hour", all: "รวมทั้งสองสาขา" };

let state = { items: [], logs: [], view: "list", filterCat: "all", search: "", branch: "all" };

function catLabel(id){ const c = CATEGORIES.find((c) => c.id === id); return c ? c.label : "อื่นๆ"; }

function levelColor(ratio){
  if (ratio <= 0) return "#C7553B";
  if (ratio < 1) return "#CF9A2B";
  return "#2F8F5B";
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

async function apiCall(action, payload){
  let res;
  try{
    const body = new URLSearchParams({ action });
    if (payload) body.set("payload", JSON.stringify(payload));
    res = await fetch(API_URL, { method:"POST", redirect:"follow",
      headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: body.toString() });
  }catch(networkErr){ throw new Error("เชื่อมต่อเครือข่ายไม่ได้: " + networkErr.message); }
  const text = await res.text();
  if (!res.ok) throw new Error("เซิร์ฟเวอร์ตอบกลับ HTTP " + res.status + " — " + text.slice(0, 200));
  try{ return JSON.parse(text); }
  catch(parseErr){ throw new Error("รูปแบบข้อมูลที่ได้ไม่ถูกต้อง: " + text.slice(0, 200)); }
}

async function loadAll(){
  try{
    const data = await apiCall("getAll");
    if (data.error) throw new Error(data.error);
    state.items = (data.items || []).map((it) => ({ ...it, qty: Number(it.qty) || 0, min: Number(it.min) || 0 }));
    state.logs = (data.logs || []).sort((a, b) => new Date(b.time) - new Date(a.time));
    document.getElementById("errorBox").innerHTML = "";
  }catch(e){
    document.getElementById("errorBox").innerHTML =
      '<div class="err-box">เชื่อมต่อข้อมูลไม่สำเร็จ: ' + escapeHtml(e.message) + '</div>';
  }
  render();
}

// คัดกรองตามสาขา — รายการที่ยังไม่มีค่า branch จะแสดงในทุกสาขา เพื่อไม่ให้ข้อมูลเดิมหาย
function branchItems(){
  if (state.branch === "all") return state.items;
  return state.items.filter((it) => !it.branch || it.branch === state.branch);
}
function branchLogs(){
  if (state.branch === "all") return state.logs;
  return state.logs.filter((l) => !l.branch || l.branch === state.branch);
}

function setBranch(b){ state.branch = b; render(); }

function setView(v){
  state.view = v;
  document.getElementById("tabList").classList.toggle("active", v === "list");
  document.getElementById("tabHistory").classList.toggle("active", v === "history");
  render();
  loadAll(); // ดึงข้อมูลล่าสุดทุกครั้งที่สลับแท็บ (เห็นรับเข้า/ใช้ออกใหม่ทันที)
}

function showToast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function applyTheme(){
  document.getElementById("bodyEl").className =
    state.branch === "rush" ? "theme-rush" : state.branch === "rushhour" ? "theme-rushhour" : "theme-all";
  document.getElementById("branchRush").classList.toggle("active", state.branch === "rush");
  document.getElementById("branchRushhour").classList.toggle("active", state.branch === "rushhour");
  document.getElementById("branchAll").classList.toggle("active", state.branch === "all");
  document.querySelector(".brand-tag").textContent =
    state.branch === "all" ? "ระบบจัดการสต๊อกวัตถุดิบ" : "สต๊อก · สาขา " + BRANCH_LABEL[state.branch];
}

function render(){
  applyTheme();
  const items = branchItems();
  const lowCount = items.filter((it) => it.min > 0 && it.qty < it.min && it.qty > 0).length;
  const outCount = items.filter((it) => it.qty <= 0).length;
  const totalLow = lowCount + outCount;
  document.getElementById("summaryText").textContent =
    items.length === 0 ? "ยังไม่มีวัตถุดิบในสาขานี้" :
    totalLow > 0 ? `${totalLow} รายการต้องสั่งเพิ่ม จากทั้งหมด ${items.length} รายการ` :
    `ครบ ${items.length} รายการ — ทุกอย่างอยู่ในระดับปลอดภัย`;

  const content = document.getElementById("content");
  content.innerHTML = state.view === "list" ? renderList(items) : renderHistory();
}

function renderList(items){
  const lowCount = items.filter((it) => it.min > 0 && it.qty < it.min && it.qty > 0).length;
  const outCount = items.filter((it) => it.qty <= 0).length;

  let html = `
    <div class="stat-strip">
      <div class="stat"><div class="n">${items.length}</div><div class="l">รายการทั้งหมด</div></div>
      <div class="stat ${lowCount > 0 ? "warn" : ""}"><div class="n">${lowCount}</div><div class="l">ใกล้หมด</div></div>
      <div class="stat ${outCount > 0 ? "bad" : ""}"><div class="n">${outCount}</div><div class="l">หมดสต๊อก</div></div>
    </div>
  `;

  if (lowCount + outCount > 0) {
    html += `<div class="banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>
      มี ${lowCount + outCount} รายการต้องสั่งซื้อเพิ่ม ตรวจสอบรายการที่ขึ้นบนสุด
    </div>`;
  }

  html += `
    <div class="row">
      <input id="searchInput" placeholder="ค้นหาวัตถุดิบ..." value="${escapeHtml(state.search)}" oninput="onSearch(this.value)" style="flex:1" />
      <button class="btn-primary" onclick="openItemForm()">+ เพิ่ม</button>
    </div>
    <div class="chiprow">
      <div class="chip ${state.filterCat === "all" ? "active" : ""}" onclick="setFilter('all')">ทั้งหมด</div>
      ${CATEGORIES.map((c) => `<div class="chip ${state.filterCat === c.id ? "active" : ""}" onclick="setFilter('${c.id}')">${c.label}</div>`).join("")}
    </div>
    <div id="stockCards">${renderStockCards()}</div>
  `;
  return html;
}

function renderStockCards(){
  const items = branchItems();
  const visible = items
    .filter((it) => state.filterCat === "all" || it.category === state.filterCat)
    .filter((it) => (it.name || "").toLowerCase().includes(state.search.toLowerCase()))
    .sort((a, b) => {
      const aLow = a.qty <= 0 ? 2 : (a.min > 0 && a.qty < a.min ? 1 : 0);
      const bLow = b.qty <= 0 ? 2 : (b.min > 0 && b.qty < b.min ? 1 : 0);
      if (aLow !== bLow) return bLow - aLow;
      return (a.name || "").localeCompare(b.name || "", "th");
    });
  if (visible.length === 0) {
    return `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5 12 3l9 4.5v9L12 21 3 16.5v-9Z"/><path d="m3 7.5 9 4.5 9-4.5M12 12v9"/></svg>
      <div>${items.length === 0 ? "ยังไม่มีวัตถุดิบ — กดเพิ่มรายการแรก" : "ไม่พบรายการที่ค้นหา"}</div>
    </div>`;
  }
  return visible.map((it) => {
    const ratio = it.min > 0 ? it.qty / it.min : 1.5;
    const isLow = it.qty <= 0 || (it.min > 0 && it.qty < it.min);
    const pct = it.min > 0 ? Math.min(100, Math.round((it.qty / (it.min * 2)) * 100)) : 100;
    const color = levelColor(ratio);
    return `
      <div class="card">
        <div class="bar" style="background:${color}"></div>
        <div style="flex:1; min-width:0;">
          <div class="card-top">
            <p class="item-name">${escapeHtml(it.name)}</p>
            <span class="item-qty" style="color:${isLow ? "#C7553B" : "var(--ink)"}">${it.qty} ${escapeHtml(it.unit || "")}</span>
          </div>
          <div class="gauge-row">
            <div class="gauge-bg"><div class="gauge-fg" style="width:${pct}%; background:${color}"></div></div>
            <span class="min-label">ขั้นต่ำ ${it.min} ${escapeHtml(it.unit || "")}</span>
          </div>
          <div class="card-bottom">
            <span class="cat-pill">${catLabel(it.category)}</span>
            <div class="actions">
              <div class="chip out" onclick='openMoveForm(${JSON.stringify(it.id)}, "out")'>ใช้ออก</div>
              <div class="chip in" onclick='openMoveForm(${JSON.stringify(it.id)}, "in")'>รับเข้า</div>
              <div class="chip" onclick='openItemForm(${JSON.stringify(it.id)})'>⋯</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function renderHistory(){
  const logs = branchLogs();
  if (logs.length === 0) return `<div class="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>
    <div>ยังไม่มีความเคลื่อนไหวล่าสุด</div></div>`;

  let html = "";
  let lastDay = "";
  logs.forEach((l) => {
    const d = new Date(l.time);
    const dayKey = isNaN(d) ? "ไม่ทราบวันที่" : d.toLocaleDateString("th-TH", { weekday:"short", day:"2-digit", month:"short", year:"numeric" });
    if (dayKey !== lastDay) {
      if (lastDay !== "") html += `</div>`;
      html += `<div class="date-head">${escapeHtml(dayKey)}</div><div class="hist-card">`;
      lastDay = dayKey;
    }
    const isIn = l.type === "in", isOut = l.type === "out";
    const sign = isIn ? "+" : isOut ? "-" : "";
    const color = isIn ? "#2F8F5B" : isOut ? "#C7553B" : "#9A9FA8";
    const bg = isIn ? "#E9F4EE" : isOut ? "#FBEDE9" : "#EEF1F4";
    const ic = isIn
      ? `<path d="M12 19V5M5 12l7-7 7 7"/>`
      : isOut ? `<path d="M12 5v14M5 12l7 7 7-7"/>`
      : `<path d="M12 5v14M5 12h14"/>`;
    const timeStr = isNaN(d) ? "" : d.toLocaleTimeString("th-TH", { hour:"2-digit", minute:"2-digit" });
    html += `
      <div class="log-row">
        <div style="display:flex; gap:11px; align-items:center; min-width:0;">
          <div class="log-ic" style="background:${bg}; color:${color};">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ic}</svg>
          </div>
          <div style="min-width:0;">
            <p style="margin:0; font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(l.itemName || "")}</p>
            <p style="margin:1px 0 0; font-size:12px; color:var(--ink-3);">${escapeHtml(l.note || (isIn ? "รับเข้า" : isOut ? "ใช้ออก" : "เพิ่มรายการ"))} · ${timeStr}</p>
          </div>
        </div>
        <span style="font-variant-numeric:tabular-nums; font-weight:800; color:${color}; white-space:nowrap;">${sign}${l.delta || ""}</span>
      </div>`;
  });
  html += `</div>`;
  return html;
}

function escapeHtml(s){ const div = document.createElement("div"); div.textContent = s == null ? "" : s; return div.innerHTML; }
function onSearch(v){ state.search = v; const el = document.getElementById("stockCards"); if (el) el.innerHTML = renderStockCards(); }
function setFilter(c){ state.filterCat = c; render(); }

// ----- Modal: move stock -----
function openMoveForm(itemId, type){
  const item = state.items.find((i) => i.id === itemId);
  if (!item) return;
  const title = type === "in" ? "รับเข้า" : "ใช้ออก";
  document.getElementById("modalRoot").innerHTML = `
    <div class="overlay" onclick="if(event.target===this) closeModal()">
      <div class="sheet">
        <h2>${title} — ${escapeHtml(item.name)}</h2>
        <p style="font-size:13px; color:var(--ink-2); margin:2px 0 16px;">คงเหลือปัจจุบัน ${item.qty} ${escapeHtml(item.unit || "")}</p>
        <div class="field">
          <label class="label">จำนวน (${escapeHtml(item.unit || "")})</label>
          <input id="moveAmount" type="number" inputmode="decimal" min="0" autofocus />
        </div>
        <div class="field">
          <label class="label">บันทึกเพิ่มเติม (ไม่บังคับ)</label>
          <input id="moveNote" placeholder="${type === "in" ? "เช่น ซื้อจากซัพพลายเออร์ A" : "เช่น ใช้ทำเมนูประจำวัน"}" />
        </div>
        <div class="row" style="margin-bottom:0;">
          <button class="chip" style="flex:1; text-align:center; padding:11px;" onclick="closeModal()">ยกเลิก</button>
          <button class="btn-primary" style="flex:1;" onclick="submitMove('${itemId}', '${type}')">ยืนยัน</button>
        </div>
      </div>
    </div>`;
}

async function submitMove(itemId, type){
  const amount = Number(document.getElementById("moveAmount").value);
  const note = document.getElementById("moveNote").value;
  if (!amount || amount <= 0) return;
  const item = state.items.find((i) => i.id === itemId);
  closeModal();
  try{
    await apiCall("moveStock", { itemId, itemName: item.name, type, amount, note, branch: item.branch || state.branch });
    showToast(type === "in" ? `รับเข้า ${item.name} +${amount} ${item.unit || ""}` : `ใช้ออก ${item.name} -${amount} ${item.unit || ""}`);
    await loadAll();
  }catch(e){ showToast("บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง"); }
}

// ----- Modal: add/edit item -----
function openItemForm(itemId){
  const editing = itemId ? state.items.find((i) => i.id === itemId) : null;
  const curBranch = editing ? (editing.branch || "rush") : (state.branch === "all" ? "rush" : state.branch);
  document.getElementById("modalRoot").innerHTML = `
    <div class="overlay" onclick="if(event.target===this) closeModal()">
      <div class="sheet">
        <h2>${editing ? "แก้ไขวัตถุดิบ" : "เพิ่มวัตถุดิบใหม่"}</h2>
        <div style="height:14px;"></div>
        <div class="field">
          <label class="label">ชื่อวัตถุดิบ</label>
          <input id="fName" value="${editing ? escapeHtml(editing.name) : ""}" autofocus placeholder="เช่น เมล็ดกาแฟอราบิก้า" />
        </div>
        <div class="row">
          <div class="field" style="flex:1;">
            <label class="label">สาขา</label>
            <select id="fBranch">
              <option value="rush" ${curBranch === "rush" ? "selected" : ""}>Rush (เงิน)</option>
              <option value="rushhour" ${curBranch === "rushhour" ? "selected" : ""}>Rush Hour (ทอง)</option>
            </select>
          </div>
          <div class="field" style="flex:1;">
            <label class="label">หมวดหมู่</label>
            <select id="fCategory">${CATEGORIES.map((c) => `<option value="${c.id}" ${editing && editing.category === c.id ? "selected" : ""}>${c.label}</option>`).join("")}</select>
          </div>
        </div>
        <div class="row">
          <div class="field" style="flex:1;">
            <label class="label">หน่วย</label>
            <select id="fUnit">${UNITS.map((u) => `<option value="${u}" ${editing && editing.unit === u ? "selected" : ""}>${u}</option>`).join("")}</select>
          </div>
          ${!editing ? `<div class="field" style="flex:1;">
            <label class="label">จำนวนเริ่มต้น</label>
            <input id="fQty" type="number" inputmode="decimal" min="0" value="0" />
          </div>` : `<div class="field" style="flex:1;"><label class="label">คงเหลือ (${escapeHtml(editing.unit || "")})</label><input value="${editing.qty}" disabled style="opacity:.6;" /></div>`}
        </div>
        <div class="field">
          <label class="label">จุดสั่งซื้อขั้นต่ำ (เตือนเมื่อต่ำกว่านี้)</label>
          <input id="fMin" type="number" inputmode="decimal" min="0" value="${editing ? editing.min : 0}" />
        </div>
        <div class="row" style="margin-bottom:0;">
          <button class="chip" style="flex:1; text-align:center; padding:11px;" onclick="closeModal()">ยกเลิก</button>
          <button class="btn-primary" style="flex:1;" onclick="submitItem(${editing ? `'${editing.id}'` : "null"})">${editing ? "บันทึก" : "เพิ่ม"}</button>
        </div>
        ${editing ? `<button class="chip" style="width:100%; margin-top:9px; text-align:center; color:#C7553B; border-color:#EED2C8;" onclick="submitDelete('${editing.id}')">ลบรายการนี้</button>` : ""}
      </div>
    </div>`;
}

async function submitItem(editingId){
  const name = document.getElementById("fName").value.trim();
  if (!name) return;
  const unit = document.getElementById("fUnit").value;
  const category = document.getElementById("fCategory").value;
  const branch = document.getElementById("fBranch").value;
  const min = Number(document.getElementById("fMin").value) || 0;
  const qtyInput = document.getElementById("fQty");
  const qty = qtyInput ? Number(qtyInput.value) || 0 : null;
  closeModal();
  try{
    if (editingId) {
      const existing = state.items.find((i) => i.id === editingId);
      await apiCall("saveItem", { id: editingId, name, unit, category, qty: existing.qty, min, branch });
      showToast(`บันทึก "${name}" แล้ว`);
    } else {
      const id = uid();
      await apiCall("saveItem", { id, name, unit, category, qty: qty || 0, min, branch });
      await apiCall("logOnly", { itemName: name, type: "add", amount: qty || 0, note: "เพิ่มวัตถุดิบใหม่", branch });
      showToast(`เพิ่ม "${name}" แล้ว`);
    }
    await loadAll();
  }catch(e){ showToast("บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง"); }
}

async function submitDelete(itemId){
  const item = state.items.find((i) => i.id === itemId);
  closeModal();
  try{
    await fetch(API_URL + "?" + new URLSearchParams({ action:"deleteItem", id: itemId }));
    showToast(`ลบ "${item.name}" แล้ว`);
    await loadAll();
  }catch(e){ showToast("ลบไม่สำเร็จ ลองใหม่อีกครั้ง"); }
}

function closeModal(){ document.getElementById("modalRoot").innerHTML = ""; }

// ----- init -----
loadAll();
setInterval(() => { if (!document.getElementById("modalRoot").innerHTML && (document.activeElement||{}).id !== "searchInput") loadAll(); }, 10000);
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
